<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talent DB Launcher</title>
  <link rel="icon" href="data:,">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #f8fafc;
      --line: #dbeafe;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-strong: #1d4ed8;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Noto Sans TC", "Microsoft JhengHei", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(120deg, transparent 24%, rgba(37, 99, 235, 0.06) 25%, transparent 26%) 0 0/64px 64px,
        linear-gradient(300deg, transparent 24%, rgba(14, 165, 233, 0.06) 25%, transparent 26%) 0 0/64px 64px,
        var(--bg);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    body.focus-mode {
      display: block;
      padding: 0;
      background: #e2e8f0;
    }

    .launcher {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 26px;
    }

    body.focus-mode .launcher {
      width: 100%;
      min-height: 100dvh;
      border-radius: 0;
      border: 0;
      box-shadow: none;
      padding: 10px;
      background: transparent;
    }

    .chrome {
      display: block;
    }

    body.focus-mode .chrome {
      display: none;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      padding: 12px 16px;
      font-size: 14px;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    #btn-login {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 8px 22px rgba(37, 99, 235, 0.26);
    }

    #btn-login:hover {
      background: var(--primary-strong);
    }

    #btn-load {
      background: #e2e8f0;
      color: #0f172a;
    }

    #status {
      margin-top: 14px;
      min-height: 24px;
      color: var(--muted);
      font-size: 14px;
      white-space: pre-wrap;
    }

    #status.error {
      color: #b91c1c;
    }

    #app-host {
      margin-top: 14px;
      border: 1px solid #d6deea;
      border-radius: 14px;
      padding: 12px;
      background: #f8fafc;
      min-height: 120px;
    }

    body.focus-mode #app-host {
      margin-top: 0;
      border: 0;
      border-radius: 0;
      padding: 0;
      min-height: 100dvh;
      background: transparent;
    }

    #app-placeholder {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      padding: 6px 2px;
    }

    #app-frame {
      width: 100%;
      min-height: 72dvh;
      border: 0;
      display: none;
      background: #fff;
      border-radius: 10px;
    }

    body.focus-mode #app-frame {
      min-height: 100dvh;
      border-radius: 0;
    }

    .toolbar {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      display: none;
      gap: 8px;
    }

    body.focus-mode .toolbar {
      display: flex;
    }

    .toolbar button {
      padding: 9px 12px;
      background: rgba(15, 23, 42, 0.88);
      color: #fff;
    }

    @media (max-width: 900px) {
      body {
        padding: 10px;
      }

      .launcher {
        padding: 16px;
      }

      h1 {
        font-size: 25px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="launcher">
    <h1 class="chrome">Talent DB</h1>
    <p class="subtitle chrome">白底輕量登入頁。登入後會直接載入 Google Drive 私有核心，無多餘 loading 遮罩。</p>
    <div class="actions chrome">
      <button id="btn-login" type="button">Sign in with Google</button>
      <button id="btn-load" type="button" disabled>Load Private App</button>
    </div>
    <div id="status" class="chrome">尚未登入。</div>

    <section id="app-host">
      <iframe id="app-frame" title="Talent DB App"></iframe>
      <div id="app-placeholder">完成 Google 登入後，點選「Load Private App」載入私有程式。</div>
    </section>
  </main>

  <div class="toolbar">
    <button id="btn-toggle-shell" type="button">Show Launcher</button>
  </div>

  <script>
    const CLIENT_ID = "615427641075-2e4i1l7smqp30l8v1qrf75c924aro94i.apps.googleusercontent.com";
    const APP_MANIFEST_FILE_ID = "1s38nseW-eMJGzRReXVVAskth6R1ENl3TWTLFXwPgvUQ";
    const APP_SCOPE = [
      "https://www.googleapis.com/auth/spreadsheets",
      "https://www.googleapis.com/auth/drive"
    ].join(" ");

    const state = {
      tokenClient: null,
      accessToken: "",
      hasWriteAccess: false
    };

    const statusEl = document.getElementById("status");
    const loginBtn = document.getElementById("btn-login");
    const loadBtn = document.getElementById("btn-load");
    const frameEl = document.getElementById("app-frame");
    const placeholderEl = document.getElementById("app-placeholder");
    const toggleShellBtn = document.getElementById("btn-toggle-shell");

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = isError ? "chrome error" : "chrome";
    }

    function toggleFocusMode(enable) {
      document.body.classList.toggle("focus-mode", !!enable);
      toggleShellBtn.textContent = enable ? "Show Launcher" : "Hide Launcher";
    }

    function assertConfigured() {
      if (!CLIENT_ID || CLIENT_ID.startsWith("REPLACE_WITH_")) {
        setStatus("CLIENT_ID 尚未設定。", true);
        return false;
      }
      if (!APP_MANIFEST_FILE_ID || APP_MANIFEST_FILE_ID.startsWith("REPLACE_WITH_")) {
        setStatus("APP_MANIFEST_FILE_ID 尚未設定。", true);
        return false;
      }
      return true;
    }

    async function fetchDriveFileText(fileId) {
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
        headers: { Authorization: `Bearer ${state.accessToken}` }
      });
      if (!res.ok) throw new Error(`Drive read failed (${res.status})`);
      return await res.text();
    }

    async function fetchDriveDocText(fileId) {
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/export?mimeType=text/plain`, {
        headers: { Authorization: `Bearer ${state.accessToken}` }
      });
      if (!res.ok) throw new Error(`Drive doc export failed (${res.status})`);
      return await res.text();
    }

    async function fetchAnyText(fileId, preferDoc = false) {
      try {
        return preferDoc ? await fetchDriveDocText(fileId) : await fetchDriveFileText(fileId);
      } catch (err) {
        return preferDoc ? await fetchDriveFileText(fileId) : await fetchDriveDocText(fileId);
      }
    }

    function patchEntryAuthBootstrap(entryHtml) {
      const safeBootstrap = [
        "if (window.google && window.google.accounts && window.google.accounts.oauth2) {",
        "  window.app.initGoogleAuth();",
        "} else {",
        "  const __jpBootAuth = () => {",
        "    if (window.google && window.google.accounts && window.google.accounts.oauth2) {",
        "      window.app.initGoogleAuth();",
        "    } else {",
        "      setTimeout(__jpBootAuth, 150);",
        "    }",
        "  };",
        "  __jpBootAuth();",
        "}"
      ].join("\n");

      return entryHtml.split("window.app.initGoogleAuth();").join(safeBootstrap);
    }

    async function loadPrivateApp() {
      if (!state.accessToken) {
        setStatus("請先登入 Google。", true);
        return;
      }

      loadBtn.disabled = true;
      setStatus("讀取私有設定中...");
      try {
        const manifestText = await fetchAnyText(APP_MANIFEST_FILE_ID, true);
        const manifest = JSON.parse((manifestText || "").replace(/^\uFEFF/, ""));
        if (!manifest.entryFileId) throw new Error("Manifest 缺少 entryFileId。");

        setStatus("讀取私有主程式中...");
        const useDocExport = String(manifest.entrySource || "").toLowerCase() === "gdoc";
        let entryHtml = await fetchAnyText(manifest.entryFileId, useDocExport);
        entryHtml = (entryHtml || "").replace(/^\uFEFF/, "");

        const coreFiles = Array.isArray(manifest.coreFiles) ? manifest.coreFiles : [];
        if (coreFiles.length) {
          entryHtml = entryHtml.replace(/<script>([\s\S]*?)<\/script>/gi, "");
          const blocks = [];
          for (let i = 0; i < coreFiles.length; i += 1) {
            const file = coreFiles[i];
            if (!file || !file.id) continue;
            setStatus(`載入核心檔案 (${i + 1}/${coreFiles.length})...`);
            const src = await fetchAnyText(file.id, String(file.source || "").toLowerCase() === "gdoc");
            const safeJs = String(src || "").replace(/<\/script>/gi, "<\\/script>");
            blocks.push(`<script>\n${safeJs}\n<\/script>`);
          }
          if (blocks.length) {
            const merged = blocks.join("\n");
            entryHtml = entryHtml.includes("</body>")
              ? entryHtml.replace("</body>", `${merged}\n</body>`)
              : `${entryHtml}\n${merged}`;
          }
        }

        entryHtml = patchEntryAuthBootstrap(entryHtml);

        const tokenSeed = `<script>
window.__JP_TOKEN = ${JSON.stringify(state.accessToken)};
sessionStorage.setItem("gapi_access_token", ${JSON.stringify(state.accessToken)});
sessionStorage.setItem("gapi_has_write", ${JSON.stringify(state.hasWriteAccess ? "true" : "false")});
<\/script>`;

        const debugPatch = `<style id="jp-sync-debug-style">

  z-index: 2147483000;

  background: rgba(30, 41, 59, 0.92);
  color: #fff;
  font-weight: 700;
  cursor: pointer;
}
#jp-sync-debug-modal {
  position: fixed;
  inset: 0;
  z-index: 2147483001;
  background: rgba(2, 6, 23, 0.58);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 14px;
}
#jp-sync-debug-modal.show { display: flex; }
#jp-sync-debug-card {
  width: min(960px, 100%);
  max-height: 88dvh;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 18px 44px rgba(15, 23, 42, 0.3);
  display: flex;
  flex-direction: column;
}
#jp-sync-debug-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid #e2e8f0;
}
#jp-sync-debug-head .actions { display: flex; gap: 8px; }
#jp-sync-debug-head button {
  border: 0;
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  font-weight: 700;
}
#jp-sync-debug-copy { background: #2563eb; color: #fff; }
#jp-sync-debug-clear { background: #f59e0b; color: #fff; }
#jp-sync-debug-close { background: #ef4444; color: #fff; }
#jp-sync-debug-body {
  margin: 0;
  padding: 12px;
  overflow: auto;
  white-space: pre-wrap;

  background: #f8fafc;

<\/style>
<script>
(function () {
  if (window.__JP_SYNC_DEBUG_INSTALLED) return;
  window.__JP_SYNC_DEBUG_INSTALLED = true;
  var logs = [];
  function now() { return new Date().toISOString(); }
  function pushLog(msg) {
    var line = "[" + now() + "] " + msg;
    logs.push(line);
    if (logs.length > 600) logs = logs.slice(-600);
    var pre = document.getElementById("jp-sync-debug-body");
    if (pre) pre.textContent = logs.join("\\n");
  }
  function ensureUi() {
    if (document.getElementById("jp-sync-debug-btn")) return;
    var btn = document.createElement("button");
    btn.id = "jp-sync-debug-btn";
    btn.type = "button";
    btn.textContent = "Sync Debug";
    document.body.appendChild(btn);

    var modal = document.createElement("div");
    modal.id = "jp-sync-debug-modal";
    modal.innerHTML = '<div id="jp-sync-debug-card"><div id="jp-sync-debug-head"><strong>Auto Sync Debug</strong><div class="actions"><button id="jp-sync-debug-copy" type="button">Copy</button><button id="jp-sync-debug-clear" type="button">Clear</button><button id="jp-sync-debug-close" type="button">Close</button></div></div><pre id="jp-sync-debug-body"></pre></div>';
    document.body.appendChild(modal);

    btn.addEventListener("click", function () {
      modal.classList.add("show");
      var pre = document.getElementById("jp-sync-debug-body");
      if (pre) pre.textContent = logs.join("\\n");
    });
    modal.addEventListener("click", function (e) {
      if (e.target === modal) modal.classList.remove("show");
    });
    document.getElementById("jp-sync-debug-close").addEventListener("click", function () {
      modal.classList.remove("show");
    });
    document.getElementById("jp-sync-debug-clear").addEventListener("click", function () {
      logs = [];
      var pre = document.getElementById("jp-sync-debug-body");
      if (pre) pre.textContent = "";
    });
    document.getElementById("jp-sync-debug-copy").addEventListener("click", function () {
      var text = logs.join("\\n");
      if (!text) return;
      navigator.clipboard && navigator.clipboard.writeText(text);
    });
  }

  function patchApp() {
    var app = window.app;
    if (!app) return false;
    pushLog("APP detected");
    if (!app.__jpDebugFetchPatched && typeof app.fetchHtmlWithProxy === "function") {
      var origFetch = app.fetchHtmlWithProxy.bind(app);
      app.fetchHtmlWithProxy = async function (url) {
        pushLog("FETCH start " + url);
        try {
          var html = await origFetch(url);
          pushLog("FETCH ok    " + url + " (len=" + String(html || "").length + ")");
          return html;
        } catch (err) {
          pushLog("FETCH fail  " + url + " :: " + (err && err.message ? err.message : String(err)));
          throw err;
        }
      };
      app.__jpDebugFetchPatched = true;
      pushLog("APP patch fetchHtmlWithProxy ok");
    }

    function extractBlocks(html, baseUrl) {
      var out = [];
      var seen = {};
      try {
        var doc = new DOMParser().parseFromString(String(html || ""), "text/html");
        var anchors = Array.prototype.slice.call(doc.querySelectorAll("a[href]"));
        anchors.forEach(function (a) {
          var href = String(a.getAttribute("href") || "").trim();
          if (!href) return;
          if (!/(girlid|girls-list|\/cast\/|\/girl\/|\/profile\/)/i.test(href)) return;
          var abs = "";
          try { abs = new URL(href, baseUrl || window.location.href).toString(); } catch (e) { abs = href; }
          if (!/^https?:\/\//i.test(abs) || seen[abs]) return;
          seen[abs] = true;
          var txt = String((a.closest("li,article,.cast,.girl,.item,div") || a).textContent || "").replace(/\s+/g, " ").trim();
          out.push((txt || "") + "\n" + abs);
        });
      } catch (e) {}
      return out;
    }

    function buildRecord(block, html, siteCode, sourceUrl) {
      if (!app.extractCommonRuleData) return null;
      var common = app.extractCommonRuleData(String(block || ""), String(html || ""), [siteCode, "Common"]);
      var name = ((common.nameInfo && common.nameInfo.pureName) || common.rawName || "").trim();
      if (!name) return null;
      var url = "";
      if (common.extractedUrl && common.extractedUrl.value) url = common.extractedUrl.value;
      else if (common.urlFallback && common.urlFallback[0]) url = common.urlFallback[0];
      else url = sourceUrl || "";
      try { url = new URL(url, sourceUrl || window.location.href).toString(); } catch (e) {}
      var tags = new Set();
      if (common.nameInfo && Array.isArray(common.nameInfo.tags)) common.nameInfo.tags.forEach(function (t) { if (t) tags.add(t); });
      if (common.extractedAf && common.extractedAf.tags) common.extractedAf.tags.forEach(function (t) { if (t) tags.add(t); });
      var noMatch = String(block || "").match(/No\.?\s*0*([0-9]{1,6})/i);
      return {
        location: "",
        store: app.getRecordStoreName ? app.getRecordStoreName(common) : "",
        techId: "",
        listNo: noMatch && noMatch[1] ? noMatch[1] : "",
        startDate: (common.extractedDate && common.extractedDate.value) || "",
        name: name,
        age: (common.extractedAge && common.extractedAge.value) || (common.ageFallback && common.ageFallback[1]) || "",
        stats: (common.extractedStats && common.extractedStats.value) || (common.statsFallback && common.statsFallback[1]) || "",
        url: url,
        price: (common.extractedPrice && common.extractedPrice.value) || "",
        tags: Array.from(tags),
        level: (common.extractedName && common.extractedName.level) || (common.nameInfo && common.nameInfo.level) || "",
        schedule: common.formattedSchedule || "",
        hasSchedule: !!common.formattedSchedule
      };
    }

    async function fetchWithFallback(url) {
      try { return await app.fetchHtmlWithProxy(url); } catch (e0) {}
      try {
        var noProto = String(url || "").replace(/^https?:\/\//i, "");
        var r = await fetch("https://r.jina.ai/http://" + noProto);
        if (r.ok) {
          var t = await r.text();
          if (t && t.length > 20) return t;
        }
      } catch (e1) {}
      return "";
    }

    async function fallbackSync(syncRules) {
      pushLog("SYNC fallback begin");
      var syncStats = {};
      for (var i = 0; i < syncRules.length; i += 1) {
        var rule = syncRules[i];
        var siteCode = rule.siteMatch || ("site-" + (i + 1));
        var url = String(rule.pattern || "").trim();
        if (!syncStats[siteCode]) syncStats[siteCode] = { total: 0, updated: 0, missing: 0 };
        var urls = siteCode === "yoshiwara-soap"
          ? [
            "https://yoshiwara-soap.jp/schedule/",
            "https://yoshiwara-soap.jp/schedule/tomorrow.html",
            "https://yoshiwara-soap.jp/schedule/in-2-days.html",
            "https://yoshiwara-soap.jp/schedule/in-3-days.html",
            "https://yoshiwara-soap.jp/schedule/in-4-days.html",
            "https://yoshiwara-soap.jp/schedule/in-5-days.html",
            "https://yoshiwara-soap.jp/schedule/in-6-days.html"
          ]
          : [url];
        for (var u = 0; u < urls.length; u += 1) {
          var src = urls[u];
          pushLog("SYNC site " + siteCode + " url " + src);
          var html = await fetchWithFallback(src);
          if (!html) {
            syncStats[siteCode].missing += 1;
            pushLog("SYNC miss no-html " + siteCode);
            continue;
          }
          var blocks = extractBlocks(html, src);
          if (!blocks.length) blocks = [String(html || "")];
          pushLog("SYNC blocks " + siteCode + " = " + blocks.length);
          for (var b = 0; b < blocks.length; b += 1) {
            var record = buildRecord(blocks[b], html, siteCode, src);
            if (!record || !record.name) continue;
            syncStats[siteCode].total += 1;
            var idx = app.findRecordIndex(record);
            if (idx !== -1) {
              app.applyRecordToRow(app.dataStore[idx]._raw, record, false);
              syncStats[siteCode].updated += 1;
            } else {
              syncStats[siteCode].missing += 1;
            }
          }
        }
      }
      app.renderCatalog && app.renderCatalog();
      app.saveOrderToGoogleSheet && await app.saveOrderToGoogleSheet(true);
      app.showSyncStatsModal && app.showSyncStatsModal(syncStats);
      pushLog("SYNC fallback done");
    }

    if (!app.__jpDebugSyncPatched && typeof app.startAutoSync === "function") {
      var origSync = app.startAutoSync.bind(app);
      app.startAutoSync = async function () {
        pushLog("SYNC begin");
        var syncRules = (window.ruleEngine && window.ruleEngine.rules || []).filter(function (rule) {
          return rule.field === "System_AutoSync" && String(rule.action || "").toUpperCase() === "Y";
        });
        var missingHandlers = syncRules.some(function (rule) {
          var code = rule.siteMatch || "";
          var h = app.getSiteHandler ? app.getSiteHandler(code, rule.pattern, [code]) : null;
          return !h || typeof h.syncAuto !== "function";
        });
        if (missingHandlers) {
          pushLog("SYNC handlers missing, use fallback");
          await fallbackSync(syncRules);
          pushLog("SYNC done (fallback)");
          return;
        }
        try {
          var result = await origSync();
          pushLog("SYNC done");
          return result;
        } catch (err) {
          pushLog("SYNC error :: " + (err && err.message ? err.message : String(err)));
          throw err;
        }
      };
      app.__jpDebugSyncPatched = true;
      pushLog("APP patch startAutoSync ok");
    }
    return !!(app.__jpDebugFetchPatched || app.__jpDebugSyncPatched);
  }

  if (!window.__jpDebugFetchWrapped) {
    var nativeFetch = window.fetch && window.fetch.bind(window);
    if (nativeFetch) {
      window.fetch = async function (input, init) {
        var url = (typeof input === "string") ? input : (input && input.url) || "";
        if (url) pushLog("GLOBAL fetch -> " + url);
        try {
          var res = await nativeFetch(input, init);
          if (url) pushLog("GLOBAL fetch <- " + res.status + " " + url);
          return res;
        } catch (err) {
          if (url) pushLog("GLOBAL fetch xx " + url + " :: " + (err && err.message ? err.message : String(err)));
          throw err;
        }
      };
      window.__jpDebugFetchWrapped = true;
      pushLog("GLOBAL fetch patch ok");
    }
  }

  document.addEventListener("click", function (e) {
    var el = e.target && e.target.closest ? e.target.closest("button") : null;
    if (!el) return;
    var id = el.id || "";
    var txt = String(el.textContent || "").trim();
    if (id === "btn-auto-sync" || /自動同步|Auto Sync/i.test(txt)) {
      pushLog("CLICK auto-sync button id=" + id + " text=" + txt);
    }
  }, true);

  var tries = 0;
  var timer = setInterval(function () {
    tries += 1;
    ensureUi();
    patchApp();
    if (tries > 1200) clearInterval(timer);
  }, 250);
  pushLog("DEBUG installed");
})();
<\/script>`;

        toggleFocusMode(true);
      } catch (error) {
        setStatus(`載入失敗：${error.message}`, true);
      } finally {
        loadBtn.disabled = false;
      }
    }

    function initAuth() {
      if (!assertConfigured()) return;
      if (!window.google || !google.accounts || !google.accounts.oauth2) {
        setTimeout(initAuth, 120);
        return;
      }

      state.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: APP_SCOPE,
        callback: (resp) => {
          if (resp.error) {
            setStatus(`登入失敗：${resp.error}`, true);
            return;
          }
          state.accessToken = resp.access_token;
          state.hasWriteAccess = google.accounts.oauth2.hasGrantedAllScopes(
            resp,
            "https://www.googleapis.com/auth/spreadsheets",
            "https://www.googleapis.com/auth/drive"
          );
          loadBtn.disabled = false;
          setStatus("登入成功，請點 Load Private App。");
        }
      });
    }

    loginBtn.addEventListener("click", () => {
      if (!state.tokenClient) {
        setStatus("OAuth 尚未初始化，請稍候再試。", true);
        return;
      }
      state.tokenClient.requestAccessToken({ prompt: "consent" });
    });

    loadBtn.addEventListener("click", () => {
      loadPrivateApp();
    });

    toggleShellBtn.addEventListener("click", () => {
      const enable = !document.body.classList.contains("focus-mode");
      toggleFocusMode(enable);
    });

    window.addEventListener("load", () => {
      initAuth();
    });
  </script>
</body>
</html>
