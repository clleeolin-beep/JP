<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talent DB Bridge</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #f8fbff;
      --text: #0f172a;
      --muted: #64748b;
      --card: rgba(255, 255, 255, 0.88);
      --line: rgba(148, 163, 184, 0.28);
      --btn: #111827;
      --btn-hover: #1f2937;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 18%, rgba(191, 219, 254, 0.56), transparent 32%),
        radial-gradient(circle at 84% 16%, rgba(251, 207, 232, 0.52), transparent 35%),
        radial-gradient(circle at 84% 86%, rgba(186, 230, 253, 0.48), transparent 32%),
        #f8fbff;
    }
    #fiber-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.92;
      pointer-events: none;
    }
    #auth-overlay {
      position: fixed;
      inset: 0;
      z-index: 12;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .login-card {
      width: min(760px, 100%);
      border-radius: 28px;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: 0 28px 60px rgba(148, 163, 184, 0.22);
      backdrop-filter: blur(8px);
      padding: 40px 24px 28px;
      text-align: center;
    }
    .chip {
      width: 78px;
      height: 78px;
      margin: 0 auto 12px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #fef3c7, #fde68a);
      box-shadow: 0 10px 22px rgba(251, 191, 36, 0.35);
      font-size: 38px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(38px, 5vw, 56px);
      font-weight: 900;
      letter-spacing: .01em;
      color: #0f172a;
    }
    .sub {
      margin: 0 0 20px;
      font-size: clamp(20px, 3.2vw, 32px);
      font-weight: 700;
      color: #475569;
      letter-spacing: .01em;
    }
    .login-btn {
      border: 0;
      border-radius: 12px;
      background: var(--btn);
      color: #fff;
      height: 58px;
      padding: 0 20px 0 14px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(20px, 3vw, 32px);
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, background .2s ease;
    }
    .login-btn:hover {
      background: var(--btn-hover);
      transform: translateY(-1px);
    }
    .g-badge {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #fff;
      color: #2563eb;
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
    }
    #status {
      margin-top: 14px;
      min-height: 18px;
      font-size: 13px;
      color: var(--muted);
      white-space: pre-wrap;
    }
    #status.error { color: #b91c1c; }
    #status.ok { color: #166534; }
    #app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
      z-index: 6;
      background: #fff;
    }
    #btn-logout {
      position: fixed;
      top: 12px;
      right: 14px;
      z-index: 30;
      border: 0;
      border-radius: 10px;
      padding: 8px 12px;
      color: #fff;
      background: var(--danger);
      font-weight: 700;
      cursor: pointer;
      display: none;
    }
    @media (max-width: 760px) {
      .login-card { border-radius: 20px; padding: 30px 16px 22px; }
      .chip { width: 64px; height: 64px; font-size: 32px; }
      .login-btn { height: 50px; }
      .g-badge { width: 36px; height: 36px; font-size: 22px; }
    }
  </style>
</head>
<body>
  <canvas id="fiber-bg"></canvas>

  <div id="auth-overlay">
    <div class="login-card">
      <div class="chip">AI</div>
      <h1>AI Studio Lab</h1>
      <p class="sub">Secure Access (v2.2.3)</p>
      <button id="btn-login" class="login-btn" type="button">
        <span class="g-badge">G</span>
        <span>Sign in with Google</span>
      </button>
      <div id="status">Waiting for Google sign in...</div>
    </div>
  </div>

  <button id="btn-logout" type="button">Sign out</button>
  <iframe id="app-frame" title="Talent DB Private App"></iframe>

  <script>
    const CLIENT_ID = "615427641075-2e4i1l7smqp30l8v1qrf75c924aro94i.apps.googleusercontent.com";
    const APP_MANIFEST_FILE_ID = "1s38nseW-eMJGzRReXVVAskth6R1ENl3TWTLFXwPgvUQ";
    const APP_SCOPE = [
      "https://www.googleapis.com/auth/spreadsheets",
      "https://www.googleapis.com/auth/drive"
    ].join(" ");

    const STORAGE = {
      token: "jp_bridge_access_token",
      write: "jp_bridge_has_write",
      email: "jp_bridge_profile_email",
      expiry: "jp_bridge_token_expiry_ms"
    };

    const state = {
      tokenClient: null,
      accessToken: "",
      hasWriteAccess: false,
      profileEmail: "",
      expiresAtMs: 0,
      refreshTimer: null,
      appBlobUrl: "",
      bridgeNonce: "",
      bridgeAcked: false
    };

    const overlayEl = document.getElementById("auth-overlay");
    const statusEl = document.getElementById("status");
    const loginBtn = document.getElementById("btn-login");
    const logoutBtn = document.getElementById("btn-logout");
    const frameEl = document.getElementById("app-frame");

    function setStatus(text, type = "") {
      statusEl.textContent = text || "";
      statusEl.className = type;
    }

    function showSignedIn() {
      overlayEl.style.display = "none";
      frameEl.style.display = "block";
      logoutBtn.style.display = "inline-flex";
    }

    function showSignedOut() {
      overlayEl.style.display = "flex";
      frameEl.style.display = "none";
      logoutBtn.style.display = "none";
    }

    function persistAuth() {
      localStorage.setItem(STORAGE.token, state.accessToken || "");
      localStorage.setItem(STORAGE.write, state.hasWriteAccess ? "true" : "false");
      localStorage.setItem(STORAGE.email, state.profileEmail || "");
      localStorage.setItem(STORAGE.expiry, String(state.expiresAtMs || 0));
    }

    function clearPersistedAuth() {
      Object.values(STORAGE).forEach((key) => localStorage.removeItem(key));
    }

    function loadPersistedAuth() {
      state.accessToken = localStorage.getItem(STORAGE.token) || "";
      state.hasWriteAccess = (localStorage.getItem(STORAGE.write) || "") === "true";
      state.profileEmail = localStorage.getItem(STORAGE.email) || "";
      state.expiresAtMs = Number(localStorage.getItem(STORAGE.expiry) || "0");
    }

    async function fetchDriveFileText(fileId) {
      const res = await fetch("https://www.googleapis.com/drive/v3/files/" + fileId + "?alt=media", {
        headers: { Authorization: "Bearer " + state.accessToken }
      });
      if (!res.ok) throw new Error("Drive read failed (" + res.status + ")");
      return res.text();
    }

    async function fetchDriveDocText(fileId) {
      const res = await fetch(
        "https://www.googleapis.com/drive/v3/files/" + fileId + "/export?mimeType=text/plain",
        { headers: { Authorization: "Bearer " + state.accessToken } }
      );
      if (!res.ok) throw new Error("Drive doc export failed (" + res.status + ")");
      return res.text();
    }

    async function fetchAnyText(fileId, preferDoc) {
      try {
        return preferDoc ? await fetchDriveDocText(fileId) : await fetchDriveFileText(fileId);
      } catch (_) {
        return preferDoc ? await fetchDriveFileText(fileId) : await fetchDriveDocText(fileId);
      }
    }

    async function fetchProfileEmail() {
      try {
        const res = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
          headers: { Authorization: "Bearer " + state.accessToken }
        });
        if (!res.ok) return "";
        const data = await res.json();
        return String(data.email || "");
      } catch (_) {
        return "";
      }
    }

    async function inlineCoreFiles(entryHtml, coreFiles) {
      if (!Array.isArray(coreFiles) || !coreFiles.length) return entryHtml;
      const blocks = [];
      for (let i = 0; i < coreFiles.length; i += 1) {
        const file = coreFiles[i];
        if (!file || !file.id) continue;
        const useDocExport = String(file.source || "").toLowerCase() === "gdoc";
        const src = await fetchAnyText(file.id, useDocExport);
        const safeJs = String(src || "").replace(/<\/script>/gi, "<\\/script>");
        blocks.push("<script>\n" + safeJs + "\n<\\/script>");
      }
      if (!blocks.length) return entryHtml;
      const merged = blocks.join("\n");
      if (entryHtml.includes("</body>")) return entryHtml.replace("</body>", merged + "\n</body>");
      return entryHtml + "\n" + merged;
    }

    function bridgeAuthToApp() {
      const nonce = state.bridgeNonce || "";
      const payload = {
        type: "JP_AUTH_BRIDGE",
        bridgeNonce: nonce,
        accessToken: state.accessToken,
        hasWriteAccess: state.hasWriteAccess
      };
      let tries = 0;
      const timer = setInterval(() => {
        tries += 1;
        try {
          const cw = frameEl.contentWindow;
          if (!cw) return;
          cw.postMessage(payload, "*");
          if (cw.sessionStorage) {
            cw.sessionStorage.setItem("gapi_access_token", state.accessToken || "");
            cw.sessionStorage.setItem("gapi_has_write", state.hasWriteAccess ? "true" : "false");
          }
          if (state.bridgeAcked && cw.app) {
            cw.app.accessToken = state.accessToken || cw.app.accessToken;
            cw.app.hasWriteAccess = !!state.hasWriteAccess;
            if (typeof cw.app.onAuthSuccess === "function") cw.app.onAuthSuccess();
            else if (typeof cw.app.fetchSheetNames === "function") cw.app.fetchSheetNames();
            clearInterval(timer);
          }
        } catch (_) {
        }
        if (tries > 60) clearInterval(timer);
      }, 180);
    }

    async function loadPrivateApp() {
      const manifestText = await fetchAnyText(APP_MANIFEST_FILE_ID, true);
      const manifest = JSON.parse((manifestText || "").replace(/^\uFEFF/, ""));
      if (!manifest.entryFileId) throw new Error("Manifest missing entryFileId");

      const useDocExport = String(manifest.entrySource || "").toLowerCase() === "gdoc";
      let entryHtml = await fetchAnyText(manifest.entryFileId, useDocExport);
      entryHtml = (entryHtml || "").replace(/^\uFEFF/, "");
      entryHtml = await inlineCoreFiles(entryHtml, manifest.coreFiles);

      if (state.appBlobUrl) URL.revokeObjectURL(state.appBlobUrl);
      state.appBlobUrl = URL.createObjectURL(new Blob([entryHtml], { type: "text/html" }));
      state.bridgeNonce = Math.random().toString(36).slice(2) + Date.now().toString(36);
      state.bridgeAcked = false;

      frameEl.onload = () => {
        bridgeAuthToApp();
        showSignedIn();
        setStatus("");
      };
      frameEl.src = state.appBlobUrl;
    }

    function scheduleSilentRefresh() {
      if (state.refreshTimer) clearTimeout(state.refreshTimer);
      if (!state.expiresAtMs || !state.tokenClient) return;
      const dueIn = Math.max(15000, state.expiresAtMs - Date.now() - (5 * 60 * 1000));
      state.refreshTimer = setTimeout(() => {
        try { state.tokenClient.requestAccessToken({ prompt: "" }); } catch (_) {}
      }, dueIn);
    }

    function onAuthError(resp) {
      const err = String((resp && resp.error) || "unknown");
      if (err === "access_denied" || err === "popup_closed") {
        setStatus("Sign in cancelled.", "error");
        return;
      }
      setStatus("Sign in failed: " + err, "error");
    }

    async function onAuthSuccess(resp) {
      if (resp.error) {
        onAuthError(resp);
        return;
      }

      state.accessToken = resp.access_token || "";
      state.hasWriteAccess = google.accounts.oauth2.hasGrantedAllScopes(
        resp,
        "https://www.googleapis.com/auth/spreadsheets",
        "https://www.googleapis.com/auth/drive"
      );
      state.expiresAtMs = Date.now() + (Number(resp.expires_in || 3600) * 1000);
      state.profileEmail = await fetchProfileEmail();
      persistAuth();
      scheduleSilentRefresh();

      if (state.profileEmail) setStatus("Signed in as: " + state.profileEmail, "ok");
      try {
        await loadPrivateApp();
      } catch (error) {
        showSignedOut();
        setStatus("Private app load failed: " + error.message, "error");
      }
    }

    function logout() {
      const token = state.accessToken;
      if (state.refreshTimer) clearTimeout(state.refreshTimer);
      state.refreshTimer = null;
      state.accessToken = "";
      state.hasWriteAccess = false;
      state.profileEmail = "";
      state.expiresAtMs = 0;
      clearPersistedAuth();
      frameEl.src = "about:blank";
      showSignedOut();
      setStatus("Signed out.");
      if (token && window.google && google.accounts && google.accounts.oauth2) {
        google.accounts.oauth2.revoke(token, () => {});
      }
    }

    function isTokenLikelyValid() {
      return !!state.accessToken && !!state.expiresAtMs && (Date.now() < state.expiresAtMs - 10000);
    }

    function initAuth() {
      if (!CLIENT_ID || !APP_MANIFEST_FILE_ID) {
        setStatus("Missing CLIENT_ID or APP_MANIFEST_FILE_ID.", "error");
        return;
      }
      if (!window.google || !google.accounts || !google.accounts.oauth2) {
        setTimeout(initAuth, 120);
        return;
      }

      state.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: APP_SCOPE,
        callback: onAuthSuccess
      });

      loadPersistedAuth();
      if (isTokenLikelyValid()) {
        scheduleSilentRefresh();
        loadPrivateApp().then(() => {
          if (state.profileEmail) setStatus("Signed in as: " + state.profileEmail, "ok");
        }).catch((error) => {
          showSignedOut();
          setStatus("Private app load failed: " + error.message, "error");
        });
        return;
      }

      setStatus("Please sign in with Google.");
    }

    window.addEventListener("message", (event) => {
      if (event.source !== frameEl.contentWindow) return;
      const data = event && event.data;
      if (!data || typeof data !== "object") return;
      if (state.bridgeNonce && data.bridgeNonce && data.bridgeNonce !== state.bridgeNonce) return;

      if (data.type === "JP_BRIDGE_READY") state.bridgeAcked = true;

      if (data.type === "JP_BRIDGE_REQUEST") {
        try {
          const cw = frameEl.contentWindow;
          if (!cw) return;
          cw.postMessage({
            type: "JP_AUTH_BRIDGE",
            bridgeNonce: state.bridgeNonce,
            accessToken: state.accessToken,
            hasWriteAccess: state.hasWriteAccess
          }, "*");
        } catch (_) {
        }
      }

      if (data.type === "JP_BRIDGE_AUTH_ERROR") {
        try { state.tokenClient.requestAccessToken({ prompt: "" }); } catch (_) {}
      }
    });

    loginBtn.addEventListener("click", () => {
      if (!state.tokenClient) {
        setStatus("OAuth not ready yet. Please retry.", "error");
        return;
      }
      state.tokenClient.requestAccessToken({ prompt: "select_account" });
    });
    logoutBtn.addEventListener("click", logout);

    function initFiber() {
      const canvas = document.getElementById("fiber-bg");
      const ctx = canvas.getContext("2d");
      let w = 0;
      let h = 0;
      const nodes = [];
      const count = 84;
      const linkDist = 165;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      function rnd(min, max) { return Math.random() * (max - min) + min; }
      function reset() {
        nodes.length = 0;
        for (let i = 0; i < count; i += 1) {
          nodes.push({
            x: rnd(0, w),
            y: rnd(0, h),
            vx: rnd(-0.24, 0.24),
            vy: rnd(-0.24, 0.24),
            r: rnd(1.1, 2.2),
            c: i % 2 ? "rgba(96,165,250,0.88)" : "rgba(244,114,182,0.80)"
          });
        }
      }
      function draw() {
        ctx.clearRect(0, 0, w, h);
        for (let i = 0; i < nodes.length; i += 1) {
          const a = nodes[i];
          a.x += a.vx;
          a.y += a.vy;
          if (a.x < 0 || a.x > w) a.vx *= -1;
          if (a.y < 0 || a.y > h) a.vy *= -1;
          ctx.beginPath();
          ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
          ctx.fillStyle = a.c;
          ctx.fill();

          for (let j = i + 1; j < nodes.length; j += 1) {
            const b = nodes[j];
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const dist = Math.hypot(dx, dy);
            if (dist > linkDist) continue;
            const alpha = (1 - dist / linkDist) * 0.16;
            ctx.strokeStyle = i % 2
              ? "rgba(96,165,250," + alpha.toFixed(3) + ")"
              : "rgba(244,114,182," + alpha.toFixed(3) + ")";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
        requestAnimationFrame(draw);
      }

      resize();
      reset();
      draw();
      window.addEventListener("resize", () => {
        resize();
        reset();
      });
    }

    window.addEventListener("load", () => {
      initFiber();
      initAuth();
    });
  </script>
</body>
</html>
