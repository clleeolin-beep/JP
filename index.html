<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talent DB Launcher</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #f3f4f7;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2f6feb;
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top right, #dbeafe, var(--bg) 45%);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .launcher {
      width: min(760px, 100%);
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 20px 48px rgba(20, 30, 80, 0.15);
      padding: 24px;
    }

    body.mobile .launcher {
      width: min(100%, 940px);
    }

    body.focus-mode {
      display: block;
      padding: 0;
      background: #dbe3ef;
    }

    body.focus-mode .launcher {
      width: 100%;
      max-width: none;
      min-height: 100dvh;
      border-radius: 0;
      box-shadow: none;
      padding: 8px;
      background: transparent;
    }

    body.focus-mode .chrome {
      display: none;
    }

    body.focus-mode #app-host {
      margin-top: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      min-height: 100dvh;
    }

    body.focus-mode #app-frame {
      min-height: 100dvh;
      border-radius: 0;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
    }

    button.secondary {
      background: #4b5563;
    }

    #status {
      margin-top: 16px;
      font-size: 14px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    #status.error { color: var(--danger); }

    #app-host {
      margin-top: 16px;
      min-height: 100px;
      border: 1px dashed #d1d5db;
      border-radius: 12px;
      background: #fafafa;
      padding: 12px;
    }

    #app-frame {
      width: 100%;
      min-height: 72dvh;
      border: 0;
      display: none;
      background: #fff;
      border-radius: 10px;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .toolbar {
      display: none;
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      gap: 8px;
      pointer-events: none;
    }

    body.focus-mode .toolbar {
      display: flex;
    }

    .toolbar button {
      pointer-events: auto;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(31, 41, 55, 0.9);
      color: #fff;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      body {
        padding: 8px;
      }

      .launcher {
        width: 100%;
        padding: 14px;
      }

      #app-frame {
        min-height: 80dvh;
      }
    }
  </style>
</head>
<body>
  <main class="launcher">
    <h1 class="chrome">Talent DB Public Launcher</h1>
    <p class="chrome">This public page only handles sign-in and app bootstrap.</p>
    <div class="actions chrome">
      <button id="btn-login">Sign in with Google</button>
      <button id="btn-load" class="secondary" disabled>Load Private App</button>
    </div>
    <div id="status" class="chrome">Not signed in.</div>
    <div id="app-host">
      <iframe id="app-frame" title="Talent DB App"></iframe>
      <div id="app-placeholder">After sign-in, the app will load from private Google Drive files.</div>
    </div>
    <p class="hint chrome">Set CLIENT_ID and APP_MANIFEST_FILE_ID in this file before publishing.</p>
  </main>
  <div class="toolbar">
    <button id="btn-toggle-shell" type="button">Show Launcher</button>
  </div>

  <script>
    const CLIENT_ID = "615427641075-2e4i1l7smqp30l8v1qrf75c924aro94i.apps.googleusercontent.com";
    const APP_MANIFEST_FILE_ID = "1s38nseW-eMJGzRReXVVAskth6R1ENl3TWTLFXwPgvUQ";
    const APP_SCOPE = [
      "https://www.googleapis.com/auth/spreadsheets",
      "https://www.googleapis.com/auth/drive"
    ].join(" ");

    const state = {
      tokenClient: null,
      accessToken: null,
      hasWriteAccess: false
    };

    const statusEl = document.getElementById("status");
    const loginBtn = document.getElementById("btn-login");
    const loadBtn = document.getElementById("btn-load");
    const frameEl = document.getElementById("app-frame");
    const placeholderEl = document.getElementById("app-placeholder");
    const toggleShellBtn = document.getElementById("btn-toggle-shell");

    function detectDeviceMode() {
      const isMobile = window.matchMedia("(max-width: 900px)").matches ||
        /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || "");
      document.body.classList.toggle("mobile", isMobile);
    }

    function toggleFocusMode(force) {
      const shouldEnable = typeof force === "boolean"
        ? force
        : !document.body.classList.contains("focus-mode");
      document.body.classList.toggle("focus-mode", shouldEnable);
      toggleShellBtn.textContent = shouldEnable ? "Show Launcher" : "Hide Launcher";
    }

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = isError ? "error" : "";
      if (!statusEl.classList.contains("chrome")) statusEl.classList.add("chrome");
    }

    function assertConfigured() {
      if (!CLIENT_ID.startsWith("REPLACE_WITH_")) return true;
      setStatus("Please set CLIENT_ID first.", true);
      return false;
    }

    function assertManifestConfigured() {
      if (!APP_MANIFEST_FILE_ID.startsWith("REPLACE_WITH_")) return true;
      setStatus("Please set APP_MANIFEST_FILE_ID first.", true);
      return false;
    }

    async function fetchDriveFileText(fileId) {
      const ctrl = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 15000);
      const res = await fetch(
        `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
        { headers: { Authorization: `Bearer ${state.accessToken}` }, signal: ctrl.signal }
      );
      clearTimeout(timeout);
      if (!res.ok) throw new Error(`Drive read failed (${res.status})`);
      return await res.text();
    }

    async function fetchDriveDocText(fileId) {
      const ctrl = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 15000);
      const res = await fetch(
        `https://www.googleapis.com/drive/v3/files/${fileId}/export?mimeType=text/plain`,
        { headers: { Authorization: `Bearer ${state.accessToken}` }, signal: ctrl.signal }
      );
      clearTimeout(timeout);
      if (!res.ok) throw new Error(`Drive doc export failed (${res.status})`);
      return await res.text();
    }

    async function fetchAnyText(fileId, preferDoc = false) {
      if (preferDoc) {
        try {
          return await fetchDriveDocText(fileId);
        } catch (error) {
          return await fetchDriveFileText(fileId);
        }
      }

      try {
        return await fetchDriveFileText(fileId);
      } catch (error) {
        return await fetchDriveDocText(fileId);
      }
    }

    async function loadManifest() {
      const text = await fetchAnyText(APP_MANIFEST_FILE_ID, true);
      let manifest;
      try {
        manifest = JSON.parse(text);
      } catch (error) {
        throw new Error("Manifest is not valid JSON.");
      }
      if (!manifest.entryFileId) throw new Error("Manifest missing entryFileId.");
      return manifest;
    }

    async function loadPrivateApp() {
      if (!state.accessToken) {
        setStatus("Please sign in first.", true);
        return;
      }
      if (!assertManifestConfigured()) return;

      loadBtn.disabled = true;
      setStatus("Loading manifest...");
      try {
        const manifest = await loadManifest();
        setStatus("Manifest loaded. Loading entry...");
        const useDocExport = String(manifest.entrySource || "").toLowerCase() === "gdoc";
        let entryHtml = await fetchAnyText(manifest.entryFileId, useDocExport);
        const coreFiles = Array.isArray(manifest.coreFiles) ? manifest.coreFiles : [];
        if (coreFiles.length) {
          setStatus(`Entry loaded. Loading core files (0/${coreFiles.length})...`);
          // When modular core files are provided, strip legacy inline scripts from entry html
          // to avoid duplicate class declarations and runtime conflicts.
          entryHtml = entryHtml.replace(/<script>([\s\S]*?)<\/script>/gi, "");
          const blocks = [];
          for (let i = 0; i < coreFiles.length; i += 1) {
            const file = coreFiles[i];
            if (!file || !file.id) continue;
            setStatus(`Loading core files (${i + 1}/${coreFiles.length}): ${file.name || file.id}`);
            const src = await fetchAnyText(
              file.id,
              String(file.source || "").toLowerCase() === "gdoc"
            );
            const label = String(file.name || file.id).replace(/</g, "_");
            const safeJs = String(src || "").replace(/<\/script>/gi, "<\\/script>");
            blocks.push(`<script>\n/* ${label} */\n${safeJs}\n<\/script>`);
          }
          if (blocks.length) {
            const merged = blocks.join("\n");
            entryHtml = entryHtml.includes("</body>")
              ? entryHtml.replace("</body>", `${merged}\n</body>`)
              : `${entryHtml}\n${merged}`;
          }
        }
        const tokenSeed = `<script>
window.__JP_TOKEN = ${JSON.stringify(state.accessToken)};
sessionStorage.setItem("gapi_access_token", ${JSON.stringify(state.accessToken)});
sessionStorage.setItem("gapi_has_write", ${JSON.stringify(state.hasWriteAccess ? "true" : "false")});
<\/script>`;
        const bridgePatch = `<script>
(function () {
  function getApp() { return window.app || null; }
  function getCheckedAf() {
    var list = Array.prototype.slice.call(document.querySelectorAll('#af-checkboxes input[type="checkbox"]'));
    if (!list.length) return null;
    return list.filter(function (cb) { return cb.checked; }).map(function (cb) { return cb.value; });
  }
  function rememberAfState() {
    var app = getApp();
    if (!app) return;
    var selected = getCheckedAf();
    if (!selected) return;
    var allCount = document.querySelectorAll('#af-checkboxes input[type="checkbox"]').length;
    if (!selected.length || selected.length === allCount) app.__jpAfSelected = null;
    else app.__jpAfSelected = selected.slice();
  }
  function patchAfFilter() {
    var app = getApp();
    if (!app || app.__jpAfPatched || typeof app.getSelectedAfValues !== 'function') return false;
    app.__jpAfPatched = true;
    var originalGet = app.getSelectedAfValues.bind(app);
    app.getSelectedAfValues = function () {
      var selected = originalGet();
      var allCount = document.querySelectorAll('#af-checkboxes input[type="checkbox"]').length;
      if (app.__jpAfSelected && app.__jpAfSelected.length) return app.__jpAfSelected.slice();
      if (allCount && selected.length === allCount) return [];
      return selected;
    };
    if (typeof app.toggleMode === 'function') {
      var originalToggle = app.toggleMode.bind(app);
      app.toggleMode = function () {
        rememberAfState();
        originalToggle();
      };
    }
    document.addEventListener('change', function (e) {
      if (e.target && e.target.matches('#af-checkboxes input[type="checkbox"]')) rememberAfState();
    }, true);
    return true;
  }

  function ensureModal() {
    if (document.getElementById('jp-talent-modal')) return;
    var modal = document.createElement('div');
    modal.id = 'jp-talent-modal';
    modal.className = 'jp-talent-modal';
    modal.innerHTML =
      '<div class="jp-talent-card">' +
      '<div class="jp-talent-head">' +
      '<strong id="jp-talent-title">Talent Detail</strong>' +
      '<button type="button" id="jp-talent-close">X</button>' +
      '</div>' +
      '<div id="jp-talent-body" class="jp-talent-body"></div>' +
      '<div class="jp-talent-actions">' +
      '<button type="button" id="jp-talent-open" class="secondary">Open Profile</button>' +
      '</div>' +
      '</div>';
    document.body.appendChild(modal);
    modal.addEventListener('click', function (e) {
      if (e.target === modal) modal.classList.remove('show');
    });
    document.getElementById('jp-talent-close').addEventListener('click', function () {
      modal.classList.remove('show');
    });
  }

  function findIndexFromCard(card) {
    var app = getApp();
    if (!app || !card || !app.dataStore || !app.colMap) return -1;
    var nameEl = card.querySelector('.tech-name');
    var storeEl = card.querySelector('.store-name');
    if (!nameEl || !storeEl) return -1;
    var nameText = (nameEl.textContent || '').replace(/\\([^)]*\\)/g, '').trim();
    var storeText = (storeEl.textContent || '').trim();
    for (var i = 0; i < app.dataStore.length; i += 1) {
      var raw = app.dataStore[i]._raw || [];
      var n = String(raw[app.colMap.name] || '').trim();
      var s = String(raw[app.colMap.store] || '').trim();
      if (n === nameText && s === storeText) return i;
    }
    return -1;
  }

  function openDetail(idx) {
    var app = getApp();
    if (!app || idx < 0 || !app.dataStore[idx]) return;
    ensureModal();
    var raw = app.dataStore[idx]._raw || [];
    var title = document.getElementById('jp-talent-title');
    var body = document.getElementById('jp-talent-body');
    var openBtn = document.getElementById('jp-talent-open');
    var name = String(raw[app.colMap.name] || 'Talent');
    var url = String(raw[app.colMap.url] || '').trim();
    title.textContent = name + ' Detail';
    function row(k, v) {
      var safe = String(v || '-').replace(/</g, '&lt;');
      return '<div class="jp-row"><label>' + k + '</label><pre>' + safe + '</pre></div>';
    }
    body.innerHTML =
      row('Store', raw[app.colMap.store]) +
      row('Name', raw[app.colMap.name]) +
      row('Tech ID', raw[app.colMap.techId]) +
      row('Age', raw[app.colMap.age]) +
      row('Stats', raw[app.colMap.stats]) +
      row('Price', raw[app.colMap.price]) +
      row('AF', raw[app.colMap.af]) +
      row('Level', raw[app.colMap.level]) +
      row('Schedule', raw[app.colMap.schedule]) +
      row('URL', url);
    openBtn.disabled = !url;
    openBtn.onclick = function () {
      if (url) window.open(url, '_blank', 'noopener,noreferrer');
    };
    document.getElementById('jp-talent-modal').classList.add('show');
  }

  function patchCardInteraction() {
    var app = getApp();
    var grid = document.getElementById('catalogGrid');
    if (!app || !grid || grid.dataset.jpCardPatch === '1') return false;
    grid.dataset.jpCardPatch = '1';
    grid.addEventListener('click', function (e) {
      if (app.isEditMode) return;
      var card = e.target.closest('.card');
      if (!card) return;
      if (e.target.closest('.fav-btn') || e.target.closest('.card-checkbox')) return;
      e.preventDefault();
      e.stopPropagation();
      var idx = findIndexFromCard(card);
      if (idx >= 0) openDetail(idx);
    }, true);
    grid.addEventListener('contextmenu', function (e) {
      var card = e.target.closest('.card');
      if (!card) return;
      var idx = findIndexFromCard(card);
      if (idx < 0) return;
      var raw = app.dataStore[idx]._raw || [];
      var url = String(raw[app.colMap.url] || '').trim();
      if (!url) return;
      e.preventDefault();
      window.open(url, '_blank', 'noopener,noreferrer');
    }, true);
    return true;
  }

  var tries = 0;
  var timer = setInterval(function () {
    tries += 1;
    patchAfFilter();
    patchCardInteraction();
    if (tries > 120) clearInterval(timer);
  }, 200);
})();
<\/script>`;
        const responsivePatch = `<style id="launcher-mobile-patch">
/* Desktop: compact single-line filters, no awkward gaps */
.filter-tools {
  display: flex !important;
  align-items: center !important;
  gap: 10px !important;
  flex-wrap: nowrap !important;
}
.filter-tools > h3 {
  margin: 0 !important;
  min-width: 92px;
  flex: 0 0 auto;
}
.filter-tools > .jp-filter-toggle {
  display: none;
  border: none;
  border-radius: 8px;
  padding: 6px 10px;
  background: #4b5563;
  color: #fff;
  font-weight: 700;
}
.filter-tools > div {
  display: flex !important;
  flex-wrap: nowrap !important;
  align-items: center !important;
  gap: 8px !important;
  flex: 1 !important;
  overflow-x: auto;
  padding-bottom: 2px;
}
.filter-tools > div > * {
  flex: 0 0 auto;
}
#searchInput {
  min-width: 240px !important;
}

@media (max-width: 900px) {
  .filter-tools {
    display: block !important;
  }
  .filter-tools > h3 {
    display: inline-flex !important;
    margin-right: 8px !important;
  }
  .filter-tools > .jp-filter-toggle {
    display: inline-flex !important;
    margin-bottom: 6px;
  }
  .filter-tools > div {
    display: grid !important;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px !important;
    overflow: visible;
  }
  .filter-tools.jp-collapsed > div {
    display: none !important;
  }
  .filter-tools #searchInput {
    grid-column: 1 / -1;
    min-width: 0 !important;
    width: 100% !important;
  }
  .filter-tools .custom-multi-select {
    min-width: 0 !important;
  }
  .catalog-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
}

.jp-talent-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 99999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 14px;
}
.jp-talent-modal.show { display: flex; }
.jp-talent-card {
  width: min(760px, 100%);
  max-height: 86dvh;
  overflow: auto;
  background: #fff;
  border-radius: 12px;
  padding: 14px;
}
.jp-talent-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.jp-talent-head button {
  border: 0;
  border-radius: 8px;
  padding: 6px 10px;
  background: #ef4444;
  color: #fff;
  font-weight: 700;
}
.jp-talent-body .jp-row {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid #eef2f7;
}
.jp-talent-body label {
  font-weight: 700;
  color: #475569;
}
.jp-talent-body pre {
  margin: 0;
  white-space: pre-wrap;
  font-family: inherit;
}
.jp-talent-actions {
  margin-top: 12px;
  display: flex;
  gap: 8px;
}
.jp-talent-actions button {
  border: 0;
  border-radius: 8px;
  padding: 8px 12px;
  background: #2563eb;
  color: #fff;
  font-weight: 700;
}
.jp-talent-actions button.secondary { background: #475569; }
</style>`;
        let seededHtml = entryHtml.includes("<head>")
          ? entryHtml.replace("<head>", `<head>${tokenSeed}${responsivePatch}${bridgePatch}`)
          : `${tokenSeed}${responsivePatch}${bridgePatch}${entryHtml}`;

        if (!/meta\s+name=["']viewport["']/i.test(seededHtml)) {
          seededHtml = seededHtml.replace("<head>", '<head><meta name="viewport" content="width=device-width, initial-scale=1.0">');
        }

        const blob = new Blob([seededHtml], { type: "text/html" });
        const blobUrl = URL.createObjectURL(blob);

        frameEl.src = blobUrl;
        frameEl.style.display = "block";
        placeholderEl.style.display = "none";
        setStatus("Private app loaded.");
        toggleFocusMode(true);
      } catch (error) {
        const msg = (error && error.name === "AbortError")
          ? "Load failed: request timeout while reading Drive files."
          : `Load failed: ${error.message}`;
        setStatus(msg, true);
      } finally {
        loadBtn.disabled = false;
      }
    }

    function initAuth() {
      if (!assertConfigured()) return;
      state.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: APP_SCOPE,
        callback: (resp) => {
          if (resp.error) {
            setStatus(`Sign-in failed: ${resp.error}`, true);
            return;
          }
          state.accessToken = resp.access_token;
          state.hasWriteAccess = google.accounts.oauth2.hasGrantedAllScopes(
            resp,
            "https://www.googleapis.com/auth/spreadsheets",
            "https://www.googleapis.com/auth/drive"
          );
          loadBtn.disabled = false;
          setStatus("Signed in. Loading private app...");
          loadPrivateApp();
        }
      });
    }

    loginBtn.addEventListener("click", () => {
      if (!state.tokenClient) {
        setStatus("OAuth is not initialized yet.", true);
        return;
      }
      state.tokenClient.requestAccessToken({ prompt: "consent" });
    });

    loadBtn.addEventListener("click", () => {
      loadPrivateApp();
    });

    toggleShellBtn.addEventListener("click", () => {
      toggleFocusMode(document.body.classList.contains("focus-mode") ? false : true);
    });

    window.addEventListener("resize", detectDeviceMode);
    window.addEventListener("load", () => {
      detectDeviceMode();
      initAuth();
    });
  </script>
</body>
</html>
