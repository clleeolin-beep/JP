        class Utility {
            static generateID() { return 'N' + Math.floor(Math.random() * 10000).toString().padStart(4, '0'); }
            static showLoading(msg) { document.getElementById('loading-text').innerText = msg; document.getElementById('loading-overlay').style.display = 'flex'; }
            static hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }
            static cleanDriveUrl(url) {
                if (!url) return "";
                let parsedUrl = String(url).trim();
                if (parsedUrl.includes('drive.google.com')) {
                    const match = parsedUrl.match(/[-\w]{25,}/);
                    if (match) return `https://drive.google.com/thumbnail?authuser=0&sz=w800&id=${match[0]}`;
                }
                return parsedUrl.startsWith('http') ? parsedUrl : "";
            }
            
            static showToast(msg, isError = false) {
                const toast = document.getElementById('toast-container');
                toast.innerText = msg;
                if (isError) {
                    toast.style.background = '#e53935'; 
                } else if (msg.includes('順序已變更') || msg.includes('複製') || msg.includes('解析')) {
                    toast.style.background = 'var(--warning)';
                } else {
                    toast.style.background = 'var(--success)';
                }
                
                toast.classList.add('show');
                if (this.toastTimeout) clearTimeout(this.toastTimeout);
                this.toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 3000);
            }

            static parseStats(rawStats) {
                let h=0, b=0, w=0, hp=0, cup='?';
                if (!rawStats) return {h, b, w, hp, cup};

                let hMatch = rawStats.match(/(?:T|身高|身長)?\s*(\d{3})\s*(?:cm)?/i);
                if(hMatch) h = parseInt(hMatch[1]);
                
                let bMatch = rawStats.match(/B\s*(\d{2,3})/i);
                let wMatch = rawStats.match(/W\s*(\d{2,3})/i);
                let hMatch2 = rawStats.match(/H\s*(\d{2,3})/i);
                
                if (bMatch && wMatch && hMatch2) {
                    b = parseInt(bMatch[1]); w = parseInt(wMatch[1]); hp = parseInt(hMatch2[1]);
                } else {
                    let nums = rawStats.match(/\b\d{2,3}\b/g);
                    if (nums) {
                        nums = nums.map(Number);
                        let bwh = nums.filter(n => n < 140);
                        if (bwh.length >= 3) { b = bwh[0]; w = bwh[1]; hp = bwh[2]; }
                    }
                }

                let cupMatch = rawStats.match(/\(([A-Z])\)/i) || rawStats.match(/(?:^|[\s/])([A-Z])(?:[\s/]|$|cup|罩杯)/i);
                if (cupMatch) cup = cupMatch[1].toUpperCase();

                return {h, b, w, hp, cup};
            }

            static getCupScore(rawStats) {
                const {cup} = this.parseStats(rawStats);
                if (cup === '?') return 0;
                return cup.charCodeAt(0) - 64; 
            }

            static getBodyScore(rawStats) {
                const {h, b, w, hp} = this.parseStats(rawStats);
                if (!h || !b || !w || !hp) return 0;
                let hourglass = (b - w) + (hp - w);
                return Math.min(99, Math.max(1, 40 + hourglass)); 
            }

            // ===== 核心：SVG生成與身型分類 =====
            static getBodyShapeData(rawStats) {
                const parsed = this.parseStats(rawStats);
                const {h, b, w, hp, cup} = parsed;
                if (!h || !b || !w || !hp) return null;

                // 身型分類判定 (蘋果/梨/沙漏/倒三角/H)
                let s2 = h * 0.46; // 推算肩寬*2
                let shapeType = "H型", shapeIcon = "▯";
                
                if (w > hp) {
                    shapeType = "蘋果型"; shapeIcon = "🍎";
                } else if ((b - w) >= 17 && (hp - w) >= 22) { // 稍微放寬標準的沙漏
                    shapeType = "沙漏型"; shapeIcon = "⏳";
                } else if (hp - s2 > 3) {
                    shapeType = "梨型"; shapeIcon = "🍐";
                } else if (s2 - hp > 3) {
                    shapeType = "倒三角"; shapeIcon = "🔻";
                }

                // 分數顏色
                let hourglass = (b - w) + (hp - w);
                let score = Math.min(99, Math.max(1, 40 + hourglass));
                let scoreColor = '#4caf50'; 
                if (score >= 98) scoreColor = '#6200ea'; 
                else if (score >= 95) scoreColor = '#e91e63'; 
                else if (score >= 90) scoreColor = '#ff9800'; 

                // 實測罩杯
                let estUB = Math.round(((w + 10) + (h * 0.43)) / 2);
                let diff = b - estUB;
                let cupNames = ['AA','A','B','C','D','E','F','G','H','I','J','K','L'];
                let trueCupIdx = Math.floor((diff - 7.5) / 2.5);
                let trueCup = trueCupIdx >= 0 ? (cupNames[Math.min(trueCupIdx, cupNames.length-1)]) : 'AA-';

                let claimedCupIdx = cupNames.indexOf(cup);
                if (claimedCupIdx === -1 && cup !== '?') {
                    claimedCupIdx = cup.charCodeAt(0) - 64; 
                }
                
                let cupDiffColor = '#9e9e9e';
                if (claimedCupIdx !== -1 && trueCupIdx >= 0) {
                    let idxDiff = claimedCupIdx - trueCupIdx;
                    if (idxDiff <= 0) cupDiffColor = '#4caf50'; 
                    else if (idxDiff === 1) cupDiffColor = '#fbc02d'; 
                    else if (idxDiff === 2) cupDiffColor = '#f57c00'; 
                    else if (idxDiff === 3) cupDiffColor = '#d32f2f'; 
                    else cupDiffColor = '#b71c1c'; 
                } else {
                    cupDiffColor = '#4caf50'; 
                }

                // 胖瘦判定
                const whtr = w / h;
                let shapeColor = '#4caf50', whtrText = '標準';
                if (whtr < 0.36) { shapeColor = '#2196f3'; whtrText = '瘦'; }
                else if (whtr > 0.41) { shapeColor = '#e91e63'; whtrText = '胖'; }

                // SVG 繪製 (頭部圓形 + 身體曲線)
                const avgH = 158, avgB = 82, avgW = 61, avgH_p = 86;
                const scaleY = 100 / 180, scaleX = 0.8; 
                const getPoints = (height, bust, waist, hip) => {
                    const yHead = 100 - (height * scaleY);
                    const yBust = yHead + (height * 0.28 * scaleY);
                    const yWaist = yHead + (height * 0.40 * scaleY);
                    const yHip = yHead + (height * 0.52 * scaleY);
                    const yFoot = 100, wHead = 10, wBust = bust / 2 * scaleX;
                    const wWaist = waist / 2 * scaleX, wHip = hip / 2 * scaleX;
                    const wFoot = 12, cx = 40; 
                    return { yHead, yBust, yWaist, yHip, yFoot, wHead, wBust, wWaist, wHip, wFoot, cx };
                };

                const avg = getPoints(avgH, avgB, avgW, avgH_p);
                const tgt = getPoints(h, b, w, hp);
                
                const makeShape = (p, color, isDashed) => {
                    const strokeAttr = isDashed ? `stroke="#ccc" stroke-dasharray="2,2" fill="none"` : `fill="${color}" opacity="0.6" stroke="${color}"`;
                    return `
                        <circle cx="${p.cx}" cy="${p.yHead}" r="${p.wHead*0.7}" ${strokeAttr} />
                        <path d="M ${p.cx - p.wHead*0.4},${p.yHead+5}
                                 Q ${p.cx - p.wBust},${p.yBust - 5} ${p.cx - p.wBust},${p.yBust}
                                 Q ${p.cx - p.wWaist*0.8},${(p.yBust+p.yWaist)/2} ${p.cx - p.wWaist},${p.yWaist}
                                 Q ${p.cx - p.wHip*1.1},${(p.yWaist+p.yHip)/2} ${p.cx - p.wHip},${p.yHip}
                                 L ${p.cx - p.wFoot},${p.yFoot}
                                 L ${p.cx + p.wFoot},${p.yFoot}
                                 L ${p.cx + p.wHip},${p.yHip}
                                 Q ${p.cx + p.wHip*1.1},${(p.yWaist+p.yHip)/2} ${p.cx + p.wWaist},${p.yWaist}
                                 Q ${p.cx + p.wWaist*0.8},${(p.yBust+p.yWaist)/2} ${p.cx + p.wBust},${p.yBust}
                                 Q ${p.cx + p.wBust},${p.yBust - 5} ${p.cx + p.wHead*0.4},${p.yHead+5} Z"
                              ${strokeAttr} />
                    `;
                };

                const avgShape = makeShape(avg, '#ccc', true);
                const tgtShape = makeShape(tgt, shapeColor, false);

                const svgHtml = `
                    <svg width="100%" height="26px" viewBox="0 0 80 100" preserveAspectRatio="xMidYMid meet">
                        ${avgShape}
                        ${tgtShape}
                    </svg>
                    <div style="font-size:10px; font-weight:bold; color:${shapeColor}; margin-top:2px;">${whtrText}</div>
                `;

                return { score, scoreColor, trueCup, cupDiffColor, svgHtml, shapeType, shapeIcon };
            }

            // ===== 時間軸與行事曆渲染核心 =====
            static timeToMins(tStr) {
                let [h, m] = tStr.split(':').map(Number);
                if (h < 6) h += 24; 
                return h * 60 + m;
            }

            static generateScheduleHTML(scheduleStr) {
                if (!scheduleStr) return '';
                const lines = scheduleStr.split('\n').filter(l => l.trim() !== '').slice(0, 7);
                if (lines.length === 0) return '';

                let schHtml = '';
                lines.forEach(line => {
                    const match = line.match(/^(\d{1,2}\/\d{1,2})\s*(\(.\))?\s*(.+)$/);
                    if (match) {
                        const date = match[1];
                        const dayClean = (match[2] || '').replace(/[()]/g, ''); 
                        const timeStr = match[3];

                        let trackHtml = '';
                        if (timeStr.includes('休') || timeStr.includes('み')) {
                            trackHtml = `<div class="sch-fill-vert off" title="${date} 休息"></div>`;
                        } else {
                            const tMatch = timeStr.match(/(\d{1,2}:\d{2})\s*[-~〜ー]\s*(\d{1,2}:\d{2})/);
                            if (tMatch) {
                                let startMins = this.timeToMins(tMatch[1]);
                                let endMins = this.timeToMins(tMatch[2]);
                                if (endMins <= startMins) endMins += 24 * 60; 

                                // 基準：09:00 (540分) ~ 06:00 (1800分) = 總共 1260 分
                                const BASE_MINS = 540;
                                const TOTAL_MINS = 1260;

                                let renderStart = Math.max(BASE_MINS, startMins);
                                let renderEnd = Math.min(BASE_MINS + TOTAL_MINS, endMins);

                                let topPct = ((renderStart - BASE_MINS) / TOTAL_MINS) * 100;
                                let heightPct = ((renderEnd - renderStart) / TOTAL_MINS) * 100;
                                if(topPct < 0) topPct = 0;
                                if(heightPct < 0) heightPct = 0;
                                if(topPct + heightPct > 100) heightPct = 100 - topPct;

                                trackHtml = `<div class="sch-fill-vert" style="top:${topPct}%; height:${heightPct}%;" title="${date} ${tMatch[1]}-${tMatch[2]}"></div>`;
                            }
                        }

                        schHtml += `
                            <div class="sch-col">
                                <div class="sch-day">${date}<br>${dayClean}</div>
                                <div class="sch-track-vert" title="${date} ${timeStr}">
                                    ${trackHtml}
                                </div>
                            </div>
                        `;
                    }
                });

                // 加入橫向刻度線與時間標籤 (12, 18, 24, 6)
                // 12:00 = 180m (180/1260 = 14.3%)
                // 18:00 = 540m (540/1260 = 42.9%)
                // 24:00 = 900m (900/1260 = 71.4%)
                // 06:00 = 1260m (100%)
                return `
                    <div class="sch-wrapper">
                        <div class="sch-time-axis">
                            <span style="top:14.3%;">12</span>
                            <span style="top:42.9%;">18</span>
                            <span style="top:71.4%;">24</span>
                        </div>
                        <div class="sch-container-vert">
                            <div class="sch-grid-line" style="top:14.3%;"></div>
                            <div class="sch-grid-line" style="top:42.9%;"></div>
                            <div class="sch-grid-line" style="top:71.4%;"></div>
                            <div class="sch-grid-line" style="top:100%;"></div>
                            ${schHtml}
                        </div>
                    </div>
                `;
            }
        }

        class ImageCropperService {
            constructor() {
                this.modal = document.getElementById('cropperModal');
                this.imageElement = document.getElementById('cropperImage');
                this.cropper = null;
                this.pendingBlob = null; 

                document.getElementById('fileInputPhoto').addEventListener('change', (e) => this.handleFile(e.target.files[0]));
                
                document.addEventListener('paste', (e) => {
                    if (!window.app || !window.app.accessToken) return;
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                    for (let index in items) {
                        const item = items[index];
                        if (item.kind === 'file' && item.type.includes('image/')) {
                            const file = item.getAsFile();
                            this.handleFile(file);
                            e.preventDefault();
                            break; 
                        }
                    }
                });
            }

            handleFile(file) {
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        this.imageElement.src = event.target.result;
                        this.openModal();
                    };
                    reader.readAsDataURL(file);
                }
            }

            openModal() {
                this.modal.style.display = 'flex';
                if(this.cropper) this.cropper.destroy();
                this.cropper = new Cropper(this.imageElement, { aspectRatio: 3 / 4, viewMode: 1, autoCropArea: 1 });
            }

            closeModal() {
                this.modal.style.display = 'none';
                if(this.cropper) this.cropper.destroy();
                document.getElementById('fileInputPhoto').value = '';
            }

            cropAndPrepare() {
                if(this.cropper) {
                    const canvas = this.cropper.getCroppedCanvas({ width: 600, height: 800 });
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                    
                    document.getElementById('preview_photo').src = dataUrl;
                    document.getElementById('preview_photo').style.display = 'block';
                    document.getElementById('text_photo').style.display = 'none';
                    document.getElementById('btn_del_photo').style.display = 'flex';
                    
                    canvas.toBlob((blob) => { this.pendingBlob = blob; }, 'image/jpeg', 0.85);
                    this.closeModal();
                }
            }

            async uploadToDrive(blob, fileName, accessToken) {
                if (!blob) return null;
                const metadata = { name: fileName, parents: [DRIVE_FOLDER_ID] };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', blob);

                try {
                    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + accessToken },
                        body: form
                    });
                    const data = await res.json();
                    if(!res.ok) throw new Error(data.error.message);
                    return data.webViewLink;
                } catch(e) {
                    console.error("上傳失敗:", e);
                    throw e;
                }
            }
        }

        class AppCore {
            constructor() {
                this.dataStore = [];
                this.colMap = {};
                this.headerRow = [];
                this.accessToken = null;
                this.tokenClient = null;
                this.isEditMode = true; 
                
                this.registerKeyboardShortcuts();
                this.setupDatePasting();
                this.setupSchedulePasting();
                this.setupMagicPasting(); 
            }

            get currentSheet() { return document.getElementById('v_sheet').value; }

            populateTimeDropdowns() {
                const startSel = document.getElementById('filterTimeStart');
                const endSel = document.getElementById('filterTimeEnd');
                if(startSel.options.length > 0) return; 

                startSel.innerHTML = '<option value="">🕒 起始</option>';
                endSel.innerHTML = '<option value="">🕒 結束</option>';
                
                for(let h = 9; h <= 29; h++) {
                    let displayH = h >= 24 ? h - 24 : h;
                    let label = `${displayH.toString().padStart(2,'0')}:00`;
                    let val = h * 60;
                    startSel.innerHTML += `<option value="${val}">${label}</option>`;
                    endSel.innerHTML += `<option value="${val}">${label}</option>`;
                }
            }

            setupMagicPasting() {
                const magicInput = document.getElementById('v_magic_paste');
                if (!magicInput) return;

                magicInput.addEventListener('paste', (e) => {
                    e.preventDefault();
                    let text = (e.clipboardData || window.clipboardData).getData('text');
                    
                    let mName = text.match(/(?:Name|名前)\s*([^\sAge年齢]+)/i);
                    if (mName) document.getElementById('v_name').value = mName[1].trim();

                    let mAge = text.match(/(?:Age|年齢)\s*(\d+)/i) || text.match(/(\d+)\s*(?:歳|才)/);
                    if (mAge) document.getElementById('v_age').value = mAge[1] + "歲";

                    let mStats = text.match(/(?:BodySize|Size|スタイル)\s*(T\d+.*?)(?:EntryDay|出勤情報|入店|$)/i) || text.match(/(T\d{3}\s*B\d{2,3}.*?H\d{2,3})/i);
                    if (mStats) document.getElementById('v_stats').value = mStats[1].trim();

                    let mDate = text.match(/(?:EntryDay|入店日?)\s*(\d{4})[年/.-](\d{1,2})[月/.-](\d{1,2})/i);
                    if (mDate) {
                        document.getElementById('v_start_date').value = `${mDate[1]}-${mDate[2].padStart(2,'0')}-${mDate[3].padStart(2,'0')}`;
                    }

                    let scheduleText = text;
                    let mSch = text.match(/出勤情報\s*([\s\S]+)/);
                    if (mSch) {
                        scheduleText = mSch[1];
                    }
                    
                    document.getElementById('v_schedule').value = Utility.parseAndFormatSchedule(scheduleText);
                    
                    Utility.showToast('✨ 総合情報を解析し、各項目に自動入力しました！');
                    setTimeout(() => { magicInput.value = ''; }, 100);
                });
            }

            setupSchedulePasting() {
                const scheduleInput = document.getElementById('v_schedule');
                scheduleInput.addEventListener('paste', (e) => {
                    e.preventDefault();
                    let pastedText = (e.clipboardData || window.clipboardData).getData('text');
                    scheduleInput.value = Utility.parseAndFormatSchedule(pastedText);
                    Utility.showToast('✅ 班表已成功解析貼上');
                });
            }

            setupDatePasting() {
                const dateInput = document.getElementById('v_start_date');
                dateInput.addEventListener('paste', (e) => {
                    e.preventDefault();
                    let pastedText = (e.clipboardData || window.clipboardData).getData('text');
                    
                    let match = pastedText.match(/(\d{4})\s*[年\/\-.]\s*(\d{1,2})\s*[月\/\-.]\s*(\d{1,2})/);
                    if (match) {
                        let y = match[1];
                        let m = match[2].padStart(2, '0');
                        let d = match[3].padStart(2, '0');
                        dateInput.value = `${y}-${m}-${d}`;
                    } else {
                        Utility.showToast('⚠️ 無法辨識日期格式，請手動選擇或輸入', true);
                    }
                });
            }

            registerKeyboardShortcuts() {
                document.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
                        e.preventDefault();
                        const saveBtn = document.getElementById('btn-save');
                        if (this.accessToken && !saveBtn.disabled) {
                            this.saveToGoogleSheet();
                        } else if (!this.accessToken) {
                            Utility.showToast('⚠️ 請先完成 Google 登入授權！', true);
                        } else {
                            Utility.showToast('⚠️ 無法儲存：請確認必要欄位已填寫完畢。', true);
                        }
                    }
                });
            }

            toggleMode() {
                this.isEditMode = !this.isEditMode;
                const container = document.getElementById('app-container');
                const btn = document.getElementById('btn-mode-toggle');
                
                if (this.isEditMode) {
                    container.classList.remove('view-mode');
                    container.classList.add('edit-mode');
                    btn.innerHTML = '👁️ <span class="btn-text">切換瀏覽</span>';
                    btn.className = 'secondary';
                    btn.style.background = '';
                } else {
                    container.classList.remove('edit-mode');
                    container.classList.add('view-mode');
                    btn.innerHTML = '📝 <span class="btn-text">切換編輯</span>';
                    btn.className = 'primary';
                    btn.style.background = '#e91e63'; 
                }
                
                this.renderCatalog();
            }

            initGoogleAuth() {
                const storedToken = sessionStorage.getItem('gapi_access_token');
                this.populateTimeDropdowns();

                this.tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive',
                    callback: (resp) => {
                        if (resp.error) return;
                        this.accessToken = resp.access_token;
                        sessionStorage.setItem('gapi_access_token', resp.access_token);
                        this.onAuthSuccess();
                    }
                });

                if (storedToken) {
                    this.accessToken = storedToken;
                    this.onAuthSuccess();
                }
            }

            onAuthSuccess() {
                document.getElementById('auth-banner').style.display = 'none';
                this.fetchSheetNames();
            }

            triggerAuth() {
                if (!this.accessToken && this.tokenClient) {
                    this.tokenClient.requestAccessToken({ prompt: 'select_account consent' });
                }
            }

            async fetchSheetNames() {
                if (!this.accessToken) return;
                try {
                    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets.properties.title`, {
                        headers: { 'Authorization': `Bearer ${this.accessToken}` }
                    });
                    const data = await res.json();
                    
                    if (data.error) {
                        if (data.error.code === 401) {
                            this.handleTokenExpired();
                            return;
                        }
                        throw new Error(data.error.message);
                    }

                    if (data.sheets) {
                        const select = document.getElementById('v_sheet');
                        select.innerHTML = ''; 
                        data.sheets.forEach(s => {
                            const opt = document.createElement('option');
                            opt.value = s.properties.title;
                            opt.innerText = s.properties.title;
                            select.appendChild(opt);
                        });
                        this.loadSheetData(); 
                    }
                } catch (e) {
                    alert(`❌ 讀取失敗！請確認 Google 帳號授權狀態。`);
                }
            }

            handleTokenExpired() {
                sessionStorage.removeItem('gapi_access_token');
                this.accessToken = null;
                document.getElementById('auth-banner').style.display = 'block';
                document.getElementById('auth-banner').innerHTML = '⚠️ 登入已過期，請點擊此處重新授權！';
                document.getElementById('auth-banner').style.background = '#f8d7da';
                document.getElementById('auth-banner').style.color = '#721c24';
                document.getElementById('auth-banner').style.borderColor = '#f5c6cb';
            }

            async loadSheetData(keepForm = false) {
                if (!this.accessToken) return; 

                const shouldKeepForm = keepForm === true;

                const sheetName = this.currentSheet;
                if (!sheetName) return;

                Utility.showLoading(`載入「${sheetName}」中...`);
                document.getElementById('btn-save-order').style.display = 'none';
                
                try {
                    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}!A:Z`, {
                        headers: { 'Authorization': `Bearer ${this.accessToken}` }
                    });
                    const data = await res.json();
                    Utility.hideLoading();

                    if (data.error) {
                        if (data.error.code === 401) {
                            this.handleTokenExpired();
                            return;
                        }
                        alert(`❌ 讀取失敗！\n原因：${data.error.message}`);
                        return;
                    }

                    if (!data.values || data.values.length === 0) {
                        this.dataStore = [];
                        this.renderCatalog();
                        return;
                    }

                    this.headerRow = data.values[0];
                    const getIdx = (name) => this.headerRow.findIndex(h => String(h).trim() === name);
                    
                    this.colMap = {
                        location: getIdx('位置'), store: getIdx('店名'), techId: getIdx('技師編號'),
                        startDate: getIdx('到職日'), name: getIdx('姓名'), age: getIdx('年齡'),
                        stats: getIdx('數值'), photo: getIdx('技師照片'), price: getIdx('價金'),
                        url: getIdx('網址'), twoShift: getIdx('二輪轉'), af: getIdx('AF'), 
                        level: getIdx('等級'), schedule: getIdx('行事曆')
                    };

                    if (this.colMap.name === -1 || this.colMap.store === -1) {
                        alert(`⚠️ 找不到必要的欄位 (姓名 或 店名)。`);
                    } else {
                        document.getElementById('btn-save').disabled = false;
                    }

                    if (this.colMap.schedule === -1) {
                        this.colMap.schedule = this.headerRow.length;
                        this.headerRow.push('行事曆');
                    }

                    this.dataStore = [];
                    for (let i = 1; i < data.values.length; i++) {
                        const row = data.values[i];
                        const paddedRow = this.headerRow.map((_, idx) => row[idx] || "");
                        const nameVal = paddedRow[this.colMap.name];
                        if (nameVal && nameVal !== '姓名') {
                            this.dataStore.push({ 
                                id: String(paddedRow[this.colMap.techId] || `TEMP-${i}`).trim(), 
                                _raw: paddedRow, 
                                _rowIndex: i + 1 
                            });
                        }
                    }

                    this.populateFilters(); 
                    this.renderCatalog();
                    
                    if (!shouldKeepForm) {
                        this.clearForm();
                    }
                } catch (error) {
                    Utility.hideLoading();
                    alert("❌ 連線錯誤：" + error.message);
                }
            }

            populateFilters() {
                const locSelect = document.getElementById('filterLocation');
                const uniqueLocations = [...new Set(this.dataStore.map(r => r._raw[this.colMap.location]).filter(loc => loc && loc.trim() !== ''))];
                const currentLoc = locSelect.value;
                locSelect.innerHTML = '<option value="">🗺️ 所有位置</option>';
                uniqueLocations.sort().forEach(loc => {
                    const opt = document.createElement('option');
                    opt.value = loc; opt.innerText = loc;
                    locSelect.appendChild(opt);
                });
                locSelect.value = currentLoc;

                const dateSelect = document.getElementById('filterDate');
                const dateSet = new Set();
                this.dataStore.forEach(r => {
                    const sch = r._raw[this.colMap.schedule] || '';
                    const matches = sch.match(/\d{1,2}\/\d{1,2}/g);
                    if (matches) matches.forEach(m => dateSet.add(m));
                });
                const currentDate = dateSelect.value;
                dateSelect.innerHTML = '<option value="">📅 所有日期</option>';
                [...dateSet].sort().forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d; opt.innerText = d;
                    dateSelect.appendChild(opt);
                });
                if (dateSet.has(currentDate)) dateSelect.value = currentDate;
            }

            async saveToGoogleSheet() {
                if (!this.accessToken) { this.triggerAuth(); return; }
                const storeVal = document.getElementById('v_store').value.trim();
                const nameVal = document.getElementById('v_name').value.trim();
                
                if (!storeVal || !nameVal) { 
                    Utility.showToast("⚠️ 請確實填寫「店名」與「姓名」！", true); 
                    return; 
                }

                Utility.showLoading("寫入資料與上傳照片...");
                try {
                    let techId = document.getElementById('v_tech_id').value.trim() || Utility.generateID();
                    let finalUrl = document.getElementById('v_photo_url').value;
                    let targetRowIdx = document.getElementById('v_row_index').value; 

                    let sheetTechId = techId;
                    if (/^\d+$/.test(techId)) {
                        sheetTechId = "'" + techId;
                    }

                    if(cropperSvc.pendingBlob) {
                        const fileName = `${storeVal}-${nameVal}.jpg`;
                        finalUrl = await cropperSvc.uploadToDrive(cropperSvc.pendingBlob, fileName, this.accessToken);
                    }

                    const sheetName = this.currentSheet;
                    let newRowData = new Array(this.headerRow.length).fill("");
                    
                    if (targetRowIdx) {
                        const record = this.dataStore.find(r => String(r._rowIndex) === String(targetRowIdx));
                        if (record) newRowData = [...record._raw];
                    }

                    const setV = (key, val) => { const idx = this.colMap[key]; if(idx !== -1 && idx !== undefined) newRowData[idx] = val; };

                    setV('location', document.getElementById('v_location').value);
                    setV('store', storeVal);
                    setV('techId', sheetTechId);
                    setV('startDate', document.getElementById('v_start_date').value);
                    setV('name', nameVal);
                    setV('age', document.getElementById('v_age').value);
                    setV('stats', document.getElementById('v_stats').value);
                    setV('price', document.getElementById('v_price').value);
                    setV('url', document.getElementById('v_url').value);
                    setV('twoShift', document.getElementById('v_two_shift').value);
                    setV('af', document.getElementById('v_af').value);
                    setV('level', document.getElementById('v_level').value);
                    setV('schedule', document.getElementById('v_schedule').value);
                    setV('photo', finalUrl);

                    let writeRes;
                    const writeUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/`;
                    
                    if (targetRowIdx) {
                        writeRes = await fetch(`${writeUrl}${encodeURIComponent(sheetName)}!A${targetRowIdx}?valueInputOption=USER_ENTERED`, {
                            method: 'PUT', headers: { 'Authorization': `Bearer ${this.accessToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ values: [newRowData] })
                        });
                    } else {
                        writeRes = await fetch(`${writeUrl}${encodeURIComponent(sheetName)}!A1:append?valueInputOption=USER_ENTERED`, {
                            method: 'POST', headers: { 'Authorization': `Bearer ${this.accessToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ values: [newRowData] })
                        });
                    }

                    if (!writeRes.ok) throw new Error("寫入失敗");
                    cropperSvc.pendingBlob = null;
                    
                    Utility.showToast(`✅ [${storeVal} - ${nameVal}] 儲存成功！`);
                    
                    await this.loadSheetData(true); 
                    
                    let targetTechId = sheetTechId.startsWith("'") ? sheetTechId.substring(1) : sheetTechId;
                    const savedRecordIdx = this.dataStore.findIndex(r => {
                        let rTechId = r._raw[this.colMap.techId] || "";
                        if (rTechId.startsWith("'")) rTechId = rTechId.substring(1);
                        return (rTechId === targetTechId) || (r._raw[this.colMap.name] === nameVal && r._raw[this.colMap.store] === storeVal);
                    });

                    if (savedRecordIdx !== -1) {
                        this.editRecord(savedRecordIdx);
                    }
                    
                } catch (e) {
                    Utility.showToast(`❌ 錯誤: ${e.message}`, true);
                } finally { 
                    Utility.hideLoading(); 
                }
            }

            async saveOrderToGoogleSheet() {
                if (!this.accessToken) { this.triggerAuth(); return; }
                const sheetName = this.currentSheet;
                
                const values = this.dataStore.map(record => record._raw);
                
                Utility.showLoading("儲存排序與複製資料中...");
                try {
                    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}!A2?valueInputOption=USER_ENTERED`, {
                        method: 'PUT', 
                        headers: { 'Authorization': `Bearer ${this.accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ values: values })
                    });
                    
                    if (!res.ok) throw new Error("儲存失敗");
                    
                    Utility.showToast("✅ 變更與排序儲存成功！");
                    document.getElementById('btn-save-order').style.display = 'none';
                    this.loadSheetData(); 
                } catch (e) {
                    Utility.showToast(`❌ 錯誤: ${e.message}`, true);
                } finally { 
                    Utility.hideLoading(); 
                }
            }

            editRecord(index) {
                if(!this.isEditMode) {
                    this.toggleMode();
                }

                const record = this.dataStore[index];
                if(!record) return;
                const r = record._raw;

                document.getElementById('v_row_index').value = record._rowIndex || '';
                document.getElementById('v_location').value = r[this.colMap.location] || "";
                document.getElementById('v_store').value = r[this.colMap.store] || "";
                
                let displayTechId = r[this.colMap.techId] || "";
                if (displayTechId.startsWith("'")) displayTechId = displayTechId.substring(1);
                document.getElementById('v_tech_id').value = displayTechId;
                
                let rawDate = r[this.colMap.startDate] || "";
                let formattedDate = "";
                if (rawDate) {
                    let match = rawDate.match(/(\d{4})\s*[年\/\-.]\s*(\d{1,2})\s*[月\/\-.]\s*(\d{1,2})/);
                    if (match) {
                        formattedDate = `${match[1]}-${match[2].padStart(2, '0')}-${match[3].padStart(2, '0')}`;
                    }
                }
                document.getElementById('v_start_date').value = formattedDate;
                
                document.getElementById('v_name').value = r[this.colMap.name] || "";
                document.getElementById('v_age').value = r[this.colMap.age] || "";
                document.getElementById('v_stats').value = r[this.colMap.stats] || "";
                document.getElementById('v_price').value = r[this.colMap.price] || "";
                document.getElementById('v_url').value = r[this.colMap.url] || "";
                document.getElementById('v_two_shift').value = r[this.colMap.twoShift] || "";
                document.getElementById('v_af').value = r[this.colMap.af] || "";
                document.getElementById('v_level').value = r[this.colMap.level] || "";
                document.getElementById('v_schedule').value = r[this.colMap.schedule] || "";

                const rawUrl = r[this.colMap.photo] || "";
                document.getElementById('v_photo_url').value = rawUrl; 
                const cleanImg = Utility.cleanDriveUrl(rawUrl);
                
                if(cleanImg && cleanImg.startsWith('http')) {
                    document.getElementById('preview_photo').src = cleanImg;
                    document.getElementById('preview_photo').style.display = 'block';
                    document.getElementById('text_photo').style.display = 'none';
                    document.getElementById('btn_del_photo').style.display = 'flex';
                } else {
                    document.getElementById('preview_photo').style.display = 'none';
                    document.getElementById('text_photo').style.display = 'block';
                    document.getElementById('btn_del_photo').style.display = 'none';
                }
                
                if (window.innerWidth <= 850) {
                    const formPanel = document.getElementById('panel-form');
                    if (formPanel) {
                        formPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            }

            clearForm() {
                document.getElementById('v_row_index').value = '';
                const inputs = ['v_location', 'v_store', 'v_tech_id', 'v_start_date', 'v_name', 'v_age', 'v_stats', 'v_price', 'v_url', 'v_two_shift', 'v_af', 'v_level', 'v_schedule', 'v_photo_url'];
                inputs.forEach(id => document.getElementById(id).value = '');
                document.getElementById('preview_photo').style.display = 'none';
                document.getElementById('text_photo').style.display = 'block';
                document.getElementById('btn_del_photo').style.display = 'none';
                cropperSvc.pendingBlob = null;
                
                if(!this.isEditMode) {
                    this.toggleMode();
                }
            }

            reorderItems(oldIdx, newIdx) {
                if (oldIdx === newIdx) return;
                const movedItem = this.dataStore.splice(oldIdx, 1)[0];
                this.dataStore.splice(newIdx, 0, movedItem);
                
                document.getElementById('btn-save-order').style.display = 'inline-flex';
                Utility.showToast("💡 順序已變更，請記得點擊「儲存排序」以寫入試算表！");
                this.renderCatalog();
            }

            copyItem(oldIdx, newIdx) {
                const originalItem = this.dataStore[oldIdx];
                const newRaw = [...originalItem._raw];
                
                const colsToClear = ['photo', 'techId', 'url', 'age', 'stats', 'startDate', 'schedule'];
                colsToClear.forEach(col => {
                    if (this.colMap[col] !== -1 && this.colMap[col] !== undefined) {
                        newRaw[this.colMap[col]] = "";
                    }
                });
                
                const newItem = {
                    id: String(newRaw[this.colMap.techId] || `TEMP-COPY-${Date.now()}`).trim(),
                    _raw: newRaw,
                    _rowIndex: "" 
                };
                
                this.dataStore.splice(newIdx, 0, newItem);
                
                document.getElementById('btn-save-order').style.display = 'inline-flex';
                Utility.showToast("💡 資料已複製（已自動清空特定欄位），請記得點擊「儲存排序」以寫入！");
                this.renderCatalog();
            }

            renderCatalog() {
                const kw = document.getElementById('searchInput').value.toLowerCase();
                const filterLoc = document.getElementById('filterLocation').value;
                const filterDate = document.getElementById('filterDate').value;
                const filterStartStr = document.getElementById('filterTimeStart').value;
                const filterEndStr = document.getElementById('filterTimeEnd').value;
                const filterStatus = document.getElementById('filterStatus').value;
                const sortOpt = document.getElementById('sortOption').value;
                
                const filterStart = filterStartStr ? parseInt(filterStartStr) : null;
                const filterEnd = filterEndStr ? parseInt(filterEndStr) : null;

                const grid = document.getElementById('catalogGrid');
                grid.innerHTML = '';

                const isFiltered = kw !== '' || filterLoc !== '' || filterDate !== '' || filterStart !== null || filterEnd !== null || filterStatus !== '' || sortOpt !== '';

                let displayList = [];

                this.dataStore.forEach((record, index) => {
                    const r = record._raw;
                    
                    const recLocation = r[this.colMap.location] || '';
                    if (filterLoc && recLocation !== filterLoc) return;
                    
                    const searchStr = `${r[this.colMap.name]} ${r[this.colMap.store]} ${r[this.colMap.techId]} ${recLocation} ${r[this.colMap.twoShift]} ${r[this.colMap.af]} ${r[this.colMap.level]}`.toLowerCase();
                    if (kw && !searchStr.includes(kw)) return;

                    let hasAnyWork = false;
                    let timeOverlapMatch = false;
                    let dateEvaluated = false;

                    const scheduleRaw = r[this.colMap.schedule] || '';
                    if (scheduleRaw) {
                        const lines = scheduleRaw.split('\n');
                        for (let line of lines) {
                            const match = line.match(/^(\d{1,2}\/\d{1,2})\s*(\(.\))?\s*(.+)$/);
                            if (match) {
                                let d = match[1];
                                let tStr = match[3];
                                let isOff = tStr.includes('休') || tStr.includes('み');

                                if (filterDate && d !== filterDate) continue; 
                                dateEvaluated = true;

                                if (!isOff) {
                                    hasAnyWork = true;
                                    if (filterStart === null && filterEnd === null) {
                                        timeOverlapMatch = true; 
                                    } else {
                                        const tMatch = tStr.match(/(\d{1,2}:\d{2})\s*[-~〜ー]\s*(\d{1,2}:\d{2})/);
                                        if (tMatch) {
                                            let tStart = Utility.timeToMins(tMatch[1]);
                                            let tEnd = Utility.timeToMins(tMatch[2]);
                                            if (tEnd <= tStart) tEnd += 24 * 60; 
                                            let qStart = filterStart !== null ? filterStart : 0;
                                            let qEnd = filterEnd !== null ? filterEnd : 9999;
                                            if (Math.max(tStart, qStart) < Math.min(tEnd, qEnd)) {
                                                timeOverlapMatch = true; 
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }

                    if ((filterDate || filterStart !== null || filterEnd !== null) && !timeOverlapMatch) return; 
                    if (filterStatus === 'working' && !hasAnyWork) return;
                    if (filterStatus === 'off' && (hasAnyWork || !dateEvaluated)) return;

                    displayList.push({ record, index });
                });

                if (sortOpt === 'cup') {
                    displayList.sort((a, b) => Utility.getCupScore(b.record._raw[this.colMap.stats]) - Utility.getCupScore(a.record._raw[this.colMap.stats]));
                } else if (sortOpt === 'body') {
                    displayList.sort((a, b) => Utility.getBodyScore(b.record._raw[this.colMap.stats]) - Utility.getBodyScore(a.record._raw[this.colMap.stats]));
                }

                displayList.forEach(item => {
                    const r = item.record._raw;
                    const index = item.index; 

                    const recLocation = r[this.colMap.location] || '';
                    let cleanImg = Utility.cleanDriveUrl(r[this.colMap.photo]);
                    const imgSrc = cleanImg || PLACEHOLDER_URL;
                    const ageStr = r[this.colMap.age] ? ` (${r[this.colMap.age]})` : '';
                    const storeName = r[this.colMap.store] || '無店名';
                    const targetUrl = r[this.colMap.url] || '';
                    
                    let tagsHtml = '';
                    const afVal = r[this.colMap.af] || '';
                    const twoShiftVal = r[this.colMap.twoShift] || '';
                    const levelVal = r[this.colMap.level] || '';
                    
                    if (afVal) tagsHtml += `<span class="tag-item">AF: ${afVal}</span>`;
                    if (twoShiftVal) tagsHtml += `<span class="tag-item">二輪: ${twoShiftVal}</span>`;
                    if (levelVal) tagsHtml += `<span class="tag-item">等級: ${levelVal}</span>`;
                    let tagsContainer = tagsHtml ? `<div class="tags-row">${tagsHtml}</div>` : '';
                    
                    let rawStats = r[this.colMap.stats] || '';
                    let cup = '?';
                    let cupMatch = rawStats.match(/\(([A-Z])\)/i) || rawStats.match(/(?:^|[\s/])([A-Z])(?:[\s/]|$|cup|罩杯)/i);
                    if (cupMatch) cup = cupMatch[1].toUpperCase();

                    let cleanedStats = rawStats.replace(/\([A-Z]\)/ig, ''); 
                    if (cup !== '?') {
                        let cupRegex = new RegExp(`[/\\s]?${cup}(?:cup|罩杯)?$`, 'i');
                        cleanedStats = cleanedStats.replace(cupRegex, '');
                    }
                    cleanedStats = cleanedStats.replace(/[/]+/g, ' ').trim();

                    if (!/[BWH]\d{2}/i.test(cleanedStats)) {
                        let hwMatch = cleanedStats.match(/^(\d{3})\s+(\d{2})$/);
                        if (hwMatch) cleanedStats = `${hwMatch[1]}cm ${hwMatch[2]}kg`;
                    }

                    let cupColor = '#9e9e9e';
                    if (['A','B','C'].includes(cup)) cupColor = '#4caf50';
                    else if (['D','E','F'].includes(cup)) cupColor = '#ff9800';
                    else if (['G','H','I','J'].includes(cup)) cupColor = '#e91e63';
                    else if (cup !== '?') cupColor = '#b71c1c';

                    let statsHtml = `
                        <div class="stats-row" title="${rawStats}">
                            <span class="cup-badge" style="background:${cupColor};">${cup !== '?' ? cup + '杯' : '?杯'}</span>
                            <span style="overflow: hidden; text-overflow: ellipsis; flex: 1;">${cleanedStats}</span>
                        </div>
                    `;

                    let priceHtml = '';
                    let priceLines = (r[this.colMap.price] || '').split(/[\n\r;]+/).filter(l => l.trim() !== '');
                    if (priceLines.length > 0) {
                        priceHtml = '<div class="price-col">';
                        priceLines.forEach(line => {
                            let pMatch = line.match(/(\d{4,6})\s*\/\s*(\d{2,3})(.*)/);
                            if (pMatch) {
                                let amt = parseInt(pMatch[1]).toLocaleString();
                                priceHtml += `<div>JPY ¥${amt} / ${pMatch[2]}分 ${pMatch[3] || ''}</div>`;
                            } else {
                                let nMatch = line.match(/(\d{4,6})/);
                                if (nMatch) {
                                    let amt = parseInt(nMatch[1]).toLocaleString();
                                    priceHtml += `<div>JPY ¥${line.replace(nMatch[1], amt)}</div>`;
                                } else {
                                    priceHtml += `<div>${line}</div>`;
                                }
                            }
                        });
                        priceHtml += '</div>';
                    }

                    const shapeData = Utility.getBodyShapeData(r[this.colMap.stats]);
                    let nameRowHtml = '';
                    if (shapeData) {
                        // 新增身型分類標籤
                        tagsHtml += `<span class="tag-item" style="background:#546e7a; color:white;" title="身型分類">${shapeData.shapeIcon} ${shapeData.shapeType}</span>`;
                        tagsContainer = `<div class="tags-row">${tagsHtml}</div>`;

                        nameRowHtml = `
                            <div class="name-row">
                                <div class="mini-svg-box" title="實色: 該技師體型\n虛線: 日本女性平均體型">${shapeData.svgHtml}</div>
                                <div class="name-col">
                                    <div class="tech-name">${r[this.colMap.name] || '未命名'} ${ageStr}</div>
                                    <div class="score-row">
                                        <span class="big-badge" style="background:${shapeData.scoreColor};" title="沙漏比例曲線評分">👑 ${shapeData.score}分</span>
                                        <span class="big-badge" style="background:${shapeData.cupDiffColor};" title="推算真實罩杯 (與宣稱差異越大顏色越深)">實推 ${shapeData.trueCup}杯</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        tagsContainer = `<div class="tags-row">${tagsHtml}</div>`;
                        nameRowHtml = `<div class="tech-name">${r[this.colMap.name] || '未命名'} ${ageStr}</div>`;
                    }

                    const schHTML = Utility.generateScheduleHTML(r[this.colMap.schedule]);

                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    let titleStr = "";
                    if (this.isEditMode) {
                        titleStr = isFiltered ? "左鍵：編輯資料\n右鍵：開啟專屬網址" : "左鍵：編輯資料\n右鍵：開啟專屬網址\n按住拖曳可改變排序\n按住 Ctrl 或 Command 拖曳可複製(清空特定欄位)";
                    } else {
                        titleStr = "點擊：開啟專屬網址\n右鍵：開啟專屬網址";
                    }
                    card.title = titleStr;
                    
                    card.onclick = (e) => {
                        if (e.target.closest('.sch-container-vert') || e.target.closest('.sch-wrapper')) return;
                        
                        if (this.isEditMode) {
                            this.editRecord(index); 
                        } else {
                            if (targetUrl && targetUrl.startsWith('http')) {
                                window.open(targetUrl, '_blank');
                            } else {
                                Utility.showToast('⚠️ 系統提示：此技師尚未建立網址，或網址格式不正確！', true);
                            }
                        }
                    };
                    
                    card.oncontextmenu = (e) => {
                        e.preventDefault(); 
                        if (targetUrl && targetUrl.startsWith('http')) window.open(targetUrl, '_blank');
                        else Utility.showToast('⚠️ 系統提示：此技師尚未建立網址，或網址格式不正確！', true);
                    };

                    if (!isFiltered && this.isEditMode) {
                        card.draggable = true;
                        
                        card.ondragstart = (e) => {
                            e.dataTransfer.effectAllowed = 'copyMove'; 
                            e.dataTransfer.setData('text/plain', index);
                            setTimeout(() => card.classList.add('dragging'), 0);
                        };
                        
                        card.ondragend = () => {
                            card.classList.remove('dragging');
                        };
                        
                        card.ondragover = (e) => {
                            e.preventDefault();
                            const isCopy = e.ctrlKey || e.metaKey;
                            e.dataTransfer.dropEffect = isCopy ? 'copy' : 'move';
                            const overCard = e.target.closest('.card');
                            if (overCard) {
                                overCard.classList.add('drag-over');
                                if (isCopy) {
                                    overCard.style.borderColor = "var(--warning)";
                                    overCard.style.background = "#fff3e0";
                                } else {
                                    overCard.style.borderColor = "var(--primary)";
                                    overCard.style.background = "#f3e5f5";
                                }
                            }
                        };
                        
                        card.ondragleave = (e) => {
                            const overCard = e.target.closest('.card');
                            if (overCard) {
                                overCard.classList.remove('drag-over');
                                overCard.style.borderColor = "";
                                overCard.style.background = "";
                            }
                        };
                        
                        card.ondrop = (e) => {
                            e.preventDefault();
                            const overCard = e.target.closest('.card');
                            if (overCard) {
                                overCard.classList.remove('drag-over');
                                overCard.style.borderColor = "";
                                overCard.style.background = "";
                            }
                            
                            const oldIndex = parseInt(e.dataTransfer.getData('text/plain'), 10);
                            if (!isNaN(oldIndex)) {
                                const isCopy = e.ctrlKey || e.metaKey || e.dataTransfer.dropEffect === 'copy';
                                if (isCopy) {
                                    this.copyItem(oldIndex, index); 
                                } else {
                                    this.reorderItems(oldIndex, index); 
                                }
                            }
                        };
                    } else {
                        card.draggable = false;
                        card.ondragstart = (e) => {
                            e.preventDefault();
                            if (this.isEditMode) {
                                Utility.showToast("⚠️ 請清除搜尋與篩選條件後，再進行手動拖曳操作！", true);
                            }
                        };
                    }
                    
                    card.innerHTML = `
                        <div class="img-container">
                            <span class="badge">${recLocation || '未知區'}</span>
                            <img src="${imgSrc}" loading="lazy" onerror="this.onerror=null; this.src='${PLACEHOLDER_URL}';">
                        </div>
                        <div class="store-name">${storeName}</div>
                        ${nameRowHtml}
                        ${tagsContainer}
                        ${statsHtml}
                        ${priceHtml}
                        ${schHTML}
                    `;
                    grid.appendChild(card);
                });
            }
            
            deleteImage(event) {
                event.stopPropagation();
                document.getElementById('v_photo_url').value = '';
                document.getElementById('preview_photo').style.display = 'none';
                document.getElementById('text_photo').style.display = 'block';
                document.getElementById('btn_del_photo').style.display = 'none';
                cropperSvc.pendingBlob = null;
            }
        }

        window.app = null;
        const cropperSvc = new ImageCropperService();

        window.onload = () => {
            window.app = new AppCore();
            window.app.initGoogleAuth();
        };
    </script>
</body>
</html>
