<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talent DB Launcher</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #f3f4f7;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2f6feb;
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top right, #dbeafe, var(--bg) 45%);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .launcher {
      width: min(760px, 100%);
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 20px 48px rgba(20, 30, 80, 0.15);
      padding: 24px;
    }

    body.mobile .launcher {
      width: min(100%, 940px);
    }

    body.focus-mode {
      display: block;
      padding: 0;
      background: #dbe3ef;
    }

    body.focus-mode .launcher {
      width: 100%;
      max-width: none;
      min-height: 100dvh;
      border-radius: 0;
      box-shadow: none;
      padding: 8px;
      background: transparent;
    }

    body.focus-mode .chrome {
      display: none;
    }

    body.focus-mode #app-host {
      margin-top: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      min-height: 100dvh;
    }

    body.focus-mode #app-frame {
      min-height: 100dvh;
      border-radius: 0;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
    }

    button.secondary {
      background: #4b5563;
    }

    #status {
      margin-top: 16px;
      font-size: 14px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    #status.error { color: var(--danger); }

    #app-host {
      margin-top: 16px;
      min-height: 100px;
      border: 1px dashed #d1d5db;
      border-radius: 12px;
      background: #fafafa;
      padding: 12px;
    }

    #app-frame {
      width: 100%;
      min-height: 72dvh;
      border: 0;
      display: none;
      background: #fff;
      border-radius: 10px;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .toolbar {
      display: none;
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      gap: 8px;
      pointer-events: none;
    }

    body.focus-mode .toolbar {
      display: flex;
    }

    .toolbar button {
      pointer-events: auto;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(31, 41, 55, 0.9);
      color: #fff;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      body {
        padding: 8px;
      }

      .launcher {
        width: 100%;
        padding: 14px;
      }

      #app-frame {
        min-height: 80dvh;
      }
    }
  </style>
</head>
<body>
  <main class="launcher">
    <h1 class="chrome">Talent DB Public Launcher</h1>
    <p class="chrome">This public page only handles sign-in and app bootstrap.</p>
    <div class="actions chrome">
      <button id="btn-login">Sign in with Google</button>
      <button id="btn-load" class="secondary" disabled>Load Private App</button>
    </div>
    <div id="status" class="chrome">Not signed in.</div>
    <div id="app-host">
      <iframe id="app-frame" title="Talent DB App"></iframe>
      <div id="app-placeholder">After sign-in, the app will load from private Google Drive files.</div>
    </div>
    <p class="hint chrome">Set CLIENT_ID and APP_MANIFEST_FILE_ID in this file before publishing.</p>
  </main>
  <div class="toolbar">
    <button id="btn-toggle-shell" type="button">Show Launcher</button>
  </div>

  <script>
    const CLIENT_ID = "615427641075-2e4i1l7smqp30l8v1qrf75c924aro94i.apps.googleusercontent.com";
    const APP_MANIFEST_FILE_ID = "1s38nseW-eMJGzRReXVVAskth6R1ENl3TWTLFXwPgvUQ";
    const APP_SCOPE = [
      "https://www.googleapis.com/auth/spreadsheets",
      "https://www.googleapis.com/auth/drive"
    ].join(" ");

    const state = {
      tokenClient: null,
      accessToken: null,
      hasWriteAccess: false
    };

    const statusEl = document.getElementById("status");
    const loginBtn = document.getElementById("btn-login");
    const loadBtn = document.getElementById("btn-load");
    const frameEl = document.getElementById("app-frame");
    const placeholderEl = document.getElementById("app-placeholder");
    const toggleShellBtn = document.getElementById("btn-toggle-shell");

    function detectDeviceMode() {
      const isMobile = window.matchMedia("(max-width: 900px)").matches ||
        /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || "");
      document.body.classList.toggle("mobile", isMobile);
    }

    function toggleFocusMode(force) {
      const shouldEnable = typeof force === "boolean"
        ? force
        : !document.body.classList.contains("focus-mode");
      document.body.classList.toggle("focus-mode", shouldEnable);
      toggleShellBtn.textContent = shouldEnable ? "Show Launcher" : "Hide Launcher";
    }

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = isError ? "error" : "";
      if (!statusEl.classList.contains("chrome")) statusEl.classList.add("chrome");
    }

    function assertConfigured() {
      if (!CLIENT_ID.startsWith("REPLACE_WITH_")) return true;
      setStatus("Please set CLIENT_ID first.", true);
      return false;
    }

    function assertManifestConfigured() {
      if (!APP_MANIFEST_FILE_ID.startsWith("REPLACE_WITH_")) return true;
      setStatus("Please set APP_MANIFEST_FILE_ID first.", true);
      return false;
    }

    async function fetchDriveFileText(fileId) {
      const res = await fetch(
        `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
        { headers: { Authorization: `Bearer ${state.accessToken}` } }
      );
      if (!res.ok) throw new Error(`Drive read failed (${res.status})`);
      return await res.text();
    }

    async function fetchDriveDocText(fileId) {
      const res = await fetch(
        `https://www.googleapis.com/drive/v3/files/${fileId}/export?mimeType=text/plain`,
        { headers: { Authorization: `Bearer ${state.accessToken}` } }
      );
      if (!res.ok) throw new Error(`Drive doc export failed (${res.status})`);
      return await res.text();
    }

    async function fetchAnyText(fileId, preferDoc = false) {
      if (preferDoc) {
        try {
          return await fetchDriveDocText(fileId);
        } catch (error) {
          return await fetchDriveFileText(fileId);
        }
      }

      try {
        return await fetchDriveFileText(fileId);
      } catch (error) {
        return await fetchDriveDocText(fileId);
      }
    }

    async function loadManifest() {
      const text = await fetchAnyText(APP_MANIFEST_FILE_ID, true);
      let manifest;
      try {
        manifest = JSON.parse(text);
      } catch (error) {
        throw new Error("Manifest is not valid JSON.");
      }
      if (!manifest.entryFileId) throw new Error("Manifest missing entryFileId.");
      return manifest;
    }

    async function loadPrivateApp() {
      if (!state.accessToken) {
        setStatus("Please sign in first.", true);
        return;
      }
      if (!assertManifestConfigured()) return;

      loadBtn.disabled = true;
      setStatus("Loading manifest...");
      try {
        const manifest = await loadManifest();
        const useDocExport = String(manifest.entrySource || "").toLowerCase() === "gdoc";
        const entryHtml = await fetchAnyText(manifest.entryFileId, useDocExport);
        const tokenSeed = `<script>
window.__JP_TOKEN = ${JSON.stringify(state.accessToken)};
sessionStorage.setItem("gapi_access_token", ${JSON.stringify(state.accessToken)});
sessionStorage.setItem("gapi_has_write", ${JSON.stringify(state.hasWriteAccess ? "true" : "false")});
<\/script>`;
        const bridgePatch = `<script>
(() => {
  const pickId = (url) => {
    if (!url) return "";
    const m = String(url).match(/[-\\\\w]{25,}/);
    return m ? m[0] : "";
  };
  const readToken = () => {
    const t = window.__JP_TOKEN || sessionStorage.getItem("gapi_access_token") || "";
    return String(t).replace(/^"|"$/g, "");
  };
  const toApi = (url) => {
    const id = pickId(url);
    const token = readToken();
    if (!id || !token) return "";
    return "https://www.googleapis.com/drive/v3/files/" + id + "?alt=media&access_token=" + encodeURIComponent(token);
  };
  const toUc = (url) => {
    const id = pickId(url);
    return id ? ("https://drive.google.com/uc?export=view&id=" + id) : "";
  };
  const patchUtility = () => {
    if (!window.Utility || typeof window.Utility.cleanDriveUrl !== "function") return false;
    const original = window.Utility.cleanDriveUrl.bind(window.Utility);
    window.Utility.cleanDriveUrl = (url) => {
      const api = toApi(url);
      if (api) return api;
      const uc = toUc(url);
      if (uc) return uc;
      return original(url);
    };
    return true;
  };

  let tries = 0;
  const timer = setInterval(() => {
    tries += 1;
    if (patchUtility() || tries > 60) clearInterval(timer);
  }, 100);

  document.addEventListener("error", (evt) => {
    const el = evt.target;
    if (!el || el.tagName !== "IMG") return;
    const cur = el.getAttribute("src") || "";
    const next = cur.includes("googleapis.com/drive/v3/files") ? toUc(cur) : (toApi(cur) || toUc(cur));
    if (next && next !== cur) el.src = next;
  }, true);

  const setupFilterLayout = () => {
    const tools = document.querySelector(".filter-tools");
    if (!tools || tools.dataset.launcherPatched === "1") return false;
    tools.dataset.launcherPatched = "1";
    const controls = tools.querySelector("h3 + div");
    if (!controls) return false;

    const toggle = document.createElement("button");
    toggle.type = "button";
    toggle.className = "jp-filter-toggle";
    toggle.textContent = "展開篩選";
    tools.insertBefore(toggle, controls);

    const applyState = () => {
      const isMobile = window.matchMedia("(max-width: 900px)").matches;
      tools.classList.toggle("jp-mobile", isMobile);
      if (isMobile) {
        if (!tools.classList.contains("jp-collapsed")) tools.classList.add("jp-collapsed");
        toggle.style.display = "inline-flex";
        toggle.textContent = tools.classList.contains("jp-collapsed") ? "展開篩選" : "收合篩選";
      } else {
        tools.classList.remove("jp-collapsed");
        toggle.style.display = "none";
      }
    };

    toggle.addEventListener("click", () => {
      tools.classList.toggle("jp-collapsed");
      toggle.textContent = tools.classList.contains("jp-collapsed") ? "展開篩選" : "收合篩選";
    });

    window.addEventListener("resize", applyState);
    applyState();
    return true;
  };

  let layoutTry = 0;
  const layoutTimer = setInterval(() => {
    layoutTry += 1;
    if (setupFilterLayout() || layoutTry > 80) clearInterval(layoutTimer);
  }, 150);
})();
<\/script>`;
        const responsivePatch = `<style id="launcher-mobile-patch">
/* Desktop: compact single-line filters, no awkward gaps */
.filter-tools {
  display: flex !important;
  align-items: center !important;
  gap: 10px !important;
  flex-wrap: nowrap !important;
}
.filter-tools > h3 {
  margin: 0 !important;
  min-width: 92px;
  flex: 0 0 auto;
}
.filter-tools > .jp-filter-toggle {
  display: none;
  border: none;
  border-radius: 8px;
  padding: 6px 10px;
  background: #4b5563;
  color: #fff;
  font-weight: 700;
}
.filter-tools > div {
  display: flex !important;
  flex-wrap: nowrap !important;
  align-items: center !important;
  gap: 8px !important;
  flex: 1 !important;
  overflow-x: auto;
  padding-bottom: 2px;
}
.filter-tools > div > * {
  flex: 0 0 auto;
}
#searchInput {
  min-width: 240px !important;
}

@media (max-width: 900px) {
  .filter-tools {
    display: block !important;
  }
  .filter-tools > h3 {
    display: inline-flex !important;
    margin-right: 8px !important;
  }
  .filter-tools > .jp-filter-toggle {
    display: inline-flex !important;
    margin-bottom: 6px;
  }
  .filter-tools > div {
    display: grid !important;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px !important;
    overflow: visible;
  }
  .filter-tools.jp-collapsed > div {
    display: none !important;
  }
  .filter-tools #searchInput {
    grid-column: 1 / -1;
    min-width: 0 !important;
    width: 100% !important;
  }
  .filter-tools .custom-multi-select {
    min-width: 0 !important;
  }
  .catalog-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
}
</style>`;
        let seededHtml = entryHtml.includes("<head>")
          ? entryHtml.replace("<head>", `<head>${tokenSeed}${responsivePatch}${bridgePatch}`)
          : `${tokenSeed}${responsivePatch}${bridgePatch}${entryHtml}`;

        if (!/meta\s+name=["']viewport["']/i.test(seededHtml)) {
          seededHtml = seededHtml.replace("<head>", '<head><meta name="viewport" content="width=device-width, initial-scale=1.0">');
        }

        const blob = new Blob([seededHtml], { type: "text/html" });
        const blobUrl = URL.createObjectURL(blob);

        frameEl.src = blobUrl;
        frameEl.style.display = "block";
        placeholderEl.style.display = "none";
        setStatus("Private app loaded.");
        toggleFocusMode(true);
      } catch (error) {
        setStatus(`Load failed: ${error.message}`, true);
      } finally {
        loadBtn.disabled = false;
      }
    }

    function initAuth() {
      if (!assertConfigured()) return;
      state.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: APP_SCOPE,
        callback: (resp) => {
          if (resp.error) {
            setStatus(`Sign-in failed: ${resp.error}`, true);
            return;
          }
          state.accessToken = resp.access_token;
          state.hasWriteAccess = google.accounts.oauth2.hasGrantedAllScopes(
            resp,
            "https://www.googleapis.com/auth/spreadsheets",
            "https://www.googleapis.com/auth/drive"
          );
          loadBtn.disabled = false;
          setStatus("Signed in. Loading private app...");
          loadPrivateApp();
        }
      });
    }

    loginBtn.addEventListener("click", () => {
      if (!state.tokenClient) {
        setStatus("OAuth is not initialized yet.", true);
        return;
      }
      state.tokenClient.requestAccessToken({ prompt: "consent" });
    });

    loadBtn.addEventListener("click", () => {
      loadPrivateApp();
    });

    toggleShellBtn.addEventListener("click", () => {
      toggleFocusMode(document.body.classList.contains("focus-mode") ? false : true);
    });

    window.addEventListener("resize", detectDeviceMode);
    window.addEventListener("load", () => {
      detectDeviceMode();
      initAuth();
    });
  </script>
</body>
</html>
