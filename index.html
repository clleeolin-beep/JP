            processBatchData(isCreate) {
                const mp = document.getElementById('v_magic_paste');
                if(!mp) return;
                const txt = mp.value.trim();
                
                let sr = this.rulesData.find(r => r.ruleType === 'System_Anchor' && r.pattern === 'Block_Splitter'); 
                let splitter = sr ? sr.action : '收藏夾';
                
                const blocks = txt.split(new RegExp(splitter,'g')).filter(b => b.length > 10);
                if(blocks.length <= 1){ Utility.showToast("⚠️ 未偵測到清單", true); return; }
                
                const vS = document.getElementById('v_store'), vP = document.getElementById('v_price'), vL = document.getElementById('v_location'), vA = document.getElementById('v_af');
                let fS = vS ? vS.value.trim() : '', fP = vP ? vP.value.trim() : '', fL = vL ? vL.value.trim() : '';
                let fT = vA ? vA.value.trim().split(/[\/／]/).map(t => t.trim()).filter(x => x) : [];
                
                Utility.showLoading("批次執行中...");
                setTimeout(() => {
                    let gP = RuleEngine.parse(txt, "", "", fS || "Common", this.rulesData);
                    let bS = gP.store || fS;
                    let uc = 0, cc = 0;
                    
                    blocks.forEach(b => {
                        let p = RuleEngine.parse(b, "", "", fS || "Common", this.rulesData); 
                        if(!p.name) return;
                        
                        let fs2 = bS; 
                        if(fS && !fs2.includes(fS)) fs2 += " " + fS;
                        
                        let mSch = b.match(/(?:出勤情報|スケジュール|出勤表|出勤スケジュール)[\s\S]*/);
                        let scStr = mSch ? RuleEngine.parseAndFormatSchedule(mSch[0], "", fS || "Common", this.rulesData) : "";
                        let hasS = /\d{1,2}\/\d{1,2}/.test(scStr) && (scStr.includes('休息') || scStr.includes(':'));
                        
                        if(hasS || p.stats) {
                            let ts = new Set(p.tags); 
                            fT.forEach(t => {
                                let u = t.toUpperCase(); 
                                if(['AF','3P','射O'].includes(u)) ts.add(u); else ts.add(t);
                            });
                            
                            let idx = this.dataStore.findIndex(r => {
                                let dbN = (RuleEngine.parse(r._raw[this.colMap.name] || "", "", "", "Common", this.rulesData).name || r._raw[this.colMap.name]).toLowerCase();
                                let dbS = (r._raw[this.colMap.stats] || "").replace(/[\s\/]/g, '');
                                let cS = (p.stats || "").replace(/[\s\/]/g, '');
                                return dbN === p.name.toLowerCase() && (this.isSameStore(r._raw[this.colMap.store] || "", fs2) || (cS && dbS && (dbS.includes(cS) || cS.includes(dbS))));
                            });
                            
                            if(idx !== -1) {
                                let r = this.dataStore[idx]._raw; 
                                if(hasS) r[this.colMap.schedule] = scStr; 
                                if(p.stats) r[this.colMap.stats] = p.stats;
                                
                                (r[this.colMap.af] || "").split(/[\/／]/).map(x => x.trim()).filter(x => x).forEach(x => {
                                    ts.add(['AF','3P','射O'].includes(x.toUpperCase()) ? x.toUpperCase() : x);
                                });
                                
                                if(ts.size > 0) r[this.colMap.af] = Array.from(ts).join(' / '); 
                                if(p.level) r[this.colMap.level] = p.level; 
                                r[this.colMap.updateTime] = Utility.getCurrentTime(); 
                                uc++;
                            } else if(isCreate) {
                                let nR = new Array(this.headerRow.length).fill(""); 
                                const set = (k, v) => { if(this.colMap[k] !== -1 && this.colMap[k] !== undefined) nR[this.colMap[k]] = v; };
                                
                                set('techId', this.genId(this.getSiteCode(fs2))); 
                                set('store', fs2); 
                                set('name', p.name); 
                                set('stats', p.stats); 
                                set('price', fP || p.price); 
                                set('location', fL); 
                                set('updateTime', Utility.getCurrentTime());
                                
                                if(hasS) set('schedule', scStr); 
                                if(ts.size > 0) set('af', Array.from(ts).join(' / ')); 
                                if(p.level) set('level', p.level); 
                                if(p.age) set('age', p.age);
                                
                                this.dataStore.push({id: nR[this.colMap.techId], _raw: nR, _rowIndex: ""}); 
                                cc++;
                            }
                        }
                    });
                    
                    if(uc > 0 || cc > 0) {
                        this.renderCatalog();
                        this.saveOrderToGoogleSheet(true);
                        Utility.showToast(`✅ 新增 ${cc}，更新 ${uc}`);
                        if(mp) mp.value = '';
                    } else {
                        Utility.showToast("⚠️ 無對應資料", true);
                    }
                    Utility.hideLoading();
                }, 100);
            }

            processMagicPaste(text, html) {
                if(!text || this.rulesData.length === 0) return; 
                let mi = document.getElementById('v_magic_paste');
                let mU = text.match(/https?:\/\/[^\s]+/); 
                let exU = mU ? mU[0] : "";
                
                if(/^https?:\/\/[^\s]+$/.test(text.trim())) {
                    let idx = this.dataStore.findIndex(r => (r._raw[this.colMap.url] || "").split('?')[0].replace(/\/$/, "") === exU.split('?')[0].replace(/\/$/, ""));
                    if(idx !== -1) {
                        this.editRecord(idx);

                    } else {
                        let vu = document.getElementById('v_url');
                        if(vu) vu.value = exU;
                        Utility.showToast('✨ 填入新網址');
                    }
                    if(mi) mi.value = ''; 
                    return;
                }
                
                const vs = document.getElementById('v_store');
                let fS = vs ? vs.value.trim() : '';
                let p = RuleEngine.parse(text, html, exU, fS || "Common", this.rulesData);
                let idx = -1; 
                
                if(p.name) { 
                    idx = this.dataStore.findIndex(r => {
                        let dbN = (RuleEngine.parse(r._raw[this.colMap.name] || "", "", "", "Common", this.rulesData).name || r._raw[this.colMap.name]).toLowerCase();
                        let dbS = (r._raw[this.colMap.stats] || "").replace(/[\s\/]/g, '');
                        let cS = (p.stats || "").replace(/[\s\/]/g, '');
                        return dbN === p.name.toLowerCase() && (this.isSameStore(r._raw[this.colMap.store] || "", p.store || fS) || (cS && dbS && (dbS.includes(cS) || cS.includes(dbS))));
                    });
                }
                
                if(idx !== -1) {
                    this.editRecord(idx); 
                } else { 
                    ['v_age','v_stats','v_start_date','v_schedule','v_row_index','v_tech_id'].forEach(i => {
                        let e = document.getElementById(i);
                        if(e) e.value = '';
                    }); 
                }
                
                const sv = (id, val) => { let el = document.getElementById(id); if(el && val) el.value = val; };
                sv('v_name', p.name); 
                sv('v_store', p.store); 
                sv('v_url', exU);
                sv('v_stats', p.stats); 
                sv('v_age', p.age); 
                sv('v_start_date', p.startDate);
                
                let vp = document.getElementById('v_price');
                if(vp && p.price && !vp.value) vp.value = p.price; 
                sv('v_level', p.level);
                
                let va = document.getElementById('v_af');
                if(va) {
                    let ts = new Set(va.value.split(/[\/／]/).map(t => t.trim()).filter(x => x)); 
                    p.tags.forEach(t => ts.add(t)); 
                    if(ts.size > 0) va.value = Array.from(ts).join(' / ');
                }
                
                let hasS = false; 
                if(p.scheduleRaw) {
                    let scStr = RuleEngine.parseAndFormatSchedule(p.scheduleRaw, exU, fS || "Common", this.rulesData); 
                    hasS = /\d{1,2}\/\d{1,2}/.test(scStr) && (scStr.includes('休息') || scStr.includes(':')); 
                    if(hasS) sv('v_schedule', scStr);
                }
                
                if(idx !== -1) Utility.showToast('✨ 載入並更新'); 
                else if(hasS) Utility.showToast('✨ 自動解析'); 
                else Utility.showToast('✨ 更新部分資訊');
                
                setTimeout(() => { if(mi) mi.value = ''; }, 100);
            }

            renderCatalog() {
                const sInp = document.getElementById('searchInput');
                const kw = sInp ? sInp.value.trim().toLowerCase() : '';
                
                const fS_el = document.getElementById('filterStore');
                const fS = fS_el ? fS_el.value : '';
                
                const fL_el = document.getElementById('filterLocation');
                const fL = fL_el ? fL_el.value : '';
                
                const fD_el = document.getElementById('filterDate');
                const fD = fD_el ? fD_el.value : '';
                
                const fT1_el = document.getElementById('filterTimeStart');
                const fT1 = fT1_el ? fT1_el.value : '';
                
                const fT2_el = document.getElementById('filterTimeEnd');
                const fT2 = fT2_el ? fT2_el.value : '';
                
                const fSt_el = document.getElementById('filterStatus');
                const fSt = fSt_el ? fSt_el.value : '';
                
                const sO_el = document.getElementById('sortOption');
                const sO = sO_el ? sO_el.value : '';
                
                const qS = fT1 ? parseInt(fT1) : null;
                const qE = fT2 ? parseInt(fT2) : null;
                
                const grid = document.getElementById('catalogGrid'); 
                if(!grid) return; 
                grid.innerHTML = ''; 
                
                let list = [];
                
                this.dataStore.forEach((record, index) => {
                    let r = record._raw;
                    let loc = r[this.colMap.location] || '';
                    let sto = r[this.colMap.store] || '';
                    
                    if(fS && sto !== fS) return; 
                    if(fL && loc !== fL) return;
                    
                    let afs = (r[this.colMap.af] || '').split(/[\/／]/).map(a => a.trim()).filter(x => x);
                    let mAf = false;
                    
                    if(afs.length === 0) {
                        if(this.selectedAfs.has('(無屬性)')) mAf = true;
                    } else {
                        for(let a of afs) {
                            if(this.selectedAfs.has(a)){ mAf = true; break; }
                        }
                    }
                    if(!mAf && this.selectedAfs.size > 0) return;
                    
                    if(kw) {
                        let p = true;
                        let sts = Utility.parseStats(r[this.colMap.stats]);
                        let age = parseInt(r[this.colMap.age]) || 0;
                        let tStr = `${r[this.colMap.name]} ${sto} ${r[this.colMap.techId]} ${loc} ${r[this.colMap.af]} ${r[this.colMap.level]}`.toLowerCase();
                        
                        for(let c of kw.split('+').map(x => x.trim()).filter(x => x)) {
                            let not = c.startsWith('-'); 
                            let t = not ? c.substring(1).trim() : c; 
                            if(!t) continue;
                            
                            let opM = t.match(/^([a-z\u4e00-\u9fa5]+)\s*([><=])\s*(\d+|[a-z])$/i);
                            if(opM) {
                                let f = opM[1].toUpperCase(), op = opM[2], val = opM[3], rV = null, cM = false;
                                
                                if(f === 'B' || f === '胸圍') rV = sts.b; 
                                else if(f === 'W' || f === '腰圍') rV = sts.w; 
                                else if(f === 'H' || f === '臀圍') rV = sts.hp; 
                                else if(f === 'T' || f === '身高') rV = sts.h; 
                                else if(f === 'AGE' || f === '年齡' || f === '年') rV = age; 
                                else if(f === 'CUP' || f === '罩杯') rV = sts.cup;
                                
                                if(rV !== null && rV !== 0 && rV !== '?') { 
                                    if(f === 'CUP' || f === '罩杯') {
                                        let s1 = rV.charCodeAt(0), s2 = val.toUpperCase().charCodeAt(0); 
                                        if(op === '>') cM = s1 > s2; else if(op === '<') cM = s1 < s2; else if(op === '=') cM = s1 === s2;
                                    } else {
                                        let n = parseInt(val); 
                                        if(op === '>') cM = rV > n; else if(op === '<') cM = rV < n; else if(op === '=') cM = rV === n;
                                    } 
                                }
                                if(not ? cM : !cM){ p = false; break; }
                            } else { 
                                let m = tStr.includes(t.toLowerCase()); 
                                if(not ? m : !m){ p = false; break; } 
                            }
                        }
                        if(!p) return;
                    }
                    
                    let hW = false, tM = false, dE = false, sr = r[this.colMap.schedule] || '';
                    if(sr) {
                        for(let l of sr.split('\n')) {
                            let m = l.match(/^(\d{1,2}\/\d{1,2})\s*(\(.\))?\s*(.+)$/);
                            if(m) {
                                if(fD && m[1] !== fD) continue; 
                                dE = true; 
                                let isO = m[3].includes('休') || m[3].includes('み');
                                if(!isO) {
                                    hW = true; 
                                    if(qS === null && qE === null) tM = true;
                                    else { 
                                        let tm = m[3].match(/(\d{1,2}:\d{2})\s*[-~〜ー]\s*(\d{1,2}:\d{2})/); 
                                        if(tm) {
                                            let ts = Utility.timeToMins(tm[1]), te = Utility.timeToMins(tm[2]); 
                                            if(te <= ts) te += 1440; 
                                            if(Math.max(ts, qS || 0) < Math.min(te, qE || 9999)) tM = true;
                                        } 
                                    }
                                }
                            }
                        }
                    }
                    if((fD || qS !== null || qE !== null) && !tM) return; 
                    if(fSt === 'working' && !hW) return; 
                    if(fSt === 'off' && (hW || !dE)) return;
                    
                    list.push({record, index});
                });
                
                list.sort((a, b) => {
                    let aFav = a.record._raw[this.colMap.favorite] === 'Y' ? 1 : 0;
                    let bFav = b.record._raw[this.colMap.favorite] === 'Y' ? 1 : 0; 
                    if(aFav !== bFav) return bFav - aFav;
                    
                    let res = 0;
                    if(sO === 'cup') {
                        res = Utility.getCupScore(a.record._raw[this.colMap.stats]) - Utility.getCupScore(b.record._raw[this.colMap.stats]);
                    } else if(sO === 'body') {
                        res = Utility.getBodyScore(a.record._raw[this.colMap.stats], a.record._raw[this.colMap.store], this.rulesData) - Utility.getBodyScore(b.record._raw[this.colMap.stats], b.record._raw[this.colMap.store], this.rulesData);
                    } else if(sO === 'updateTime') { 
                        let tA = a.record._raw[this.colMap.updateTime] ? new Date(a.record._raw[this.colMap.updateTime]).getTime() : 0;
                        let tB = b.record._raw[this.colMap.updateTime] ? new Date(b.record._raw[this.colMap.updateTime]).getTime() : 0; 
                        res = (isNaN(tA) ? 0 : tA) - (isNaN(tB) ? 0 : tB); 
                    } else {
                        res = a.index - b.index; 
                    }
                    return this.sortDesc ? -res : res;
                });

                list.forEach(item => {
                    const r = item.record._raw;
                    const i = item.index; 

                    const isFav = r[this.colMap.favorite] === 'Y';
                    const recLocation = r[this.colMap.location] || '';
                    let cleanImg = Utility.cleanDriveUrl(r[this.colMap.photo]);
                    const imgSrc = cleanImg || PLACEHOLDER_URL;
                    const ageStr = r[this.colMap.age] ? ` (${r[this.colMap.age]})` : '';
                    const storeName = r[this.colMap.store] || '無店名';
                    const targetUrl = r[this.colMap.url] || '';
                    
                    let tagsHtml = '';
                    const afVal = r[this.colMap.af] || '';
                    const levelVal = r[this.colMap.level] || '';
                    
                    if (afVal) {
                        afVal.split(/[/／]/).forEach(t => {
                            if (t.trim()) tagsHtml += `<span class="tag-item">${t.trim()}</span>`;
                        });
                    }
                    if (levelVal) tagsHtml += `<span class="tag-item">等級: ${levelVal}</span>`;
                    
                    let rawStats = r[this.colMap.stats] || '';
                    let cup = '?';
                    let cupMatch = rawStats.match(/\(([A-Z])\)/i) || rawStats.match(/(?:^|[\s/])([A-Z])(?:[\s/]|$|cup|罩杯)/i);
                    if (cupMatch) cup = cupMatch[1].toUpperCase();

                    let cleanedStats = rawStats.replace(/\([A-Z]\)/ig, ''); 
                    if (cup !== '?') {
                        let cupRegex = new RegExp(`[/\\s]?${cup}(?:cup|罩杯)?$`, 'i');
                        cleanedStats = cleanedStats.replace(cupRegex, '');
                    }
                    cleanedStats = cleanedStats.replace(/[/]+/g, ' ').trim();

                    if (!/[BWH]\d{2}/i.test(cleanedStats)) {
                        let hwMatch = cleanedStats.match(/^(\d{3})\s+(\d{2})$/);
                        if (hwMatch) cleanedStats = `${hwMatch[1]}cm ${hwMatch[2]}kg`;
                    }

                    let cupColor = '#9e9e9e';
                    if (['A','B','C'].includes(cup)) cupColor = '#4caf50';
                    else if (['D','E','F'].includes(cup)) cupColor = '#ff9800';
                    else if (['G','H','I','J'].includes(cup)) cupColor = '#e91e63';
                    else if (cup !== '?') cupColor = '#b71c1c';

                    let statsHtml = `
                        <div class="stats-row" title="${rawStats}">
                            <span class="cup-badge" style="background:${cupColor};">${cup !== '?' ? cup + '杯' : '?杯'}</span>
                            <span style="overflow: hidden; text-overflow: ellipsis; flex: 1;">${cleanedStats}</span>
                        </div>
                    `;

                    let priceHtml = '';
                    let priceLines = (r[this.colMap.price] || '').split(/[\n\r;]+/).filter(l => l.trim() !== '');
                    if (priceLines.length > 0) {
                        priceHtml = '<div class="price-col">';
                        priceLines.forEach(line => {
                            let pMatch = line.match(/(\d{4,6})\s*\/\s*(\d{2,3})(.*)/);
                            if (pMatch) {
                                let amt = parseInt(pMatch[1]).toLocaleString();
                                priceHtml += `<div>JPY ¥${amt} / ${pMatch[2]}分 ${pMatch[3] || ''}</div>`;
                            } else {
                                let nMatch = line.match(/(\d{4,6})/);
                                if (nMatch) {
                                    let amt = parseInt(nMatch[1]).toLocaleString();
                                    priceHtml += `<div>JPY ¥${line.replace(nMatch[1], amt)}</div>`;
                                } else {
                                    priceHtml += `<div>${line}</div>`;
                                }
                            }
                        });
                        priceHtml += '</div>';
                    }

                    const shapeData = Utility.getBodyShapeData(r[this.colMap.stats], storeName, this.rulesData);
                    let nameRowHtml = '';
                    if (shapeData) {
                        tagsHtml += `<span class="tag-item" style="background:#546e7a; color:white;" title="身型分類">${shapeData.shapeIcon} ${shapeData.shapeType}</span>`;
                        let tagsContainer = `<div class="tags-row">${tagsHtml}</div>`;

                        nameRowHtml = `
                            <div class="name-row">
                                <div class="mini-svg-box" title="實色: 該技師體型\n虛線: 日本女性平均體型">${shapeData.svgHtml}</div>
                                <div class="name-col">
                                    <div class="tech-name">${r[this.colMap.name] || '未命名'} ${ageStr}</div>
                                    <div class="score-row">
                                        <span class="big-badge" style="background:${shapeData.scoreColor};" title="沙漏比例曲線評分">👑 ${shapeData.score}分</span>
                                        <span class="big-badge" style="background:${shapeData.cupDiffColor};" title="推算真實罩杯 (與宣稱差異越大顏色越深)">實推 ${shapeData.trueCup}杯</span>
                                    </div>
                                </div>
                            </div>
                        `;
                        nameRowHtml += tagsContainer;
                    } else {
                        let tagsContainer = `<div class="tags-row">${tagsHtml}</div>`;
                        nameRowHtml = `<div class="tech-name">${r[this.colMap.name] || '未命名'} ${ageStr}</div>${tagsContainer}`;
                    }

                    const schHTML = RuleEngine.parseAndFormatSchedule(r[this.colMap.schedule], tu, r[this.colMap.store], this.rulesData);

                    const card = document.createElement('div');
                    card.className = 'card';
                    if (this.selectedCards.has(i)) card.classList.add('selected');
                    
                    let titleStr = "";
                    const isMobile = window.innerWidth <= 850;
                    if (this.isEditMode) {
                        titleStr = "左鍵：編輯資料\n右鍵：開啟專屬網址\n按住拖曳可改變排序\n按住 Ctrl 拖曳可複製(清空特定欄位)";
                    } else {
                        titleStr = isMobile ? "點擊：開啟專屬網址" : "左鍵：檢視完整卡牌\n右鍵：開啟專屬網址";
                    }
                    card.title = titleStr;
                    
                    card.onclick = (e) => {
                        if (e.target.closest('.sch-container-vert') || e.target.closest('.sch-wrapper') || e.target.closest('.fav-btn') || e.target.classList.contains('card-checkbox')) return;
                        
                        if (this.isEditMode) {
                            this.editRecord(i); 
                        } else {
                            if (window.innerWidth <= 850) {
                                if (targetUrl && targetUrl.startsWith('http')) {
                                    window.open(targetUrl, '_blank');
                                } else {
                                    Utility.showToast('⚠️ 系統提示：此技師尚未建立網址，或網址格式不正確！', true);
                                }
                            } else {
                                this.editRecord(i);
                            }
                        }
                    };
                    
                    card.oncontextmenu = (e) => {
                        e.preventDefault(); 
                        if (targetUrl && targetUrl.startsWith('http')) window.open(targetUrl, '_blank');
                        else Utility.showToast('⚠️ 系統提示：此技師尚未建立網址，或網址格式不正確！', true);
                    };

                    if (this.isEditMode && this.hasWriteAccess) {
                        card.draggable = true;
                        
                        card.ondragstart = (e) => {
                            e.dataTransfer.effectAllowed = 'copyMove'; 
                            e.dataTransfer.setData('text/plain', i); 
                            setTimeout(() => card.classList.add('dragging'), 0);
                        };
                        
                        card.ondragend = () => {
                            card.classList.remove('dragging');
                        };
                        
                        card.ondragover = (e) => {
                            e.preventDefault();
                            const isCopy = e.ctrlKey || e.metaKey;
                            e.dataTransfer.dropEffect = isCopy ? 'copy' : 'move';
                            const overCard = e.target.closest('.card');
                            if (overCard) {
                                overCard.classList.add('drag-over');
                                if (isCopy) {
                                    overCard.style.borderColor = "var(--warning)";
                                    overCard.style.background = "#fff3e0";
                                } else {
                                    overCard.style.borderColor = "var(--primary)";
                                    overCard.style.background = "#f3e5f5";
                                }
                            }
                        };
                        
                        card.ondragleave = (e) => {
                            const overCard = e.target.closest('.card');
                            if (overCard) {
                                overCard.classList.remove('drag-over');
                                overCard.style.borderColor = "";
                                overCard.style.background = "";
                            }
                        };
                        
                        card.ondrop = (e) => {
                            e.preventDefault();
                            const overCard = e.target.closest('.card');
                            if (overCard) {
                                overCard.classList.remove('drag-over');
                                overCard.style.borderColor = "";
                                overCard.style.background = "";
                            }
                            
                            const oldIndex = parseInt(e.dataTransfer.getData('text/plain'), 10);
                            if (!isNaN(oldIndex)) {
                                const isCopy = e.ctrlKey || e.metaKey || e.dataTransfer.dropEffect === 'copy';
                                if (isCopy) {
                                    this.copyItem(oldIndex, i); 
                                } else {
                                    this.reorderItems(oldIndex, i); 
                                }
                            }
                        };
                    } else {
                        card.draggable = false;
                        card.ondragstart = (e) => {
                            e.preventDefault();
                        };
                    }
                    
                    let checkboxHtml = this.isEditMode ? `<input type="checkbox" class="card-checkbox" value="${i}" ${this.selectedCards.has(i) ? 'checked' : ''}>` : '';

                    card.innerHTML = `
                        ${checkboxHtml}
                        <div class="img-container">
                            <span class="badge">${recLocation || '未知區'}</span>
                            <div class="fav-btn" onclick="app.toggleFavorite(event, ${i})" title="加入/移除最愛 (置頂)">
                                ${isFav ? '❤️' : '🤍'}
                            </div>
                            <img src="${imgSrc}" loading="lazy" onerror="this.onerror=null; this.src='${PLACEHOLDER_URL}';">
                        </div>
                        <div class="store-name">${storeName}</div>
                        ${nameRowHtml}
                        ${statsHtml}
                        ${priceHtml}
                        ${schHTML}
                    `;
                    grid.appendChild(card);
                });
            }
        }
        
        window.app = new AppCore();
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer onload="if(window.app) window.app.initGoogleAuth()"></script>
</body>
</html>
