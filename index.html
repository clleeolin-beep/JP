            processBatchData(createMissing) {
                if (!this.accessToken || !this.hasWriteAccess) { 
                    Utility.showToast("⚠️ 請先切換至編輯模式並完成 Google 授權！", true);
                    return; 
                }

                const text = document.getElementById('v_magic_paste')?.value.trim();
                
                let splitterRules = window.ruleEngine.getRulesForField('System_Anchor');
                let splitPattern = '收藏夾';
                let singlePattern = '(?:名稱|名前|Name)';
                splitterRules.forEach(r => {
                    if(r.ruleType === 'Block_Splitter') splitPattern = r.pattern;
                    if(r.ruleType === 'Single_Detector') singlePattern = r.pattern;
                });
                
                let safeSplit = Utility.getSafePattern(splitPattern);
                let splitRegex;
                try { splitRegex = new RegExp(safeSplit, 'g'); } catch(err) { splitRegex = /收藏夾/g; }

                if (!text || text.split(splitRegex).length <= 1) {
                    Utility.showToast('⚠️ 請在【魔法貼上】框內貼上女優一覽的批次資料！', true);
                    return;
                }

                let siteMatches = ['Common'];
                let lowerText = text.toLowerCase();
                if(lowerText.includes('yoasobi-heaven.com') || lowerText.includes('yoasobi') || lowerText.includes('出勤表')) {
                    siteMatches.push('yoasobi-heaven.com');
                }
                if(lowerText.includes('yoshiwara-soap.jp') || lowerText.includes('yoshiwara')) {
                    siteMatches.push('yoshiwara-soap.jp');
                }

                // 核心保護：強勢清洗左側輸入框帶來的店名
                const formStoreVal = Utility.cleanStoreNameDisplay(document.getElementById('v_store')?.value);
                const formPriceVal = document.getElementById('v_price')?.value.trim() || "";
                const formLocationVal = document.getElementById('v_location')?.value.trim() || "";
                const formAfVal = document.getElementById('v_af')?.value.trim() || "";
                const formTags = formAfVal.split(/[\/／]/).map(t => t.trim()).filter(t => t);

                Utility.showLoading("動態規則解析與同步資料庫中...");

                setTimeout(() => {
                    try {
                        let mStore = window.ruleEngine.extractByRules(text, "", "v_store", siteMatches);
                        // 核心保護：強勢清洗從網頁抓取來的店名
                        let baseStore = Utility.cleanStoreNameDisplay(mStore.value ? mStore.value : formStoreVal);

                        const blocks = text.split(splitRegex).filter(b => b.trim().length > 10);
                        let updateCount = 0;
                        let createCount = 0;

                        blocks.forEach(block => {
                            let extractedName = window.ruleEngine.extractByRules(block, "", "v_name", siteMatches);
                            
                            if (!extractedName.value) {
                                let fallbackMatch = block.match(/No\.\d+\s*\n\s*(.*?)(?=\s*(?:\(|年齡|年齢|Age|年齢|歳|才|歲|\n|$))/i);
                                if (fallbackMatch && fallbackMatch[1]) {
                                    extractedName.value = fallbackMatch[1].trim();
                                } else {
                                    let altMatch = block.match(/(?:名稱|名前|Name)\s*(.*?)(?=\s*(?:\(|年齡|年齢|Age|年齢|歳|才|歲|\n|$))/i);
                                    if (altMatch && altMatch[1]) extractedName.value = altMatch[1].trim();
                                }
                            }
                            
                            if (!extractedName.value) return; 
                            
                            let nameInfo = Utility.parseName(extractedName.value, window.ruleEngine);
                            let pureName = nameInfo.pureName;

                            let finalStore = baseStore;
                            if (formStoreVal && !finalStore.includes(formStoreVal)) {
                                finalStore += " " + formStoreVal;
                            }
                            finalStore = Utility.cleanStoreNameDisplay(finalStore); // 強制清洗合併後的最終店名

                            let extStatsObj = window.ruleEngine.extractByRules(block, "", "v_stats", siteMatches);
                            let extStats = extStatsObj.value;
                            if (!extStats) {
                                let mStats = block.match(/(T\d{3}[^\n]+)/i);
                                if (mStats) extStats = mStats[1].replace(/from.*/i, '').trim();
                            }

                            // 🚨 第一道主鍵鎖：提取 URL ID (具有絕對唯一性)
                            let extractedUrlObj = window.ruleEngine.extractByRules(block, "", "v_url", siteMatches);
                            let extUrl = extractedUrlObj.value;
                            if (!extUrl) {
                                let mUrl = block.match(/https?:\/\/[^\s]+/);
                                if (mUrl) extUrl = mUrl[0];
                            }

                            let mSchObj = window.ruleEngine.extractByRules(block, "", "v_schedule", siteMatches);
                            let mSch = mSchObj.value;
                            if (!mSch) {
                                let mSchFallback = block.match(/(?:出勤情報|スケジュール|出勤表|出勤スケジュール)[\s\S]*/);
                                if (mSchFallback) mSch = mSchFallback[0];
                            }
                            
                            if (mSch) {
                                let formattedSch = Utility.parseAndFormatSchedule(mSch, window.ruleEngine);
                                let hasSchedule = /\d{1,2}\/\d{1,2}/.test(formattedSch) && (formattedSch.includes('休息') || formattedSch.includes(':'));
                                
                                if (hasSchedule || extStats) {
                                    let tagSet = new Set();
                                    nameInfo.tags.forEach(t => tagSet.add(t)); 
                                    
                                    formTags.forEach(t => {
                                        let upper = t.toUpperCase();
                                        if(upper === 'AF' || upper === '3P' || upper === '射O') tagSet.add(upper);
                                        else tagSet.add(t);
                                    });

                                    let levelVal = nameInfo.level;

                                    let recordIdx = -1;

                                    // 🥇 第一順位匹配：URL (絕對唯一身分證)
                                    if (extUrl) {
                                        let cleanExtUrl = extUrl.split('?')[0].replace(/\/$/, "");
                                        recordIdx = this.dataStore.findIndex(r => {
                                            let dbUrl = (r._raw[this.colMap.url] || "").trim();
                                            let cleanDbUrl = dbUrl.split('?')[0].replace(/\/$/, "");
                                            return cleanDbUrl && cleanDbUrl === cleanExtUrl;
                                        });
                                    }

                                    // 🥈 第二順位匹配：如果沒有 URL，強制使用「姓名 + 嚴格店名」 (拒絕三圍匹配)
                                    if (recordIdx === -1) {
                                        recordIdx = this.dataStore.findIndex(r => {
                                            let dbName = r._raw[this.colMap.name] || "";
                                            let cleanDbName = Utility.parseName(dbName, window.ruleEngine).pureName; 
                                            
                                            let dbStore = r._raw[this.colMap.store] || "";
                                            
                                            let nameMatch = cleanDbName.toLowerCase() === pureName.toLowerCase();
                                            // 🛡️ 啟動防分店污染的主力：isSameStore 會拒絕 SHINJUKU 蓋過本家
                                            let storeMatch = Utility.isSameStore(dbStore, finalStore);

                                            return nameMatch && storeMatch;
                                        });
                                    }

                                    if (recordIdx !== -1 && this.dataStore[recordIdx]) {
                                        if (hasSchedule) this.dataStore[recordIdx]._raw[this.colMap.schedule] = formattedSch;
                                        if (extStats) this.dataStore[recordIdx]._raw[this.colMap.stats] = extStats; 
                                        
                                        // 若原本資料庫裡沒有 URL，順便補上去
                                        if (extUrl && !this.dataStore[recordIdx]._raw[this.colMap.url]) {
                                            this.dataStore[recordIdx]._raw[this.colMap.url] = extUrl;
                                        }

                                        let originalDbAf = this.dataStore[recordIdx]._raw[this.colMap.af] || "";
                                        originalDbAf.split(/[\/／]/).map(t=>t.trim()).filter(t=>t).forEach(t => {
                                            let upper = t.toUpperCase();
                                            if(upper === 'AF' || upper === '3P' || upper === '射O') tagSet.add(upper);
                                            else tagSet.add(t);
                                        });
                                        
                                        if (tagSet.size > 0) {
                                            this.dataStore[recordIdx]._raw[this.colMap.af] = Array.from(tagSet).join(' / ');
                                        }

                                        if (levelVal) {
                                            this.dataStore[recordIdx]._raw[this.colMap.level] = levelVal;
                                        }
                                        
                                        this.dataStore[recordIdx]._raw[this.colMap.updateTime] = Utility.getCurrentTime();

                                        updateCount++;
                                    } else if (createMissing) {
                                        let newRowData = new Array(this.headerRow.length).fill("");
                                        const setV = (key, val) => { const idx = this.colMap[key]; if(idx !== -1 && idx !== undefined) newRowData[idx] = val; };
                                        
                                        setV('techId', Utility.generateID());
                                        setV('store', finalStore);
                                        setV('name', pureName);
                                        setV('stats', extStats);
                                        setV('price', formPriceVal);
                                        setV('location', formLocationVal);
                                        setV('url', extUrl); // 寫入唯一網址
                                        setV('updateTime', Utility.getCurrentTime());
                                        
                                        if (hasSchedule) setV('schedule', formattedSch);
                                        if (tagSet.size > 0) setV('af', Array.from(tagSet).join(' / '));
                                        if (levelVal) setV('level', levelVal);

                                        let mAgeObj = window.ruleEngine.extractByRules(block, "", "v_age", siteMatches);
                                        let finalAge = mAgeObj.value;
                                        if(!finalAge) {
                                            let fallbackAge = block.match(/(?:Age|年齢|年齡)\s*(\d+)/i) || block.match(/(\d+)\s*(?:歳|才|歲)/);
                                            if(fallbackAge) finalAge = fallbackAge[1];
                                        }
                                        if (finalAge) setV('age', finalAge + "歲");

                                        this.dataStore.push({
                                            id: String(newRowData[this.colMap.techId]),
                                            _raw: newRowData,
                                            _rowIndex: "" 
                                        });
                                        createCount++;
                                    }
                                }
                            }
                        });

                        if (updateCount > 0 || createCount > 0) {
                            this.renderCatalog();
                            this.saveOrderToGoogleSheet(true); 
                            if (createMissing) {
                                Utility.showToast(`✅ 建檔批次完成！新增 ${createCount} 筆，更新 ${updateCount} 筆。`);
                            } else {
                                Utility.showToast(`✅ 更新批次完成！成功更新了 ${updateCount} 筆資料。`);
                            }
                            const mPaste = document.getElementById('v_magic_paste');
                            if(mPaste) mPaste.value = ''; 
                        } else {
                            Utility.showToast('⚠️ 找不到可建立或更新的技師資料，請確認內容格式。', true);
                        }
                    } catch (err) {
                        console.error(err);
                        Utility.showToast('⚠️ 解析過程發生系統錯誤：' + err.message, true);
                    } finally {
                        Utility.hideLoading();
                    }
                }, 100); 
            }

            processMagicPaste(text, html) {
                if (!text) return;
                
                let extractedUrl = "";
                let urlMatch = text.match(/https?:\/\/[^\s]+/);
                if (urlMatch) {
                    extractedUrl = urlMatch[0];
                }

                let recordIdx = -1;
                // 🥇 第一順位匹配：單人頁面 URL 檢查
                if (extractedUrl) {
                    recordIdx = this.dataStore.findIndex(r => {
                        let dbUrl = (r._raw[this.colMap.url] || "").trim();
                        let cleanDbUrl = dbUrl.split('?')[0].replace(/\/$/, "");
                        let cleanExtUrl = extractedUrl.split('?')[0].replace(/\/$/, "");
                        return cleanDbUrl && cleanDbUrl === cleanExtUrl;
                    });
                }

                let isPureUrl = /^https?:\/\/[^\s]+$/.test(text.trim());
                if (isPureUrl) {
                    if (recordIdx !== -1) {
                        this.editRecord(recordIdx);
                        Utility.showToast('✨ 偵測到資料庫已有此網址，已自動載入該技師資料！');
                    } else {
                        const urlInput = document.getElementById('v_url');
                        if(urlInput) urlInput.value = extractedUrl;
                        Utility.showToast('✨ 已自動辨識並填入新網址！');
                    }
                    return;
                }

                let siteMatches = ['Common'];
                if(html && html.includes('yoasobi-heaven.com') || text.includes('yoasobi')) siteMatches.push('yoasobi-heaven.com');
                if(html && html.includes('yoshiwara-soap.jp') || text.includes('yoshiwara')) siteMatches.push('yoshiwara-soap.jp');
                const specificMatch = extractedUrl.match(/(YA\d+|A\d+)/);
                if(specificMatch) siteMatches.push(specificMatch[1]);

                let extractedNameObj = window.ruleEngine.extractByRules(text, html, 'v_name', siteMatches);
                let extractedStatsObj = window.ruleEngine.extractByRules(text, html, 'v_stats', siteMatches);
                let extractedScheduleObj = window.ruleEngine.extractByRules(text, html, 'v_schedule', siteMatches);
                let extractedAgeObj = window.ruleEngine.extractByRules(text, html, 'v_age', siteMatches);
                let extractedDateObj = window.ruleEngine.extractByRules(text, html, 'v_start_date', siteMatches);
                let extractedPriceObj = window.ruleEngine.extractByRules(text, html, 'v_price', siteMatches);
                let extractedStoreObj = window.ruleEngine.extractByRules(text, html, 'v_store', siteMatches);

                let rawNameExt = extractedNameObj.value || "";
                if (!rawNameExt) {
                    let altMatch = text.match(/No\.\d+\s*\n\s*(.*?)(?=\s*(?:\(|年齡|年齢|Age|年齢|歳|才|歲|\n|$))/i) || 
                                   text.match(/(?:名稱|名前|Name)\s*(.*?)(?=\s*(?:\(|年齡|年齢|Age|年齢|歳|才|歲|\n|$))/i);
                    if (altMatch) rawNameExt = altMatch[1].trim();
                }

                let extStore = extractedNameObj.secondaryValue || extractedStoreObj.value || document.getElementById('v_store')?.value.trim() || "";
                extStore = Utility.cleanStoreNameDisplay(extStore); // 強勢清洗店名

                let nameInfo = Utility.parseName(rawNameExt, window.ruleEngine);
                let pureName = nameInfo.pureName || rawNameExt;
                
                let extStats = extractedStatsObj.value;
                if (!extStats) {
                    let mStats = text.match(/(T\d{3}[^\n]+)/i);
                    if (mStats) extStats = mStats[1].replace(/from.*/i, '').trim();
                }

                let isExisting = false;
                // 🥈 第二順位匹配：沒有網址的情況下，依賴「姓名 + 嚴格歸一店名」
                if (recordIdx === -1 && pureName) {
                    recordIdx = this.dataStore.findIndex(r => {
                        let dbName = r._raw[this.colMap.name] || "";
                        let cleanDbName = Utility.parseName(dbName, window.ruleEngine).pureName; 
                        
                        let dbStore = (r._raw[this.colMap.store] || "").trim();
                        
                        let nameMatch = cleanDbName.toLowerCase() === pureName.toLowerCase();
                        let storeMatch = Utility.isSameStore(dbStore, extStore);

                        return nameMatch && storeMatch; // 拔除三圍誤判機制
                    });
                }

                if (recordIdx !== -1 && this.dataStore[recordIdx]) {
                    this.editRecord(recordIdx); 
                    isExisting = true;
                }

                const fieldsToClear = ['v_age', 'v_stats', 'v_start_date', 'v_schedule'];
                fieldsToClear.forEach(id => {
                    let el = document.getElementById(id);
                    if (el) el.value = '';
                });

                if (!isExisting) {
                    let rIdx = document.getElementById('v_row_index');
                    let tIdx = document.getElementById('v_tech_id');
                    if(rIdx) rIdx.value = '';
                    if(tIdx) tIdx.value = '';
                }
                
                let elName = document.getElementById('v_name');
                let elStore = document.getElementById('v_store');
                let elUrl = document.getElementById('v_url');
                let elStats = document.getElementById('v_stats');
                let elAge = document.getElementById('v_age');
                let elStartDate = document.getElementById('v_start_date');
                let elAf = document.getElementById('v_af');
                let elLevel = document.getElementById('v_level');
                let elSchedule = document.getElementById('v_schedule');

                if (pureName && elName) elName.value = pureName; 
                if (extStore && elStore) elStore.value = extStore;
                if (extractedUrl && elUrl) elUrl.value = extractedUrl;
                if (extStats && elStats) elStats.value = extStats;
                
                let finalAge = extractedAgeObj.value;
                if(!finalAge) {
                    let mAge = text.match(/(?:Age|年齢|年齡)\s*(\d+)/i) || text.match(/(\d+)\s*(?:歳|才|歲)/);
                    if (mAge) finalAge = mAge[1];
                }
                if (finalAge && elAge) elAge.value = finalAge + "歲";
                
                if (extractedDateObj.value && elStartDate) elStartDate.value = extractedDateObj.value;
                
                let foundTags = new Set();
                let existingTags = (elAf?.value || "").split(/[\/／]/).map(t=>t.trim()).filter(t=>t);
                existingTags.forEach(t => foundTags.add(t));
                
                let isTagUpdated = false;
                
                let afRuleTags = window.ruleEngine.extractByRules(text, html, 'v_af', siteMatches);
                if (afRuleTags.tags.size > 0) {
                    afRuleTags.tags.forEach(t => foundTags.add(t));
                    isTagUpdated = true;
                }

                if (nameInfo.tags.length > 0) {
                    nameInfo.tags.forEach(t => { foundTags.add(t); isTagUpdated = true; });
                }
                
                if (nameInfo.level && elLevel) {
                    elLevel.value = nameInfo.level;
                } else if (extractedNameObj.level && elLevel) {
                    elLevel.value = extractedNameObj.level;
                }

                if (isTagUpdated && foundTags.size > 0 && elAf) {
                    elAf.value = Array.from(foundTags).join(' / ');
                }

                let scheduleText = extractedScheduleObj.value;
                if (!scheduleText) {
                    let mSch = text.match(/(?:出勤情報|スケジュール|出勤表|出勤スケジュール)[\s\S]*/);
                    if (mSch) scheduleText = mSch[0];
                }
                
                let formattedSch = Utility.parseAndFormatSchedule(scheduleText, window.ruleEngine);
                let hasSchedule = /\d{1,2}\/\d{1,2}/.test(formattedSch) && (formattedSch.includes('休息') || formattedSch.includes(':'));
                
                if (hasSchedule && elSchedule) {
                    elSchedule.value = formattedSch;
                }

                if (isExisting) {
                    Utility.showToast('✨ 偵測到已有該技師，已自動載入舊資料並更新！請確認後儲存。');
                } else if (hasSchedule) {
                    Utility.showToast('✨ 綜合資訊已自動解析！(新建立技師資料)');
                } else {
                    Utility.showToast('✨ 已更新部分資訊 (未偵測到班表)');
                }
            }

            setupSchedulePasting() {
                const scheduleInput = document.getElementById('v_schedule');
                if(!scheduleInput) return;
                scheduleInput.addEventListener('paste', (e) => {
                    e.preventDefault();
                    let pastedText = (e.clipboardData || window.clipboardData).getData('text');
                    scheduleInput.value = Utility.parseAndFormatSchedule(pastedText, window.ruleEngine);
                    Utility.showToast('✅ 班表已成功解析貼上');
                });
            }

            setupDatePasting() {
                const dateInput = document.getElementById('v_start_date');
                if(!dateInput) return;
                dateInput.addEventListener('paste', (e) => {
                    e.preventDefault();
                    let pastedText = (e.clipboardData || window.clipboardData).getData('text');
                    
                    let extractObj = window.ruleEngine.extractByRules(pastedText, "", "v_start_date", ['Common']);
                    if (extractObj.value) {
                         dateInput.value = extractObj.value;
                    } else {
                        let match = pastedText.match(/(\d{4})\s*[年\/\-.]\s*(\d{1,2})\s*[月\/\-.]\s*(\d{1,2})/);
                        if (match) {
                            let y = match[1];
                            let m = match[2].padStart(2, '0');
                            let d = match[3].padStart(2, '0');
                            dateInput.value = `${y}-${m}-${d}`;
                        } else {
                            Utility.showToast('⚠️ 無法辨識日期格式，請手動選擇或輸入', true);
                        }
                    }
                });
            }

            registerKeyboardShortcuts() {
                document.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
                        e.preventDefault();
                        const saveBtn = document.getElementById('btn-save');
                        if(!saveBtn) return;
                        if (this.accessToken && !saveBtn.disabled && this.hasWriteAccess) {
                            this.saveToGoogleSheet();
                        } else if (!this.hasWriteAccess) {
                            Utility.showToast('⚠️ 請先切換至編輯模式並完成授權！', true);
                        } else {
                            Utility.showToast('⚠️ 無法儲存：請確認必要欄位已填寫完畢。', true);
                        }
                    }
                });
            }

            toggleMode() {
                if (!this.isEditMode) {
                    if (!this.hasWriteAccess && this.tokenClient) {
                        this.tokenClient.callback = (resp) => {
                            if (resp.error) {
                                Utility.showToast('⚠️ 已取消授權，無法進入編輯模式', true);
                                return;
                            }
                            this.accessToken = resp.access_token;
                            this.hasWriteAccess = true;
                            sessionStorage.setItem('gapi_access_token', resp.access_token);
                            sessionStorage.setItem('gapi_has_write', 'true');
                            this.executeToggleMode();
                        };
                        this.tokenClient.requestAccessToken({
                            prompt: '',
                            scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive'
                        });
                        return;
                    }
                }
                this.executeToggleMode();
            }

            executeToggleMode() {
                this.isEditMode = !this.isEditMode;
                const container = document.getElementById('app-container');
                const btn = document.getElementById('btn-mode-toggle');
                if(!container || !btn) return;
                
                this.selectedCards.clear();
                this.updateBatchUI();
                
                if (this.isEditMode) {
                    container.classList.remove('view-mode');
                    container.classList.add('edit-mode');
                    btn.innerHTML = '👁️ <span class="btn-text">切換瀏覽</span>';
                    btn.className = 'secondary';
                    btn.style.background = '';
                } else {
                    container.classList.remove('edit-mode');
                    container.classList.add('view-mode');
                    btn.innerHTML = '📝 <span class="btn-text">切換編輯</span>';
                    btn.className = 'primary';
                    btn.style.background = '#e91e63'; 
                }
                
                this.renderCatalog();
            }

            toggleSortDir() {
                this.sortDesc = !this.sortDesc;
                const btn = document.getElementById('btn-sort-dir');
                if(btn) btn.innerHTML = this.sortDesc ? '⬇ 降序' : '⬆ 升序';
                this.renderCatalog();
            }

            initGoogleAuth() {
                const storedToken = sessionStorage.getItem('gapi_access_token');
                const storedHasWrite = sessionStorage.getItem('gapi_has_write') === 'true';
                this.populateTimeDropdowns();

                this.tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
                    callback: '' 
                });

                if (storedToken) {
                    this.accessToken = storedToken;
                    this.hasWriteAccess = storedHasWrite;
                    this.onAuthSuccess();
                }
            }

            onAuthSuccess() {
                const banner = document.getElementById('auth-banner');
                if(banner) banner.style.display = 'none';
                this.fetchSheetNames();
            }

            triggerAuth() {
                if(!this.tokenClient) return;
                this.tokenClient.callback = (resp) => {
                    if (resp.error) return;
                    this.accessToken = resp.access_token;
                    
                    this.hasWriteAccess = google.accounts.oauth2.hasGrantedAllScopes(resp, 'https://www.googleapis.com/auth/spreadsheets', 'https://www.googleapis.com/auth/drive');
                    
                    sessionStorage.setItem('gapi_access_token', resp.access_token);
                    sessionStorage.setItem('gapi_has_write', this.hasWriteAccess ? 'true' : 'false');
                    this.onAuthSuccess();
                };
                this.tokenClient.requestAccessToken({
                    prompt: 'consent'
                });
            }

            async fetchSheetNames() {
                if (!this.accessToken) return;
                try {
                    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets.properties(title,sheetId)`, {
                        headers: { 'Authorization': `Bearer ${this.accessToken}` }
                    });
                    const data = await res.json();
                    
                    if (data.error) {
                        if (data.error.code === 401) {
                            this.handleTokenExpired();
                            return;
                        }
                        throw new Error(data.error.message);
                    }

                    if (data.sheets) {
                        const select = document.getElementById('v_sheet');
                        if(select) {
                            select.innerHTML = ''; 
                            data.sheets.forEach(s => {
                                const opt = document.createElement('option');
                                opt.value = s.properties.title;
                                opt.innerText = s.properties.title;
                                opt.dataset.sheetId = s.properties.sheetId; 
                                select.appendChild(opt);
                            });
                        }
                        
                        await this.fetchRulesSheet();
                        this.loadSheetData(); 
                    }
                } catch (e) {
                    alert(`❌ 讀取失敗！請確認 Google 帳號授權狀態。`);
                }
            }

            async fetchRulesSheet() {
                try {
                    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Rules!A:Z`, {
                        headers: { 'Authorization': `Bearer ${this.accessToken}` }
                    });
                    const data = await res.json();
                    if(data && data.values) {
                        window.ruleEngine.setRules(data.values);
                        console.log("Metadata Rules Engine Loaded successfully.");
                    }
                } catch(e) {
                    console.warn("Rules load notice: ", e.message);
                }
            }

            handleTokenExpired() {
                sessionStorage.removeItem('gapi_access_token');
                sessionStorage.removeItem('gapi_has_write');
                this.accessToken = null;
                this.hasWriteAccess = false;
                const banner = document.getElementById('auth-banner');
                if(banner) {
                    banner.style.display = 'block';
                    banner.innerHTML = '⚠️ 登入已過期，請點擊此處重新授權！';
                    banner.style.background = '#f8d7da';
                    banner.style.color = '#721c24';
                    banner.style.borderColor = '#f5c6cb';
                }
            }

            async loadSheetData(keepForm = false) {
                if (!this.accessToken) return; 

                const shouldKeepForm = keepForm === true;
                const sheetName = this.currentSheet;
                if (!sheetName) return;

                Utility.showLoading(`載入「${sheetName}」中...`);
                const saveOrderBtn = document.getElementById('btn-save-order');
                if(saveOrderBtn) saveOrderBtn.style.display = 'none';
                
                try {
                    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}!A:Z`, {
                        headers: { 'Authorization': `Bearer ${this.accessToken}` }
                    });
                    const data = await res.json();
                    Utility.hideLoading();

                    if (data.error) {
                        if (data.error.code === 401) {
                            this.handleTokenExpired();
                            return;
                        }
                        alert(`❌ 讀取失敗！\n原因：${data.error.message}`);
                        return;
                    }

                    if (!data.values || data.values.length === 0) {
                        this.dataStore = [];
                        this.renderCatalog();
                        return;
                    }

                    this.headerRow = data.values[0];
                    const getIdx = (name) => this.headerRow.findIndex(h => String(h).trim() === name);
                    
                    this.colMap = {
                        location: getIdx('位置'), store: getIdx('店名'), techId: getIdx('技師編號'),
                        startDate: getIdx('到職日'), name: getIdx('姓名'), age: getIdx('年齡'),
                        stats: getIdx('數值'), photo: getIdx('技師照片'), price: getIdx('價金'),
                        url: getIdx('網址'), 
                        af: getIdx('屬性') !== -1 ? getIdx('屬性') : getIdx('AF'), 
                        level: getIdx('等級'), schedule: getIdx('行事曆'),
                        favorite: getIdx('最愛') !== -1 ? getIdx('最愛') : getIdx('Favorite'),
                        updateTime: getIdx('更新時間') !== -1 ? getIdx('更新時間') : getIdx('UpdateTime')
                    };

                    if (this.colMap.name === -1 || this.colMap.store === -1) {
                        alert(`⚠️ 找不到必要的欄位 (姓名 或 店名)。`);
                    } else {
                        const saveBtn = document.getElementById('btn-save');
                        if(saveBtn) saveBtn.disabled = false;
                    }

                    if (this.colMap.schedule === -1) {
                        this.colMap.schedule = this.headerRow.length;
                        this.headerRow.push('行事曆');
                    }
                    if (this.colMap.favorite === -1 || this.colMap.favorite === undefined) {
                        this.colMap.favorite = this.headerRow.length;
                        this.headerRow.push('最愛');
                    }
                    if (this.colMap.updateTime === -1 || this.colMap.updateTime === undefined) {
                        this.colMap.updateTime = this.headerRow.length;
                        this.headerRow.push('更新時間');
                    }

                    this.dataStore = [];
                    for (let i = 1; i < data.values.length; i++) {
                        const row = data.values[i];
                        const paddedRow = this.headerRow.map((_, idx) => row[idx] || "");
                        const nameVal = paddedRow[this.colMap.name];
                        if (nameVal && nameVal !== '姓名') {
                            this.dataStore.push({ 
                                id: String(paddedRow[this.colMap.techId] || `TEMP-${i}`).trim(), 
                                _raw: paddedRow, 
                                _rowIndex: i + 1 
                            });
                        }
                    }

                    this.populateFilters(); 
                    this.renderCatalog();
                    
                    if (!shouldKeepForm) {
                        this.clearForm();
                    }
                } catch (error) {
                    Utility.hideLoading();
                    alert("❌ 連線錯誤：" + error.message);
                }
            }

            populateFilters() {
                const storeSelect = document.getElementById('filterStore');
                if(!storeSelect) return;
                const uniqueStores = [...new Set(this.dataStore.map(r => r._raw[this.colMap.store]).filter(s => s && s.trim() !== ''))];
                const currentStore = storeSelect.value;
                storeSelect.innerHTML = '<option value="">🏪 所有店鋪</option>';
                uniqueStores.sort().forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s; opt.innerText = s;
                    storeSelect.appendChild(opt);
                });
                storeSelect.value = currentStore;

                const locSelect = document.getElementById('filterLocation');
                if(locSelect) {
                    const uniqueLocations = [...new Set(this.dataStore.map(r => r._raw[this.colMap.location]).filter(loc => loc && loc.trim() !== ''))];
                    const currentLoc = locSelect.value;
                    locSelect.innerHTML = '<option value="">🗺️ 所有位置</option>';
                    uniqueLocations.sort().forEach(loc => {
                        const opt = document.createElement('option');
                        opt.value = loc; opt.innerText = loc;
                        locSelect.appendChild(opt);
                    });
                    locSelect.value = currentLoc;
                }

                const afSet = new Set();
                this.dataStore.forEach(r => {
                    const afs = (r._raw[this.colMap.af] || '').split(/[\/／]/);
                    afs.forEach(a => {
                        let t = a.trim();
                        if (t) afSet.add(t);
                    });
                });
                
                const afBox = document.getElementById('af-checkboxes');
                if(afBox) {
                    let renderAf = true;
                    if (afBox.children.length > 0) {
                        let existingValues = Array.from(afBox.querySelectorAll('input')).map(i => i.value);
                        if (existingValues.length === afSet.size + 1 && existingValues.every(val => afSet.has(val) || val === '(無屬性)')) {
                            renderAf = false; 
                        }
                    }

                    if (renderAf) {
                        afBox.innerHTML = '<label><input type="checkbox" value="(無屬性)" checked onchange="app.updateAfSelection()"> <i>(無屬性)</i></label>';
                        [...afSet].sort().forEach(a => {
                            afBox.innerHTML += `<label><input type="checkbox" value="${a}" checked onchange="app.updateAfSelection()"> ${a}</label>`;
                        });
                        this.selectAllAf(true); 
                    }
                }

                const dateSelect = document.getElementById('filterDate');
                if(dateSelect) {
                    const dateSet = new Set();
                    this.dataStore.forEach(r => {
                        const sch = r._raw[this.colMap.schedule] || '';
                        const matches = sch.match(/\d{1,2}\/\d{1,2}/g);
                        if (matches) matches.forEach(m => dateSet.add(m));
                    });
                    const currentDate = dateSelect.value;
                    dateSelect.innerHTML = '<option value="">📅 所有日期</option>';
                    [...dateSet].sort().forEach(d => {
                        const opt = document.createElement('option');
                        opt.value = d; opt.innerText = d;
                        dateSelect.appendChild(opt);
                    });
                    if (dateSet.has(currentDate)) dateSelect.value = currentDate;
                }
            }

            async saveToGoogleSheet() {
                if (!this.accessToken) { this.triggerAuth(); return; }
                const storeVal = document.getElementById('v_store')?.value.trim();
                const nameVal = document.getElementById('v_name')?.value.trim();
                
                if (!storeVal || !nameVal) { 
                    Utility.showToast("⚠️ 請確實填寫「店名」與「姓名」！", true); 
                    return; 
                }

                Utility.showLoading("寫入資料與上傳照片...");
                try {
                    let techId = document.getElementById('v_tech_id')?.value.trim() || Utility.generateID();
                    let finalUrl = document.getElementById('v_photo_url')?.value || "";
                    let targetRowIdx = document.getElementById('v_row_index')?.value; 

                    let sheetTechId = techId;
                    if (/^\d+$/.test(techId)) {
                        sheetTechId = "'" + techId;
                    }

                    if(cropperSvc.pendingBlob) {
                        const fileName = `${storeVal}-${nameVal}.jpg`;
                        finalUrl = await cropperSvc.uploadToDrive(cropperSvc.pendingBlob, fileName, this.accessToken);
                    }

                    const sheetName = this.currentSheet;
                    let newRowData = new Array(this.headerRow.length).fill("");
                    
                    if (targetRowIdx) {
                        const record = this.dataStore.find(r => String(r._rowIndex) === String(targetRowIdx));
                        if (record) newRowData = [...record._raw];
                    }

                    const setV = (key, val) => { const idx = this.colMap[key]; if(idx !== -1 && idx !== undefined) newRowData[idx] = val; };

                    setV('location', document.getElementById('v_location')?.value || "");
                    setV('store', storeVal);
                    setV('techId', sheetTechId);
                    setV('startDate', document.getElementById('v_start_date')?.value || "");
                    setV('name', nameVal);
                    setV('age', document.getElementById('v_age')?.value || "");
                    setV('stats', document.getElementById('v_stats')?.value || "");
                    setV('price', document.getElementById('v_price')?.value || "");
                    setV('url', document.getElementById('v_url')?.value || "");
                    setV('af', document.getElementById('v_af')?.value || "");
                    setV('level', document.getElementById('v_level')?.value || "");
                    setV('schedule', document.getElementById('v_schedule')?.value || "");
                    setV('photo', finalUrl);
                    setV('updateTime', Utility.getCurrentTime());

                    let writeRes;
                    const writeUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/`;
                    
                    if (targetRowIdx) {
                        writeRes = await fetch(`${writeUrl}${encodeURIComponent(sheetName)}!A${targetRowIdx}?valueInputOption=USER_ENTERED`, {
                            method: 'PUT', headers: { 'Authorization': `Bearer ${this.accessToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ values: [newRowData] })
                        });
                    } else {
                        writeRes = await fetch(`${writeUrl}${encodeURIComponent(sheetName)}!A1:append?valueInputOption=USER_ENTERED`, {
                            method: 'POST', headers: { 'Authorization': `Bearer ${this.accessToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ values: [newRowData] })
                        });
                    }

                    if (!writeRes.ok) throw new Error("寫入失敗");
                    cropperSvc.pendingBlob = null;
                    
                    Utility.showToast(`✅ [${storeVal} - ${nameVal}] 儲存成功！`);
                    
                    await this.loadSheetData(true); 
                    
                    let targetTechId = sheetTechId.startsWith("'") ? sheetTechId.substring(1) : sheetTechId;
                    const savedRecordIdx = this.dataStore.findIndex(r => {
                        let rTechId = r._raw[this.colMap.techId] || "";
                        if (rTechId.startsWith("'")) rTechId = rTechId.substring(1);
                        return (rTechId === targetTechId) || (r._raw[this.colMap.name] === nameVal && r._raw[this.colMap.store] === storeVal);
                    });

                    if (savedRecordIdx !== -1) {
                        this.editRecord(savedRecordIdx);
                    }
                    
                } catch (e) {
                    Utility.showToast(`❌ 錯誤: ${e.message}`, true);
                } finally { 
                    Utility.hideLoading(); 
                }
            }

            async saveOrderToGoogleSheet(isBackground = false) {
                if (!this.accessToken) { this.triggerAuth(); return; }
                const sheetName = this.currentSheet;
                const values = this.dataStore.map(record => record._raw);
                
                if (!isBackground) {
                    Utility.showLoading("儲存排序與複製資料中...");
                } else {
                    Utility.showToast("💾 背景自動儲存中...");
                }

                try {
                    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}!A2?valueInputOption=USER_ENTERED`, {
                        method: 'PUT', 
                        headers: { 'Authorization': `Bearer ${this.accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ values: values })
                    });
                    
                    if (!res.ok) throw new Error("儲存失敗");
                    
                    this.dataStore.forEach((item, idx) => {
                        item._rowIndex = idx + 2; 
                    });

                    const saveOrderBtn = document.getElementById('btn-save-order');
                    if(saveOrderBtn) saveOrderBtn.style.display = 'none';

                    if (!isBackground) {
                        Utility.showToast("✅ 變更與排序儲存成功！");
                        this.renderCatalog();
                    } else {
                        Utility.showToast("✅ 背景自動儲存成功！");
                    }
                } catch (e) {
                    Utility.showToast(`❌ 錯誤: ${e.message}`, true);
                } finally { 
                    if (!isBackground) {
                        Utility.hideLoading(); 
                    }
                }
            }

            editRecord(index) {
                if(!this.isEditMode) {
                    this.toggleMode();
                }

                const record = this.dataStore[index];
                if(!record) return;
                const r = record._raw;

                const setValue = (id, val) => { const el = document.getElementById(id); if(el) el.value = val; };

                setValue('v_row_index', record._rowIndex || '');
                setValue('v_location', r[this.colMap.location] || "");
                setValue('v_store', r[this.colMap.store] || "");
                
                let displayTechId = r[this.colMap.techId] || "";
                if (displayTechId.startsWith("'")) displayTechId = displayTechId.substring(1);
                setValue('v_tech_id', displayTechId);
                
                let rawDate = r[this.colMap.startDate] || "";
                let formattedDate = "";
                if (rawDate) {
                    let match = rawDate.match(/(\d{4})\s*[年\/\-.]\s*(\d{1,2})\s*[月\/\-.]\s*(\d{1,2})/);
                    if (match) {
                        formattedDate = `${match[1]}-${match[2].padStart(2, '0')}-${match[3].padStart(2, '0')}`;
                    } else {
                        formattedDate = rawDate;
                    }
                }
                setValue('v_start_date', formattedDate);
                
                setValue('v_name', r[this.colMap.name] || "");
                setValue('v_age', r[this.colMap.age] || "");
                setValue('v_stats', r[this.colMap.stats] || "");
                setValue('v_price', r[this.colMap.price] || "");
                setValue('v_url', r[this.colMap.url] || "");
                setValue('v_af', r[this.colMap.af] || "");
                setValue('v_level', r[this.colMap.level] || "");
                setValue('v_schedule', r[this.colMap.schedule] || "");

                const rawUrl = r[this.colMap.photo] || "";
                setValue('v_photo_url', rawUrl); 
                const cleanImg = Utility.cleanDriveUrl(rawUrl);
                
                const previewImg = document.getElementById('preview_photo');
                const textPhoto = document.getElementById('text_photo');
                const btnDelPhoto = document.getElementById('btn_del_photo');

                if(cleanImg && cleanImg.startsWith('http')) {
                    if(previewImg) { previewImg.src = cleanImg; previewImg.style.display = 'block'; }
                    if(textPhoto) textPhoto.style.display = 'none';
                    if(btnDelPhoto) btnDelPhoto.style.display = 'flex';
                } else {
                    if(previewImg) previewImg.style.display = 'none';
                    if(textPhoto) textPhoto.style.display = 'block';
                    if(btnDelPhoto) btnDelPhoto.style.display = 'none';
                }

                const btnDelete = document.getElementById('btn-delete');
                if(btnDelete) btnDelete.style.display = 'inline-flex';
                
                if (window.innerWidth <= 850) {
                    const formPanel = document.getElementById('panel-form');
                    if (formPanel) {
                        formPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            }

            clearForm() {
                const setValue = (id, val) => { const el = document.getElementById(id); if(el) el.value = val; };
                
                setValue('v_row_index', '');
                const inputs = ['v_location', 'v_store', 'v_tech_id', 'v_start_date', 'v_name', 'v_age', 'v_stats', 'v_price', 'v_url', 'v_af', 'v_level', 'v_schedule', 'v_photo_url'];
                inputs.forEach(id => setValue(id, ''));
                
                const previewImg = document.getElementById('preview_photo');
                const textPhoto = document.getElementById('text_photo');
                const btnDelPhoto = document.getElementById('btn_del_photo');
                const btnDelete = document.getElementById('btn-delete');

                if(previewImg) previewImg.style.display = 'none';
                if(textPhoto) textPhoto.style.display = 'block';
                if(btnDelPhoto) btnDelPhoto.style.display = 'none';
                if(btnDelete) btnDelete.style.display = 'none';

                cropperSvc.pendingBlob = null;
                
                if(!this.isEditMode) {
                    this.toggleMode();
                }
            }

            reorderItems(oldIdx, newIdx) {
                if (oldIdx === newIdx) return;
                const movedItem = this.dataStore.splice(oldIdx, 1)[0];
                this.dataStore.splice(newIdx, 0, movedItem);
                
                this.renderCatalog();
                this.saveOrderToGoogleSheet(true); 
            }

            copyItem(oldIdx, newIdx) {
                const originalItem = this.dataStore[oldIdx];
                if(!originalItem) return;
                const newRaw = [...originalItem._raw];
                
                const colsToClear = ['photo', 'techId', 'url', 'age', 'stats', 'startDate', 'schedule', 'favorite', 'updateTime'];
                colsToClear.forEach(col => {
                    if (this.colMap[col] !== -1 && this.colMap[col] !== undefined) {
                        newRaw[this.colMap[col]] = "";
                    }
                });
                
                const newItem = {
                    id: String(newRaw[this.colMap.techId] || `TEMP-COPY-${Date.now()}`).trim(),
                    _raw: newRaw,
                    _rowIndex: "" 
                };
                
                this.dataStore.splice(newIdx, 0, newItem);
                
                this.renderCatalog();
                this.saveOrderToGoogleSheet(true); 
            }

            toggleFavorite(e, absoluteIndex) {
                e.stopPropagation();
                const record = this.dataStore[absoluteIndex];
                if (!record) return;
                
                const r = record._raw;
                const currentFav = r[this.colMap.favorite];
                r[this.colMap.favorite] = currentFav === 'Y' ? '' : 'Y';
                
                this.renderCatalog();
                this.saveOrderToGoogleSheet(true); 
            }

            renderCatalog() {
                const searchInput = document.getElementById('searchInput');
                const filterStoreObj = document.getElementById('filterStore');
                const filterLocObj = document.getElementById('filterLocation');
                const filterDateObj = document.getElementById('filterDate');
                const filterTimeStartObj = document.getElementById('filterTimeStart');
                const filterTimeEndObj = document.getElementById('filterTimeEnd');
                const filterStatusObj = document.getElementById('filterStatus');
                const sortOptionObj = document.getElementById('sortOption');

                const kw = searchInput ? searchInput.value.trim() : "";
                const filterStore = filterStoreObj ? filterStoreObj.value : "";
                const filterLoc = filterLocObj ? filterLocObj.value : "";
                const filterDate = filterDateObj ? filterDateObj.value : "";
                const filterStartStr = filterTimeStartObj ? filterTimeStartObj.value : "";
                const filterEndStr = filterTimeEndObj ? filterTimeEndObj.value : "";
                const filterStatus = filterStatusObj ? filterStatusObj.value : "";
                const sortOpt = sortOptionObj ? sortOptionObj.value : "";
                
                const filterStart = filterStartStr ? parseInt(filterStartStr) : null;
                const filterEnd = filterEndStr ? parseInt(filterEndStr) : null;

                const grid = document.getElementById('catalogGrid');
                if(!grid) return;
                grid.innerHTML = '';

                let displayList = [];

                this.dataStore.forEach((record, index) => {
                    if(!record) return;
                    const r = record._raw;
                    
                    const recStore = r[this.colMap.store] || '';
                    if (filterStore && recStore !== filterStore) return;

                    const recLocation = r[this.colMap.location] || '';
                    if (filterLoc && recLocation !== filterLoc) return;
                    
                    const recAfStr = r[this.colMap.af] || '';
                    const recAfs = recAfStr.split(/[\/／]/).map(a => a.trim()).filter(a => a);
                    let hasMatchingAf = false;

                    if (recAfs.length === 0) {
                        if (this.selectedAfs.has('(無屬性)')) hasMatchingAf = true;
                    } else {
                        for (let a of recAfs) {
                            if (this.selectedAfs.has(a)) {
                                hasMatchingAf = true;
                                break;
                            }
                        }
                    }
                    if (!hasMatchingAf && this.selectedAfs.size > 0) return;

                    let searchTargetStr = `${r[this.colMap.name] || ''} ${r[this.colMap.store] || ''} ${r[this.colMap.techId] || ''} ${recLocation} ${recAfStr} ${r[this.colMap.level] || ''}`.toLowerCase();

                    if (kw) {
                        let conditions = kw.split('+').map(s => s.trim()).filter(s => s);
                        let searchPass = true;
                        let recAge = r[this.colMap.age] ? parseInt(r[this.colMap.age]) : 0;
                        let recStats = Utility.parseStats(r[this.colMap.stats]);

                        for (let cond of conditions) {
                            let isNot = cond.startsWith('-'); 
                            let term = isNot ? cond.substring(1).trim() : cond;
                            if (!term) continue;

                            let opMatch = term.match(/^([A-Z\u4e00-\u9fa5]+)\s*([><=])\s*(\d+|[A-Z])$/i);
                            if (opMatch) {
                                let field = opMatch[1].toUpperCase();
                                let op = opMatch[2];
                                let val = opMatch[3];
                                let recordVal = null;

                                if (field === 'B' || field === '胸圍') recordVal = recStats.b;
                                else if (field === 'W' || field === '腰圍') recordVal = recStats.w;
                                else if (field === 'H' || field === '臀圍') recordVal = recStats.hp;
                                else if (field === 'T' || field === '身高') recordVal = recStats.h;
                                else if (field === 'AGE' || field === '年齡' || field === '年') recordVal = recAge;
                                else if (field === 'CUP' || field === '罩杯') recordVal = recStats.cup;

                                let conditionMet = false;
                                if (recordVal !== null && recordVal !== 0 && recordVal !== '?') {
                                    if (field === 'CUP' || field === '罩杯') {
                                        let recScore = String(recordVal).charCodeAt(0);
                                        let targetScore = val.toUpperCase().charCodeAt(0);
                                        if (op === '>') conditionMet = recScore > targetScore;
                                        else if (op === '<') conditionMet = recScore < targetScore;
                                        else if (op === '=') conditionMet = recScore === targetScore;
                                    } else {
                                        let targetNum = parseInt(val);
                                        if (op === '>') conditionMet = recordVal > targetNum;
                                        else if (op === '<') conditionMet = recordVal < targetNum;
                                        else if (op === '=') conditionMet = recordVal === targetNum;
                                    }
                                }

                                if (isNot ? conditionMet : !conditionMet) {
                                    searchPass = false; 
                                    break;
                                }
                            } else {
                                let match = searchTargetStr.includes(term.toLowerCase());
                                if (isNot ? match : !match) {
                                    searchPass = false; 
                                    break;
                                }
                            }
                        }
                        if (!searchPass) return;
                    }

                    let hasAnyWork = false;
                    let timeOverlapMatch = false;
                    let dateEvaluated = false;

                    const scheduleRaw = r[this.colMap.schedule] || '';
                    if (scheduleRaw) {
                        const lines = scheduleRaw.split('\n');
                        for (let line of lines) {
                            const match = line.match(/^(\d{1,2}\/\d{1,2})\s*(\(.\))?\s*(.+)$/);
                            if (match) {
                                let d = match[1];
                                let tStr = match[3];
                                let isOff = tStr.includes('休') || tStr.includes('み') || tStr.includes('休息');

                                if (filterDate && d !== filterDate) continue; 
                                dateEvaluated = true;

                                if (!isOff) {
                                    hasAnyWork = true;
                                    if (filterStart === null && filterEnd === null) {
                                        timeOverlapMatch = true; 
                                    } else {
                                        const tMatch = tStr.match(/(\d{1,2}:\d{2})\s*[-~〜ー]\s*(\d{1,2}:\d{2})/);
                                        if (tMatch) {
                                            let tStart = Utility.timeToMins(tMatch[1]);
                                            let tEnd = Utility.timeToMins(tMatch[2]);
                                            if (tEnd <= tStart) tEnd += 24 * 60; 
                                            let qStart = filterStart !== null ? filterStart : 0;
                                            let qEnd = filterEnd !== null ? filterEnd : 9999;
                                            if (Math.max(tStart, qStart) < Math.min(tEnd, qEnd)) {
                                                timeOverlapMatch = true; 
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }

                    if ((filterDate || filterStart !== null || filterEnd !== null) && !timeOverlapMatch) return; 
                    if (filterStatus === 'working' && !hasAnyWork) return;
                    if (filterStatus === 'off' && (hasAnyWork || !dateEvaluated)) return;

                    displayList.push({ record, index }); 
                });

                displayList.sort((a, b) => {
                    let aFav = a.record._raw[this.colMap.favorite] === 'Y' ? 1 : 0;
                    let bFav = b.record._raw[this.colMap.favorite] === 'Y' ? 1 : 0;
                    if (aFav !== bFav) return bFav - aFav; 

                    let res = 0;
                    if (sortOpt === 'cup') {
                        res = Utility.getCupScore(a.record._raw[this.colMap.stats], window.ruleEngine) - Utility.getCupScore(b.record._raw[this.colMap.stats], window.ruleEngine);
                    } else if (sortOpt === 'body') {
                        res = Utility.getBodyScore(a.record._raw[this.colMap.stats], window.ruleEngine) - Utility.getBodyScore(b.record._raw[this.colMap.stats], window.ruleEngine);
                    } else if (sortOpt === 'updateTime') {
                        let tA = a.record._raw[this.colMap.updateTime] ? new Date(a.record._raw[this.colMap.updateTime]).getTime() : 0;
                        if (isNaN(tA)) tA = 0;
                        let tB = b.record._raw[this.colMap.updateTime] ? new Date(b.record._raw[this.colMap.updateTime]).getTime() : 0;
                        if (isNaN(tB)) tB = 0;
                        res = tA - tB;
                    } else {
                        res = a.index - b.index;
                    }
                    
                    return this.sortDesc ? -res : res;
                });

                displayList.forEach(item => {
                    const r = item.record._raw;
                    const index = item.index; 

                    const isFav = r[this.colMap.favorite] === 'Y';
                    const recLocation = r[this.colMap.location] || '';
                    let cleanImg = Utility.cleanDriveUrl(r[this.colMap.photo]);
                    const imgSrc = cleanImg || PLACEHOLDER_URL;
                    const ageStr = r[this.colMap.age] ? ` (${r[this.colMap.age]})` : '';
                    const storeName = r[this.colMap.store] || '無店名';
                    const targetUrl = r[this.colMap.url] || '';
                    
                    let tagsHtml = '';
                    const afVal = r[this.colMap.af] || '';
                    const levelVal = r[this.colMap.level] || '';
                    
                    if (afVal) {
                        afVal.split(/[/／]/).forEach(t => {
                            if (t.trim()) tagsHtml += `<span class="tag-item">${t.trim()}</span>`;
                        });
                    }
                    if (levelVal) tagsHtml += `<span class="tag-item">等級: ${levelVal}</span>`;
                    
                    let rawStats = r[this.colMap.stats] || '';
                    let cup = '?';
                    let cupMatch = rawStats.match(/\(([A-Z])\)/i) || rawStats.match(/(?:^|[\s/])([A-Z])(?:[\s/]|$|cup|罩杯)/i);
                    if (cupMatch) cup = cupMatch[1].toUpperCase();

                    let cleanedStats = rawStats.replace(/\([A-Z]\)/ig, ''); 
                    if (cup !== '?') {
                        let cupRegex = new RegExp(`[/\\s]?${cup}(?:cup|罩杯)?$`, 'i');
                        cleanedStats = cleanedStats.replace(cupRegex, '');
                    }
                    cleanedStats = cleanedStats.replace(/[/]+/g, ' ').trim();

                    if (!/[BWH]\d{2}/i.test(cleanedStats)) {
                        let hwMatch = cleanedStats.match(/^(\d{3})\s+(\d{2})$/);
                        if (hwMatch) cleanedStats = `${hwMatch[1]}cm ${hwMatch[2]}kg`;
                    }

                    let cupColor = '#9e9e9e';
                    if (['A','B','C'].includes(cup)) cupColor = '#4caf50';
                    else if (['D','E','F'].includes(cup)) cupColor = '#ff9800';
                    else if (['G','H','I','J'].includes(cup)) cupColor = '#e91e63';
                    else if (cup !== '?') cupColor = '#b71c1c';

                    let statsHtml = `
                        <div class="stats-row" title="${rawStats}">
                            <span class="cup-badge" style="background:${cupColor};">${cup !== '?' ? cup + '杯' : '?杯'}</span>
                            <span style="overflow: hidden; text-overflow: ellipsis; flex: 1;">${cleanedStats}</span>
                        </div>
                    `;

                    let priceHtml = '';
                    let priceLines = (r[this.colMap.price] || '').split(/[\n\r;]+/).filter(l => l.trim() !== '');
                    if (priceLines.length > 0) {
                        priceHtml = '<div class="price-col">';
                        priceLines.forEach(line => {
                            let pMatch = line.match(/(\d{4,6})\s*\/\s*(\d{2,3})(.*)/);
                            if (pMatch) {
                                let amt = parseInt(pMatch[1]).toLocaleString();
                                priceHtml += `<div>JPY ¥${amt} / ${pMatch[2]}分 ${pMatch[3] || ''}</div>`;
                            } else {
                                let nMatch = line.match(/(\d{4,6})/);
                                if (nMatch) {
                                    let amt = parseInt(nMatch[1]).toLocaleString();
                                    priceHtml += `<div>JPY ¥${line.replace(nMatch[1], amt)}</div>`;
                                } else {
                                    priceHtml += `<div>${line}</div>`;
                                }
                            }
                        });
                        priceHtml += '</div>';
                    }

                    const shapeData = Utility.getBodyShapeData(r[this.colMap.stats], window.ruleEngine);
                    let nameRowHtml = '';
                    if (shapeData) {
                        tagsHtml += `<span class="tag-item" style="background:#546e7a; color:white;" title="身型分類">${shapeData.shapeIcon} ${shapeData.shapeType}</span>`;
                        let tagsContainer = `<div class="tags-row">${tagsHtml}</div>`;

                        nameRowHtml = `
                            <div class="name-row">
                                <div class="mini-svg-box" title="實色: 該技師體型\n虛線: 日本女性平均體型">${shapeData.svgHtml}</div>
                                <div class="name-col">
                                    <div class="tech-name">${r[this.colMap.name] || '未命名'} ${ageStr}</div>
                                    <div class="score-row">
                                        <span class="big-badge" style="background:${shapeData.scoreColor};" title="沙漏比例曲線評分">👑 ${shapeData.score}分</span>
                                        <span class="big-badge" style="background:${shapeData.cupDiffColor};" title="推算真實罩杯 (與宣稱差異越大顏色越深)">實推 ${shapeData.trueCup}杯</span>
                                    </div>
                                </div>
                            </div>
                        `;
                        nameRowHtml += tagsContainer;
                    } else {
                        let tagsContainer = `<div class="tags-row">${tagsHtml}</div>`;
                        nameRowHtml = `<div class="tech-name">${r[this.colMap.name] || '未命名'} ${ageStr}</div>${tagsContainer}`;
                    }

                    const schHTML = Utility.generateScheduleHTML(r[this.colMap.schedule]);

                    const card = document.createElement('div');
                    card.className = 'card';
                    if (this.selectedCards.has(index)) card.classList.add('selected');
                    
                    let titleStr = "";
                    const isMobile = window.innerWidth <= 850;
                    if (this.isEditMode) {
                        titleStr = "左鍵：編輯資料\n右鍵：開啟專屬網址\n按住拖曳可改變排序\n按住 Ctrl 拖曳可複製(清空特定欄位)";
                    } else {
                        titleStr = isMobile ? "點擊：開啟專屬網址" : "左鍵：檢視完整卡牌\n右鍵：開啟專屬網址";
                    }
                    card.title = titleStr;
                    
                    card.onclick = (e) => {
                        if (e.target.closest('.sch-container-vert') || e.target.closest('.sch-wrapper') || e.target.closest('.fav-btn') || e.target.classList.contains('card-checkbox')) return;
                        
                        if (this.isEditMode) {
                            this.editRecord(index); 
                        } else {
                            if (window.innerWidth <= 850) {
                                if (targetUrl && targetUrl.startsWith('http')) {
                                    window.open(targetUrl, '_blank');
                                } else {
                                    Utility.showToast('⚠️ 系統提示：此技師尚未建立網址，或網址格式不正確！', true);
                                }
                            } else {
                                this.editRecord(index);
                            }
                        }
                    };
                    
                    card.oncontextmenu = (e) => {
                        e.preventDefault(); 
                        if (targetUrl && targetUrl.startsWith('http')) window.open(targetUrl, '_blank');
                        else Utility.showToast('⚠️ 系統提示：此技師尚未建立網址，或網址格式不正確！', true);
                    };

                    if (this.isEditMode && this.hasWriteAccess) {
                        card.draggable = true;
                        
                        card.ondragstart = (e) => {
                            e.dataTransfer.effectAllowed = 'copyMove'; 
                            e.dataTransfer.setData('text/plain', index); 
                            setTimeout(() => card.classList.add('dragging'), 0);
                        };
                        
                        card.ondragend = () => {
                            card.classList.remove('dragging');
                        };
                        
                        card.ondragover = (e) => {
                            e.preventDefault();
                            const isCopy = e.ctrlKey || e.metaKey;
                            e.dataTransfer.dropEffect = isCopy ? 'copy' : 'move';
                            const overCard = e.target.closest('.card');
                            if (overCard) {
                                overCard.classList.add('drag-over');
                                if (isCopy) {
                                    overCard.style.borderColor = "var(--warning)";
                                    overCard.style.background = "#fff3e0";
                                } else {
                                    overCard.style.borderColor = "var(--primary)";
                                    overCard.style.background = "#f3e5f5";
                                }
                            }
                        };
                        
                        card.ondragleave = (e) => {
                            const overCard = e.target.closest('.card');
                            if (overCard) {
                                overCard.classList.remove('drag-over');
                                overCard.style.borderColor = "";
                                overCard.style.background = "";
                            }
                        };
                        
                        card.ondrop = (e) => {
                            e.preventDefault();
                            const overCard = e.target.closest('.card');
                            if (overCard) {
                                overCard.classList.remove('drag-over');
                                overCard.style.borderColor = "";
                                overCard.style.background = "";
                            }
                            
                            const oldIndex = parseInt(e.dataTransfer.getData('text/plain'), 10);
                            if (!isNaN(oldIndex)) {
                                const isCopy = e.ctrlKey || e.metaKey || e.dataTransfer.dropEffect === 'copy';
                                if (isCopy) {
                                    this.copyItem(oldIndex, index); 
                                } else {
                                    this.reorderItems(oldIndex, index); 
                                }
                            }
                        };
                    } else {
                        card.draggable = false;
                        card.ondragstart = (e) => { e.preventDefault(); };
                    }
                    
                    let checkboxHtml = this.isEditMode ? `<input type="checkbox" class="card-checkbox" value="${index}" ${this.selectedCards.has(index) ? 'checked' : ''}>` : '';

                    card.innerHTML = `
                        ${checkboxHtml}
                        <div class="img-container">
                            <span class="badge">${recLocation || '未知區'}</span>
                            <div class="fav-btn" onclick="app.toggleFavorite(event, ${index})" title="加入/移除最愛 (置頂)">
                                ${isFav ? '❤️' : '🤍'}
                            </div>
                            <img src="${imgSrc}" loading="lazy" onerror="this.onerror=null; this.src='${PLACEHOLDER_URL}';">
                        </div>
                        <div class="store-name">${storeName}</div>
                        ${nameRowHtml}
                        ${statsHtml}
                        ${priceHtml}
                        ${schHTML}
                    `;
                    grid.appendChild(card);
                });
            }
        }

        window.app = null;
        const cropperSvc = new ImageCropperService();

        window.onload = () => {
            window.app = new AppCore();
            window.app.initGoogleAuth();
        };
    </script>
</body>
</html>
