<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent DB - 技師資料彙整系統 (ID自動化版)</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        :root{--primary:#4527a0;--secondary:#7986cb;--bg:#f0f2f5;--text:#2c3e50;--accent:#e91e63;--success:#2e7d32;--card-bg:#ffffff;--warning:#ff9800}body{font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);margin:0;padding:15px;display:flex;flex-direction:column;height:100dvh;box-sizing:border-box;overflow:hidden}h1,h2,h3{color:var(--primary);margin-top:0}.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap}.header-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.sheet-selector-wrapper{display:flex;align-items:center;gap:8px;background:#fff;padding:5px 15px;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.05)}#app-container{display:grid;grid-template-columns:500px 1fr;gap:15px;flex:1;min-height:0;transition:all .3s ease}.panel{background:var(--card-bg);border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:20px;display:flex;flex-direction:column;overflow-y:auto;position:relative}#app-container.view-mode{grid-template-columns:1fr}#app-container.view-mode #panel-form{display:none}@media (max-width:850px){body{padding:8px}.app-title{display:none}.top-bar{margin-bottom:8px}.header-controls{flex-direction:row;align-items:center;width:100%;gap:6px;flex-wrap:nowrap;justify-content:space-between}.sheet-selector-wrapper{padding:4px 8px;flex:1;justify-content:flex-start}.sheet-label{display:none}#v_sheet{width:100%;font-size:15px;padding:2px}.btn-text{display:none}.top-bar button{padding:6px 10px;font-size:18px}#app-container{display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}.panel{flex:none;overflow-y:visible;height:auto;margin-bottom:10px}#app-container.view-mode #panel-form{display:none}.form-grid{grid-template-columns:1fr;gap:8px}.form-group.full{grid-column:span 1}.filter-tools{flex-direction:row!important;flex-wrap:wrap!important;gap:5px!important;position:sticky;top:-20px;z-index:50;background:var(--card-bg);padding:20px 0 10px;border-bottom:2px solid var(--secondary)}.filter-tools input,.filter-tools select,.custom-multi-select{width:100%!important;margin-bottom:4px!important;font-size:13px}}#auth-banner{background:#ffeeba;color:#856404;padding:10px;font-size:14px;text-align:center;font-weight:700;border-radius:8px;margin-bottom:10px;cursor:pointer;border:1px solid #ffdf7e;transition:.3s;box-shadow:0 2px 8px rgba(0,0,0,.05)}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.form-group{margin-bottom:8px}.form-group.full{grid-column:span 2}label{display:flex;justify-content:space-between;align-items:center;font-weight:700;margin-bottom:5px;font-size:.85em;color:#666}input,select,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box;font-size:14px;transition:.2s}input:focus,select:focus,textarea:focus{border-color:var(--primary);outline:0;box-shadow:0 0 0 2px rgba(69,39,160,.1)}input[readonly]{background:#f8f9fa;cursor:not-allowed}#v_magic_paste{background:#fff8e1;border-color:#ffb300;transition:all .3s}#v_magic_paste:focus{box-shadow:0 0 0 2px rgba(255,179,0,.3)}.photo-upload-area{margin:10px 0;position:relative}.img-preview-box{width:100%;height:350px;background:#f8f9fa;border:2px dashed #ccc;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;transition:.2s}.img-preview-box img{width:100%;height:100%;object-fit:contain}.img-preview-box span{font-size:.9em;color:#777;text-align:center;line-height:1.5;padding:10px;pointer-events:none}.btn-delete-img{position:absolute;top:10px;right:10px;background:rgba(233,30,99,.9);color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;z-index:10}.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(5px)}.modal-wrapper{width:95%;max-width:600px;max-height:85%;background:#fff;padding:20px;border-radius:12px;display:flex;flex-direction:column;box-sizing:border-box}button{background:var(--primary);color:#fff;border:none;padding:10px 15px;border-radius:6px;cursor:pointer;font-weight:700;font-size:14px;transition:.3s;display:inline-flex;justify-content:center;align-items:center;gap:5px}button.danger{background:#e53935}button.success{background:#2e7d32}button.secondary{background:#7986cb}button.warning{background:var(--warning);color:#fff}#loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:99999;justify-content:center;align-items:center;color:#fff;font-size:20px;font-weight:700;display:none;flex-direction:column;text-align:center;padding:20px}#toast-container{position:fixed;top:-50px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:12px 24px;border-radius:8px;font-weight:700;font-size:15px;box-shadow:0 4px 15px rgba(0,0,0,.2);z-index:100000;opacity:0;pointer-events:none;transition:all .4s;display:flex;align-items:center;gap:8px}#toast-container.show{opacity:1;top:30px}.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;margin-top:15px;align-content:start}.card{border:1px solid #e0e0e0;border-radius:8px;padding:12px;cursor:pointer;transition:.2s;background:#fff;display:flex;flex-direction:column;position:relative;overflow:hidden}.card.selected{border:2px solid var(--accent);background:#fce4ec}.card img{width:100%;height:240px;object-fit:contain;border-radius:6px;background:#f8f9fa;pointer-events:none}.fav-btn{position:absolute;top:10px;right:10px;z-index:10;font-size:20px;cursor:pointer}.card-checkbox{position:absolute;top:10px;right:40px;z-index:15;width:20px;height:20px}.filter-tools{position:sticky;top:-20px;margin-top:-20px;padding-top:20px;padding-bottom:10px;background:var(--card-bg);z-index:50;border-bottom:2px solid var(--secondary);display:flex;gap:8px;flex-wrap:wrap}#batch-actions-bar{display:none;background:#fff3e0;padding:8px 15px;border-radius:6px;border:1px solid #ffb300;margin-bottom:10px;align-items:center;gap:10px;font-size:13px;font-weight:700;position:sticky;top:40px;z-index:49}.custom-multi-select{position:relative;min-width:130px;flex:1}.dropdown-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ccc;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:100;max-height:300px;display:flex;flex-direction:column;margin-top:4px}#af-checkboxes{overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
    </style>
</head>
<body>

    <div id="loading-overlay"><div id="loading-text">資料處理中...</div></div>
    <div id="toast-container">ℹ️ 提示訊息</div>

    <div class="top-bar">
        <h2 class="app-title">🎭 Talent DB</h2>
        <div class="header-controls">
            <div class="sheet-selector-wrapper">
                <select id="v_sheet" onchange="app.loadSheetData()"><option value="">請登入...</option></select>
            </div>
            <button class="success" onclick="app.loadSheetData()">🔄 整理</button>
            <button id="btn-mode-toggle" class="primary" onclick="app.toggleMode()" style="background:#e91e63;">📝 切換編輯</button>
        </div>
    </div>

    <div id="auth-banner" onclick="app.triggerAuth()">🔒 點擊登入授權</div>

    <div id="app-container" class="view-mode">
        <div class="panel" id="panel-form">
            <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--primary);padding-bottom:8px;margin-bottom:15px;">
                <h3 style="margin:0;">📝 資料編輯</h3>
                <div style="display:flex;gap:6px;">
                    <button class="secondary mini" onclick="app.executeBatch(false)">⚡ 更新</button>
                    <button class="warning mini" onclick="app.executeBatch(true)">🌟 建檔</button>
                    <button class="success mini" onclick="app.clearForm()">➕</button>
                </div>
            </div>
            <input type="hidden" id="v_row_index">
            <div class="form-grid"><div class="form-group full"><label>✨ 魔法貼上</label><textarea id="v_magic_paste" rows="2"></textarea></div></div>
            <div class="form-grid">
                <div class="form-group">
                    <label>店名* <button class="mini warning" onclick="app.cleanupDriveImages()" style="font-size:10px;padding:2px 4px;">☁️ 清理</button> <button class="mini secondary" onclick="app.openRulesModal()" style="font-size:10px;padding:2px 4px;">⚙️</button></label>
                    <input type="text" id="v_store">
                </div>
                <div class="form-group"><label>姓名*</label><input type="text" id="v_name"></div>
            </div>
            <div class="form-grid">
                <div class="form-group"><label>技師編號 (自動生成)</label><input type="text" id="v_tech_id" readonly placeholder="儲存後自動派發"></div>
                <div class="form-group"><label>到職日</label><input type="date" id="v_start_date"></div>
            </div>
            <div class="form-grid">
                <div class="form-group"><label>位置</label><input type="text" id="v_location"></div>
                <div class="form-group"><label>年齡</label><input type="text" id="v_age"></div>
            </div>
            <div class="form-grid"><div class="form-group full"><label>數值</label><input type="text" id="v_stats"></div></div>
            <div class="form-grid"><div class="form-group full"><label>價金</label><textarea id="v_price" rows="2"></textarea></div></div>
            <div class="form-grid">
                <div class="form-group"><label>屬性</label><input type="text" id="v_af"></div>
                <div class="form-group"><label>等級</label><input type="text" id="v_level"></div>
            </div>
            <div class="form-grid"><div class="form-group full"><label>網址</label><input type="text" id="v_url"></div></div>
            <div class="form-grid"><div class="form-group full"><label>行事曆</label><textarea id="v_schedule" rows="4"></textarea></div></div>
            <div class="photo-upload-area">
                <div class="img-preview-box">
                    <img id="preview_photo" style="display:none;"><span id="text_photo">Ctrl+V 貼圖</span>
                    <button id="btn_del_photo" class="btn-delete-img" onclick="app.deleteImage(event)" style="display:none;">✖</button>
                </div>
            </div>
            <input type="hidden" id="v_photo_url">
            <div style="margin-top:auto;display:flex;gap:10px;"><button id="btn-save" onclick="app.saveToGoogleSheet()" style="flex:2;">💾 儲存</button><button id="btn-delete" class="danger" onclick="app.deleteRecordForm()" style="display:none;">🗑️</button></div>
        </div>

        <div class="panel" id="panel-catalog">
            <div class="filter-tools">
                <select id="filterStore" class="filter-select" onchange="app.renderCatalog()"><option value="">🏪 所有店鋪</option></select>
                <select id="filterStatus" class="filter-select" onchange="app.renderCatalog()"><option value="">⚪ 班表狀態</option><option value="working">🟢 有上班</option><option value="off">🔴 全休假</option></select>
                <div class="custom-multi-select" id="af-filter-container">
                    <div class="select-box" onclick="app.toggleAfDropdown()">🏷️ 屬性 (全選)</div>
                    <div class="dropdown-list" id="af-dropdown" style="display:none;">
                        <div style="padding:8px;background:#eee;"><button class="mini" onclick="app.selectAllAf(true)">全選</button> <button class="mini danger" onclick="app.selectAllAf(false)">清空</button></div>
                        <div id="af-checkboxes"></div>
                    </div>
                </div>
                <select id="sortOption" class="filter-select" onchange="app.renderCatalog()"><option value="">🔀 預設</option><option value="cup">👙 罩杯</option><option value="body">⏳ 曲線</option><option value="updateTime">🕒 更新</option></select>
                <button id="btn-sort-dir" class="secondary mini" onclick="app.toggleSortDir()">⬇ 降序</button>
                <input type="text" id="searchInput" placeholder="🔍 搜尋 B>90 + 巨乳..." oninput="app.renderCatalog()" style="flex:2;">
            </div>
            <div id="batch-actions-bar"><span id="sel-count">已選 0 張</span><button class="mini" onclick="app.selectAllCards()">全選</button><button class="secondary mini" onclick="app.moveSelected('top')">⬆ 置頂</button><button class="secondary mini" onclick="app.moveSelected('bottom')">⬇ 置底</button><button class="danger mini" onclick="app.deleteSelected()">🗑️ 批量刪除</button></div>
            <div class="catalog-grid" id="catalogGrid"></div>
        </div>
    </div>

    <div id="rulesModal" class="modal-overlay">
        <div class="modal-wrapper">
            <h3>⚙️ 規則引擎設定</h3>
            <p>當前店標：<strong id="rule-current-store" style="color:var(--accent);">Common</strong></p>
            <div id="rule-preview-box" style="background:#f8f9fa;padding:10px;font-size:12px;max-height:200px;overflow-y:auto;"></div>
            <div style="margin-top:15px;text-align:right;">
                <button class="danger" onclick="document.getElementById('rulesModal').style.display='none'">關閉</button>
                <button class="secondary" onclick="window.open('https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/edit','_blank')">🔗 編輯</button>
                <button class="success" onclick="app.reloadRules(true)">🔄 重載</button>
            </div>
        </div>
    </div>

    <div id="cropperModal" class="modal-overlay"><div class="modal-wrapper"><h3>✂️ 裁切照片</h3><div style="height:350px;"><img id="cropperImage"></div><div style="text-align:right;margin-top:10px;"><button class="danger" onclick="cropperSvc.closeModal()">取消</button><button onclick="cropperSvc.cropAndPrepare()">確認</button></div></div></div>

    <script>
        const CLIENT_ID = '615427641075-2e4i1l7smqp30l8v1qrf75c924aro94i.apps.googleusercontent.com';
        const SHEET_ID = '1WpEGW6m-N-Ofdsn4LGIrT0uQvFRPkVTh9RyJkKgqlc8'; 
        const DRIVE_FOLDER_ID = '1s1x7yyWUE3JB_8YnjOAoL93u7No6NP9p'; 

        class RuleEngine {
            static getActiveRules(field, type, ctx, store, rules) {
                let matched = rules.filter(r => (ctx && ctx.includes(r.site)) || r.site === store);
                if (matched.length > 0) {
                    let fieldMatched = matched.filter(r => (!field || r.field === field) && (!type || r.ruleType === type));
                    if (fieldMatched.length > 0) return fieldMatched;
                }
                return rules.filter(r => r.site === 'Common' && (!field || r.field === field) && (!type || r.ruleType === type));
            }

            static parse(text, html, ctx, store, rules) {
                let res = { store:'', name:'', stats:'', age:'', startDate:'', price:'', scheduleRaw:'', tags:new Set(), level:'' };
                let storeRules = this.getActiveRules('v_store', 'Set_Default', ctx, store, rules);
                if (storeRules.length > 0) res.store = storeRules[0].action;

                ['v_store','v_name','v_stats','v_age','v_start_date','v_price','v_schedule','v_level'].forEach(f => {
                    if (f === 'v_store' && res.store) return;
                    let rs = this.getActiveRules(f, 'Regex_Extract', ctx, store, rules);
                    if (f === 'v_level') rs = rs.concat(this.getActiveRules(f, 'Regex_Level', ctx, store, rules));
                    for (let r of rs) {
                        let flags = r.pattern.startsWith('(?i)') ? 'ig' : 'g';
                        let pat = r.pattern.startsWith('(?i)') ? r.pattern.substring(4) : r.pattern;
                        try {
                            let match = new RegExp(pat, flags).exec(text);
                            if (match) {
                                let key = f.replace('v_', '').replace('start_date', 'startDate');
                                if (r.action === 'Extract_Group_1' && match[1]) res[key] = match[1];
                                else if (r.action === 'Extract_Group_1_2' && match[1]) res[key] = match[1];
                                else if (r.action === 'Extract_Date' && match[3]) res.startDate = `${match[1]}-${match[2].padStart(2,'0')}-${match[3].padStart(2,'0')}`;
                                else if (r.action === 'Extract_Number' && match[1]) res.price = match[1].replace(/,/g, '');
                                else if (r.action === 'Extract_Raw') res.scheduleRaw = match[0];
                                else if (r.action === 'Extract_Level' && match[1]) res.level = match[1];
                                else res[key] = match[0];
                                if (res[key]) break;
                            }
                        } catch(e){}
                    }
                });

                this.getActiveRules('v_af', 'Regex_Tag', ctx, store, rules).forEach(r => {
                    let pat = r.pattern.startsWith('(?i)') ? r.pattern.substring(4) : r.pattern;
                    let flags = r.pattern.startsWith('(?i)') ? 'ig' : 'g';
                    if (new RegExp(pat, flags).test(text) || new RegExp(pat, flags).test(res.name)) res.tags.add(r.action.replace('Tag:','').trim());
                });
                this.getActiveRules('v_af', 'HTML_Img_Tag', ctx, store, rules).forEach(r => {
                    if (html && html.includes(r.pattern)) res.tags.add(r.action.replace('Tag:','').trim());
                });
                this.getActiveRules('v_name', '', ctx, store, rules).filter(r => r.ruleType.includes('Clean')).forEach(r => {
                    res.name = res.name.replace(new RegExp(r.pattern, 'ig'), '');
                });
                if (res.name) res.name = res.name.trim();
                return res;
            }
        }

        class AppCore {
            constructor() {
                this.dataStore = []; this.rulesData = []; this.accessToken = null; this.tokenClient = null;
                this.isEditMode = false; this.hasWriteAccess = false; this.selectedAfs = new Set();
                this.selectedCards = new Set(); this.sortDesc = true;
                this.initDragScroll();
            }

            get currentSheet() { return document.getElementById('v_sheet').value; }

            // ===== 核心：ID 自動生成引擎 (SiteMatch-0001) =====
            generateSiteBasedID(siteCode) {
                if (!siteCode) return 'N' + Math.floor(Math.random()*10000).toString().padStart(4,'0');
                
                // 找出所有符合 SiteCode-XXXX 格式的 ID
                let existingNumbers = this.dataStore
                    .map(item => String(item._raw[this.colMap.techId] || ''))
                    .filter(id => id.startsWith(siteCode + '-'))
                    .map(id => parseInt(id.split('-')[1]))
                    .filter(num => !isNaN(num));

                let nextNum = existingNumbers.length > 0 ? Math.max(...existingNumbers) + 1 : 1;
                return `${siteCode}-${nextNum.toString().padStart(4, '0')}`;
            }

            async saveToGoogleSheet() {
                if (!this.accessToken) { this.triggerAuth(); return; }
                const storeVal = document.getElementById('v_store').value.trim();
                const nameVal = document.getElementById('v_name').value.trim();
                if (!storeVal || !nameVal) { Utility.showToast("⚠️ 店名與姓名必填", true); return; }

                Utility.showLoading("存檔中...");
                try {
                    let targetRowIdx = document.getElementById('v_row_index').value;
                    let techId = document.getElementById('v_tech_id').value.trim();
                    
                    // 如果是新資料且沒有編號，自動生成
                    if (!targetRowIdx && !techId) {
                        let siteCode = this.getSiteCodeFromRules(storeVal);
                        techId = this.generateSiteBasedID(siteCode);
                        document.getElementById('v_tech_id').value = techId;
                    }

                    let finalUrl = document.getElementById('v_photo_url').value;
                    if(cropperSvc.pendingBlob) {
                        finalUrl = await cropperSvc.uploadToDrive(cropperSvc.pendingBlob, `${storeVal}-${nameVal}.jpg`, this.accessToken);
                    }

                    let newRow = new Array(this.headerRow.length).fill("");
                    const setV = (f, v) => { if(this.colMap[f]!==-1) newRow[this.colMap[f]] = v; };
                    setV('location', document.getElementById('v_location').value);
                    setV('store', storeVal); setV('techId', techId);
                    setV('startDate', document.getElementById('v_start_date').value);
                    setV('name', nameVal); setV('age', document.getElementById('v_age').value);
                    setV('stats', document.getElementById('v_stats').value);
                    setV('price', document.getElementById('v_price').value);
                    setV('url', document.getElementById('v_url').value);
                    setV('af', document.getElementById('v_af').value);
                    setV('level', document.getElementById('v_level').value);
                    setV('schedule', document.getElementById('v_schedule').value);
                    setV('photo', finalUrl); setV('updateTime', Utility.getCurrentTime());

                    let url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(this.currentSheet)}`;
                    let method = 'POST';
                    if (targetRowIdx) { url += `!A${targetRowIdx}?valueInputOption=USER_ENTERED`; method = 'PUT'; }
                    else { url += `!A1:append?valueInputOption=USER_ENTERED`; }

                    await fetch(url, { method, headers: { 'Authorization': `Bearer ${this.accessToken}` }, body: JSON.stringify({ values: [newRow] }) });
                    Utility.showToast("✅ 儲存成功");
                    this.loadSheetData(true);
                } catch(e) { Utility.showToast("❌ 存檔失敗", true); }
                Utility.hideLoading();
            }

            getSiteCodeFromRules(storeName) {
                let rule = this.rulesData.find(r => r.ruleType === 'Set_Default' && r.action === storeName);
                if (rule) return rule.site;
                let codeMatch = storeName.match(/[A-Z0-9]{4,}/i);
                return codeMatch ? codeMatch[0] : 'N';
            }

            async cleanupDriveImages() {
                if (!this.accessToken || !this.hasWriteAccess) return;
                if (!confirm('☁️ 確定要刪除雲端廢棄照片並自動命名嗎？')) return;
                Utility.showLoading("雲端點名中...");
                try {
                    let active = new Map();
                    this.dataStore.forEach(item => {
                        let r = item._raw;
                        let id = Utility.extractDriveFileId(r[this.colMap.photo]);
                        if (id) active.set(id, `${r[this.colMap.store]}-${r[this.colMap.name]}.jpg`.replace(/[\\/:*?"<>|]/g, ''));
                    });
                    let files = []; let pt = null;
                    do {
                        let q = encodeURIComponent(`'${DRIVE_FOLDER_ID}' in parents and trashed = false`);
                        let res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=nextPageToken,files(id,name)&pageSize=1000${pt?`&pageToken=${pt}`:''}`, {headers:{'Authorization':`Bearer ${this.accessToken}`}});
                        let data = await res.json(); files = files.concat(data.files || []); pt = data.nextPageToken;
                    } while (pt);

                    for (let f of files) {
                        if (active.has(f.id)) {
                            if (f.name !== active.get(f.id)) {
                                await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`, { method:'PATCH', headers:{'Authorization':`Bearer ${this.accessToken}`,'Content-Type':'application/json'}, body:JSON.stringify({name:active.get(f.id)}) });
                            }
                        } else {
                            await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`, { method:'DELETE', headers:{'Authorization':`Bearer ${this.accessToken}`} });
                        }
                    }
                    Utility.showToast("✅ 雲端清理完成！");
                } catch(e){ Utility.showToast("❌ 清理失敗", true); }
                Utility.hideLoading();
            }

            // ===== 批次邏輯：支援 Rules 錨點分割 =====
            executeBatch(isCreate) {
                const text = document.getElementById('v_magic_paste').value.trim();
                const splitterRule = this.rulesData.find(r => r.ruleType === 'System_Anchor' && r.pattern === 'Block_Splitter');
                const splitter = splitterRule ? splitterRule.action : '收藏夾';
                const blocks = text.split(new RegExp(splitter, 'g')).filter(b => b.length > 20);
                if (blocks.length <= 1) { Utility.showToast("⚠️ 未偵測到清單資料", true); return; }

                Utility.showLoading("批次執行中...");
                const storeVal = document.getElementById('v_store').value.trim();
                const priceVal = document.getElementById('v_price').value.trim();
                const locVal = document.getElementById('v_location').value.trim();

                setTimeout(() => {
                    blocks.forEach(block => {
                        let p = RuleEngine.parse(block, "", "", storeVal || "Common", this.rulesData);
                        if (!p.name) return;
                        let rIdx = this.dataStore.findIndex(r => r._raw[this.colMap.name] === p.name);
                        if (rIdx !== -1) {
                            let r = this.dataStore[rIdx]._raw;
                            if (p.scheduleRaw) r[this.colMap.schedule] = RuleEngine.parseAndFormatSchedule(p.scheduleRaw, "", storeVal, this.rulesData);
                            if (p.stats) r[this.colMap.stats] = p.stats;
                            r[this.colMap.updateTime] = Utility.getCurrentTime();
                        } else if (isCreate) {
                            let siteCode = this.getSiteCodeFromRules(storeVal);
                            let newRow = new Array(this.headerRow.length).fill("");
                            const setV = (f, v) => { if(this.colMap[f]!==-1) newRow[this.colMap[f]] = v; };
                            setV('techId', this.generateSiteBasedID(siteCode));
                            setV('store', storeVal); setV('name', p.name); setV('stats', p.stats);
                            setV('price', priceVal); setV('location', locVal);
                            setV('updateTime', Utility.getCurrentTime());
                            if (p.scheduleRaw) setV('schedule', RuleEngine.parseAndFormatSchedule(p.scheduleRaw, "", storeVal, this.rulesData));
                            this.dataStore.push({ id: newRow[this.colMap.techId], _raw: newRow, _rowIndex: "" });
                        }
                    });
                    this.renderCatalog(); this.saveOrderToGoogleSheet(true);
                    Utility.showToast("✅ 批次完成"); Utility.hideLoading();
                }, 100);
            }

            processMagicPaste(text, html) {
                const singleRule = this.rulesData.find(r => r.ruleType === 'System_Anchor' && r.action === 'Identify_Single');
                if (singleRule && !new RegExp(singleRule.pattern).test(text)) {
                    Utility.showToast("✨ 已載入批次清單！請點擊上方更新/建檔"); return;
                }
                const p = RuleEngine.parse(text, html, "", document.getElementById('v_store').value, this.rulesData);
                if (p.name) document.getElementById('v_name').value = p.name;
                if (p.stats) document.getElementById('v_stats').value = p.stats;
                if (p.scheduleRaw) document.getElementById('v_schedule').value = RuleEngine.parseAndFormatSchedule(p.scheduleRaw, "", p.store, this.rulesData);
                // 其他欄位繼承邏輯...
            }

            loadSheetData(keepForm) {
                if (!this.accessToken) return;
                Utility.showLoading("讀取中...");
                fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(this.currentSheet)}!A:Z`, {headers:{'Authorization':`Bearer ${this.accessToken}`}})
                .then(r=>r.json()).then(data => {
                    if (!data.values) return;
                    this.headerRow = data.values[0];
                    const getIdx = (n) => this.headerRow.findIndex(h => h.trim() === n);
                    this.colMap = { location:getIdx('位置'), store:getIdx('店名'), techId:getIdx('技師編號'), startDate:getIdx('到職日'), name:getIdx('姓名'), age:getIdx('年齡'), stats:getIdx('數值'), photo:getIdx('技師照片'), price:getIdx('價金'), url:getIdx('網址'), af:getIdx('屬性'), level:getIdx('等級'), schedule:getIdx('行事曆'), favorite:getIdx('最愛'), updateTime:getIdx('更新時間') };
                    this.dataStore = data.values.slice(1).map((v, i) => ({ id:v[this.colMap.techId], _raw:v, _rowIndex:i+2 }));
                    this.populateFilters(); this.renderCatalog();
                    if(!keepForm) this.clearForm();
                    Utility.hideLoading();
                });
            }

            reloadRules(show) {
                fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Rules!A:G`, {headers:{'Authorization':`Bearer ${this.accessToken}`}})
                .then(r=>r.json()).then(data => {
                    if(data.values) {
                        this.rulesData = data.values.slice(1).map(row => ({
                            priority:parseInt(row[0]), site:row[1], field:row[2], ruleType:row[3], pattern:row[4], action:row[5]
                        })).sort((a,b)=>a.priority-b.priority);
                        if(show) { Utility.showToast("✅ 規則已更新"); this.renderRulesPreview(); }
                    }
                });
            }

            renderCatalog() {
                const grid = document.getElementById('catalogGrid'); grid.innerHTML = '';
                const kw = document.getElementById('searchInput').value.toLowerCase();
                this.dataStore.forEach((item, index) => {
                    const r = item._raw;
                    if (kw && !r[this.colMap.name].toLowerCase().includes(kw)) return;
                    const card = document.createElement('div'); card.className = 'card';
                    card.onclick = () => this.editRecord(index);
                    const shape = Utility.getBodyShapeData(r[this.colMap.stats], r[this.colMap.store], this.rulesData);
                    card.innerHTML = `
                        <div class="img-container"><img src="${Utility.cleanDriveUrl(r[this.colMap.photo]) || PLACEHOLDER_URL}"></div>
                        <div class="store-name">${r[this.colMap.store]}</div>
                        <div class="tech-name">${r[this.colMap.name]}</div>
                        <div class="stats-row">${r[this.colMap.stats]}</div>
                        ${shape ? `<div style="font-size:10px;">${shape.shapeIcon} ${shape.shapeType} | 👑 ${shape.score}分</div>` : ''}
                    `;
                    grid.appendChild(card);
                });
            }
            // 其餘輔助方法 (toggleMode, clearForm, editRecord, initGoogleAuth...) 需完整保留
            toggleMode() { this.isEditMode=!this.isEditMode; document.getElementById('app-container').className = this.isEditMode ? 'edit-mode' : 'view-mode'; this.renderCatalog(); }
            triggerAuth() { this.tokenClient.requestAccessToken({prompt:'consent'}); }
            initGoogleAuth() {
                this.tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive',
                    callback: (resp) => { this.accessToken=resp.access_token; document.getElementById('auth-banner').style.display='none'; this.reloadRules(); this.fetchSheetNames(); }
                });
            }
            fetchSheetNames() {
                fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets.properties(title)`, {headers:{'Authorization':`Bearer ${this.accessToken}`}})
                .then(r=>r.json()).then(data => {
                    const sel = document.getElementById('v_sheet'); sel.innerHTML = '';
                    data.sheets.forEach(s => { if(s.properties.title!=='Rules') sel.innerHTML += `<option value="${s.properties.title}">${s.properties.title}</option>`; });
                    this.loadSheetData();
                });
            }
            populateFilters() {
                const storeSel = document.getElementById('filterStore');
                const stores = [...new Set(this.dataStore.map(i=>i._raw[this.colMap.store]))].sort();
                storeSel.innerHTML = '<option value="">🏪 所有店鋪</option>';
                stores.forEach(s => storeSel.innerHTML += `<option value="${s}">${s}</option>`);
            }
        }

        window.app = new AppCore();
        window.onload = () => app.initGoogleAuth();
        const cropperSvc = {
            closeModal() { document.getElementById('cropperModal').style.display='none'; },
            async uploadToDrive(blob, name, token) {
                const metadata = { name, parents: [DRIVE_FOLDER_ID] };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', blob);
                const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
                    method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: form
                });
                const data = await res.json();
                return `https://drive.google.com/file/d/${data.id}/view?usp=drivesdk`;
            }
        };
    </script>
</body>
