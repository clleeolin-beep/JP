<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent DB - 技師資料彙整系統 (專業電商級版)</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <style>
        :root {
            --primary: #4527a0;
            --secondary: #7986cb;
            --bg: #f0f2f5;
            --text: #2c3e50;
            --accent: #e91e63;
            --success: #2e7d32;
            --card-bg: #ffffff;
            --warning: #ff9800;
            --info: #03a9f4;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 15px; display: flex; flex-direction: column;
            height: 100dvh; box-sizing: border-box; overflow: hidden;
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; flex-wrap: wrap; }
        #app-container { display: grid; grid-template-columns: 500px 1fr; gap: 15px; flex: 1; min-height: 0; }
        .panel { background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.08); padding: 20px; display: flex; flex-direction: column; overflow-y: auto; position: relative; }
        #app-container.view-mode { grid-template-columns: 1fr; }
        #app-container.view-mode #panel-form { display: none; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .form-group.full { grid-column: span 2; }
        label { display: flex; justify-content: space-between; align-items: center; font-weight: 700; margin-bottom: 5px; font-size: .85em; color: #666; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .img-preview-box { width: 100%; height: 300px; background: #f8f9fa; border: 2px dashed #ccc; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        .img-preview-box img { width: 100%; height: 100%; object-fit: contain; }
        .btn-delete-img { position: absolute; top: 10px; right: 10px; background: rgba(233,30,99,.9); color: #fff; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.85); z-index: 99999; display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; }
        #toast-container { position: fixed; top: -50px; left: 50%; transform: translateX(-50%); background: var(--success); color: #fff; padding: 12px 24px; border-radius: 8px; font-weight: 700; z-index: 100000; opacity: 0; transition: .4s; }
        #toast-container.show { opacity: 1; top: 30px; }
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 15px; }
        .card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; cursor: pointer; background: #fff; position: relative; }
        .card img { width: 100%; height: 240px; object-fit: contain; border-radius: 6px; background: #f8f9fa; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.85); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); padding: 20px; box-sizing: border-box; }
        .modal-wrapper { width: 100%; max-width: 650px; max-height: 90%; background: #fff; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        button { background: var(--primary); color: #fff; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 700; transition: .3s; display: inline-flex; align-items: center; justify-content: center; gap: 5px; }
        button.danger { background: #e53935; }
        button.warning { background: var(--warning); color: #fff; }
        button.info { background: var(--info); color: #fff; }
        button.mini { padding: 4px 8px; font-size: 12px; }
        .filter-tools { position: sticky; top: 0; background: #fff; z-index: 50; padding-bottom: 10px; border-bottom: 2px solid var(--secondary); margin-bottom: 10px; }
        
        table.stats-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        table.stats-table th, table.stats-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        table.stats-table th { background-color: var(--primary); color: white; }
        table.stats-table tr:nth-child(even) { background-color: #f2f2f2; }
        
        @media (max-width: 850px) {
            body { padding: 8px; }
            .app-title { display: none; }
            #app-container { display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
            .panel { flex: none; overflow-y: visible; height: auto; margin-bottom: 10px; }
            .form-grid { grid-template-columns: 1fr; gap: 8px; }
            .form-group.full { grid-column: span 1; }
            .catalog-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
            .card img { height: 160px; margin-bottom: 6px; }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div id="loading-text" style="white-space: pre-wrap; font-size: 18px; line-height: 1.6;">資料處理中...</div>
    </div>
    
    <div id="toast-container">ℹ️ 提示訊息</div>

    <div class="top-bar">
        <h2 class="app-title" style="margin: 0;">🎭 Talent DB</h2>
        <div style="display:flex; gap:10px; align-items:center;">
            <select id="v_sheet" onchange="app.loadSheetData()" style="padding: 6px; border: none; font-weight: bold; color: var(--primary);"><option value="">請登入...</option></select>
            <button onclick="app.loadSheetData()" class="success">🔄 整理</button>
            <button id="btn-mode-toggle" onclick="app.toggleMode()" style="background:#e91e63;">📝 切換編輯</button>
        </div>
    </div>

    <div id="auth-banner" onclick="app.triggerAuth()" style="display:block; text-align:center; padding:10px; background:#ffeeba; cursor:pointer; font-weight:bold; border-radius:8px; margin-bottom:10px;">
        🔒 安全鎖定：點擊完成 Google 授權
    </div>

    <div id="app-container" class="view-mode">
        <div class="panel" id="panel-form">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:2px solid var(--primary); padding-bottom:8px; flex-wrap:wrap; gap:10px;">
                <h3 style="margin:0;">📝 資料編輯</h3>
                <div style="display:flex; gap:5px; flex-wrap:wrap;">
                    <button id="btn-auto-sync" class="info mini" onclick="app.startAutoSync()" title="背景全自動更新各店班表">🤖 自動同步</button>
                    <button id="btn-cancel-sync" class="danger mini" onclick="app.cancelAutoSync()" style="display:none;" title="強制中止同步進程">⏹️ 取消</button>
                    <button class="warning mini" onclick="app.cleanupDriveFolder()">☁️ 清理</button>
                    <button class="secondary mini" onclick="app.executeBatchUpdateOnly()">⚡ 更新</button>
                    <button class="warning mini" onclick="app.executeBatchCreate()">🌟 建檔</button>
                    <button class="success mini" onclick="app.clearForm()">➕ 新增</button>
                </div>
            </div>
            
            <input type="hidden" id="v_row_index">
            <div class="form-grid">
                <div class="form-group full">
                    <label>✨ 魔法貼上</label>
                    <textarea id="v_magic_paste" rows="2" placeholder="貼上網址自動爬蟲、貼上文字自動解析"></textarea>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group"><label>店名 *</label><input type="text" id="v_store"></div>
                <div class="form-group"><label>姓名 *</label><input type="text" id="v_name"></div>
            </div>

            <div class="form-grid">
                <div class="form-group"><label>技師編號</label><input type="text" id="v_tech_id" placeholder="自動洗淨格式"></div>
                <div class="form-group"><label>到職日</label><input type="date" id="v_start_date"></div>
            </div>

            <div class="form-grid">
                <div class="form-group"><label>位置</label><input type="text" id="v_location"></div>
                <div class="form-group"><label>年齡</label><input type="text" id="v_age"></div>
            </div>

            <div class="form-group full"><label>數值</label><input type="text" id="v_stats"></div>
            <div class="form-group full"><label>價金</label><textarea id="v_price" rows="2"></textarea></div>
            
            <div class="form-grid">
                <div class="form-group"><label>屬性</label><input type="text" id="v_af"></div>
                <div class="form-group"><label>等級</label><input type="text" id="v_level"></div>
            </div>

            <div class="form-group full"><label>網址</label><input type="text" id="v_url"></div>
            <div class="form-group full"><label>本周班表</label><textarea id="v_schedule" rows="4"></textarea></div>

            <input type="file" id="fileInputPhoto" accept="image/*" style="display:none;">
            <input type="hidden" id="v_photo_url">
            <div class="photo-upload-area">
                <label>📷 技師照片 (自動命名)</label>
                <div class="img-preview-box" id="drop_area">
                    <img id="preview_photo" style="display:none;">
                    <span id="text_photo">點擊上傳或貼上截圖</span>
                    <button id="btn_del_photo" class="btn-delete-img" onclick="app.deleteImage(event)" style="display:none;">✖</button>
                </div>
            </div>

            <div style="margin-top:auto; display:flex; gap:10px;">
                <button id="btn-save" onclick="app.saveToGoogleSheet()" style="flex:2;" disabled>💾 儲存 (Ctrl+S)</button>
                <button id="btn-delete" onclick="app.deleteRecordForm()" class="danger" style="display:none;">🗑️ 刪除</button>
            </div>
        </div>

        <div class="panel" id="panel-catalog">
            <div class="filter-tools">
                <input type="text" id="searchInput" placeholder="🔍 搜尋技師..." oninput="app.renderCatalog()" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
            </div>
            <div class="catalog-grid" id="catalogGrid"></div>
        </div>
    </div>

    <div id="cropperModal" class="modal-overlay">
        <div class="modal-wrapper">
            <h3>✂️ 調整照片</h3>
            <div style="flex:1; background:#eee; overflow:hidden; min-height: 400px; display: flex; justify-content: center;"><img id="cropperImage" style="max-width: 100%; max-height: 100%;"></div>
            <div style="margin-top:15px; text-align:right;">
                <button onclick="cropperSvc.closeModal()" class="danger">取消</button>
                <button onclick="cropperSvc.cropAndPrepare()">確認裁切</button>
            </div>
        </div>
    </div>

    <div id="syncStatsModal" class="modal-overlay">
        <div class="modal-wrapper" style="max-height: 95%;">
            <h3 style="color: var(--info); margin-top: 0;">📊 自動同步戰報總結</h3>
            <div style="overflow-y: auto; flex: 1;">
                <table class="stats-table">
                    <thead>
                        <tr>
                            <th>店鋪代碼</th>
                            <th>爬取總數</th>
                            <th>成功更新</th>
                            <th>未在資料庫</th>
                        </tr>
                    </thead>
                    <tbody id="syncStatsBody">
                        </tbody>
                </table>
            </div>
            <div style="margin-top:15px; text-align:center;">
                <button onclick="document.getElementById('syncStatsModal').style.display='none'" class="success" style="width: 100%; padding: 12px; font-size: 16px;">確認並關閉</button>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '615427641075-2e4i1l7smqp30l8v1qrf75c924aro94i.apps.googleusercontent.com';
        const SHEET_ID = '1WpEGW6m-N-Ofdsn4LGIrT0uQvFRPkVTh9RyJkKgqlc8';
        const DRIVE_FOLDER_ID = '1s1x7yyWUE3JB_8YnjOAoL93u7No6NP9p';

        class RuleEngine {
            constructor() { this.rules = []; }
            setRules(rawData) {
                if (!rawData || rawData.length < 2) return;
                this.rules = rawData.slice(1).map(r => ({
                    priority: parseInt(r[0]) || 0, siteMatch: r[1] || 'Common', field: r[2] || '',
                    ruleType: r[3] || '', pattern: r[4] || '', action: r[5] || '', note: r[6] || ''
                })).sort((a,b) => a.priority - b.priority);
            }
            getSafePattern(p) { return p ? p.replace(/\(\?[a-z]+\)/gi, '') : ''; }
            extractByRules(text, html, field, siteMatches) {
                let res = { value: '', secondaryValue: '', tags: new Set(), level: '' };
                let valueFound = false;
                this.rules.filter(r => r.field === field && (siteMatches.includes(r.siteMatch) || r.siteMatch === 'Common')).forEach(rule => {
                    let safeP = this.getSafePattern(rule.pattern);
                    if (!safeP) return;
                    try {
                        if (rule.ruleType === 'Regex_Extract' && !valueFound) {
                            let m = text.match(new RegExp(safeP, 'im'));
                            if (m) {
                                if (rule.action === 'Extract_Group_1' && m[1]) { res.value = m[1].trim(); valueFound = true; }
                                else if (rule.action === 'Extract_Group_1_2' && m[1] && m[2]) { res.value = m[1].trim(); res.secondaryValue = m[2].trim(); valueFound = true; }
                                else if (rule.action === 'Extract_Number' && m[1]) { res.value = m[1].replace(/,/g, '').trim(); valueFound = true; }
                                else if (rule.action === 'Extract_Date' && m[1] && m[2] && m[3]) { res.value = `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`; valueFound = true; }
                                else if (rule.action === 'Extract_Raw') { res.value = m[0].trim(); valueFound = true; }
                            }
                        } else if (rule.ruleType === 'Set_Default' && !valueFound) {
                            if (new RegExp(safeP, 'i').test(text) || siteMatches.some(s => new RegExp(safeP, 'i').test(s))) { res.value = rule.action; valueFound = true; }
                        } else if (rule.ruleType === 'Regex_Tag' && (new RegExp(safeP, 'i').test(text) || new RegExp(safeP, 'i').test(res.value))) {
                            res.tags.add(rule.action.replace('Tag: ', '').trim());
                        } else if (rule.ruleType === 'HTML_Img_Tag' && html && html.includes(rule.pattern)) {
                            res.tags.add(rule.action.replace('Tag: ', '').trim());
                        } else if (rule.ruleType === 'Regex_Level') {
                            let m = text.match(new RegExp(safeP, 'i'));
                            if (m && m[1]) res.level = m[1];
                        }
                    } catch(e) { console.warn(`[RuleEngine] 略過無效正則 (${field}):`, safeP); }
                });
                return res;
            }
        }
        window.ruleEngine = new RuleEngine();

        class Utility {
            static showLoading(msg) { document.getElementById('loading-text').innerText = msg; document.getElementById('loading-overlay').style.display = 'flex'; }
            static hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }
            static showToast(msg, isErr=false) {
                const t = document.getElementById('toast-container');
                if(!t) return;
                t.innerText = msg; t.style.background = isErr ? '#e53935' : (msg.includes('變更') || msg.includes('完成') || msg.includes('自動同步') ? 'var(--warning)' : 'var(--success)');
                t.classList.add('show');
                if (this.toastTimeout) clearTimeout(this.toastTimeout);
                this.toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
            }
            static getSafePattern(p) { return p ? p.replace(/\(\?[a-z]+\)/gi, '') : ''; }
            static cleanStoreNameDisplay(s) { return s ? s.replace(/[\r\n]+/g, ' ').replace(/\s+/g, ' ').trim() : ""; }
            static generateID(storeCode = 'UNKNOWN') { return storeCode + '_' + Math.floor(Math.random() * 10000).toString().padStart(4, '0'); }
            static getStoreCodeByName(storeName) {
                if (!storeName) return 'UNKNOWN';
                let cT = Utility.cleanStoreNameDisplay(storeName).toLowerCase();
                let r = window.ruleEngine.rules.find(r => r.field === 'v_store' && r.action && Utility.cleanStoreNameDisplay(r.action).toLowerCase() === cT);
                if (r) return r.pattern || r.siteMatch;
                r = window.ruleEngine.rules.find(r => r.field === 'v_store' && r.action && Utility.cleanStoreNameDisplay(r.action).toLowerCase().includes(cT));
                return r ? (r.pattern || r.siteMatch) : 'UNKNOWN';
            }
            static extractDriveFileId(url) {
                if (!url) return null; const m = url.match(/[-\w]{25,}/); return m ? m[0] : null;
            }
            static cleanDriveUrl(url) {
                if (!url) return "";
                let p = String(url).trim(); let m = p.match(/[-\w]{25,}/);
                return m ? `https://drive.google.com/thumbnail?authuser=0&sz=w800&id=${m[0]}` : (p.startsWith('http') ? p : "");
            }
            static getCurrentTime() {
                const tz = (new Date()).getTimezoneOffset() * 60000;
                return (new Date(Date.now() - tz)).toISOString().slice(0, 19).replace('T', ' ');
            }
            static parseName(raw, eng = window.ruleEngine) {
                if (!raw) return { pureName: "", tags: [], level: "" };
                let tags = new Set(), level = "", pureName = raw;
                eng.getRulesForField('v_af').forEach(r => { try { if(r.ruleType === 'Regex_Tag' && new RegExp(Utility.getSafePattern(r.pattern), 'i').test(raw)) tags.add(r.action.replace('Tag: ', '').trim()); } catch(e){} });
                eng.getRulesForField('v_level').forEach(r => { try { if(r.ruleType === 'Regex_Level') { let m = raw.match(new RegExp(Utility.getSafePattern(r.pattern))); if(m && m[1]) level = m[1]; } } catch(e){} });
                eng.getRulesForField('v_name').forEach(r => { try { let sp = Utility.getSafePattern(r.pattern); if(r.ruleType === 'Clean_Remove') pureName = pureName.replace(new RegExp(sp, 'ig'), ''); else if(r.ruleType === 'Clean_End') pureName = pureName.replace(new RegExp(sp, 'g'), ''); } catch(e){} });
                return { pureName: pureName.trim(), tags: Array.from(tags), level };
            }
            static parseAndFormatSchedule(rawText, eng = window.ruleEngine) {
                if (!rawText || !eng) return '';
                const dayMap = {}; eng.getRulesForField('Schedule_Day').forEach(r => dayMap[r.pattern] = r.action);
                let sr = eng.getRulesForField('Schedule_Status'); let safeRest = Utility.getSafePattern(sr.length > 0 ? sr[0].pattern : '休|み|缺|^\\s*-\\s*$');
                let cr = eng.getRulesForField('Schedule_Stop'); let safeStop = Utility.getSafePattern(cr.length > 0 ? cr[0].pattern : '(?:口碑|口コミ|店鋪資訊|店舗情報)');
                let rReg; try { rReg = new RegExp(safeRest || '休|み|缺|^\\s*-\\s*$'); } catch(e) { rReg = /休|み|缺|^\s*-\s*$/; }
                let sReg; try { sReg = new RegExp(safeStop); } catch(e) { sReg = /(?:口碑|口コミ)/; }

                let cleanText = rawText.replace(/\n\s*-\s*\n/g, ' - ').replace(/\n\s*~\s*\n/g, ' ~ ');
                const regex = /(\d{1,2})\/(\d{1,2})\s*(?:\((.)\))?\s*([\s\S]*?)(?=(?:\d{1,2}\/\d{1,2}\s*(?:\(.\))?)|\s*$)/g;
                let lines = [], m;
                
                while ((m = regex.exec(cleanText)) !== null) {
                    let d = `${parseInt(m[1])}/${parseInt(m[2])}`;
                    let rawDay = m[3] ? m[3].replace(/[()]/g, '') : '';
                    let day = rawDay && dayMap[rawDay] ? `(${dayMap[rawDay]})` : (rawDay ? `(${rawDay})` : '');
                    let content = m[4] || ''; 
                    let sm = content.search(sReg); if (sm !== -1) content = content.substring(0, sm);
                    let cContent = content.replace(/\s+/g, ' '); 
                    let timeStr = "休息";
                    const tMatch = cContent.match(/(\d{1,2}[:：]\d{2})\s*[-~〜ー]\s*(\d{1,2}[:：]\d{2})/);
                    if (tMatch) timeStr = `${tMatch[1].replace('：',':')}-${tMatch[2].replace('：',':')}`;
                    else if (rReg.test(cContent) || cContent.trim() === '-') timeStr = '休息';
                    lines.push(`${d} ${day} ${timeStr}`.trim());
                }
                
                if (lines.length > 0) {
                    let fDate = lines[0].split(' ')[0].match(/(\d+)\/(\d+)/);
                    if (fDate) {
                        let mo = parseInt(fDate[1]), da = parseInt(fDate[2]), y = new Date().getFullYear();
                        if (new Date().getMonth() === 11 && mo === 1) y += 1;
                        let fLines = [], dNames = ['日', '一', '二', '三', '四', '五', '六'];
                        for (let i = 0; i < 7; i++) {
                            let cD = new Date(y, mo - 1, da + i);
                            let tD = `${cD.getMonth() + 1}/${cD.getDate()}`;
                            let ex = lines.find(l => l.startsWith(tD + ' ') || l === tD);
                            if (ex) {
                                let exM = ex.match(/^(\d{1,2}\/\d{1,2})\s*(?:\(.\))?\s*(.+)$/);
                                fLines.push(exM ? `${exM[1]} (${dNames[cD.getDay()]}) ${exM[2]}` : ex);
                            } else fLines.push(`${tD} (${dNames[cD.getDay()]}) 休息`);
                        }
                        return fLines.join('\n');
                    }
                }
                return rawText.replace(/\n\s*\n/g, '\n').trim();
            }
            static isSameStore(dbStore, extStore) {
                if (!dbStore || !extStore) return false; 
                let s1 = dbStore.toLowerCase().replace(/[\s　]/g, ''), s2 = extStore.toLowerCase().replace(/[\s　]/g, '');
                if (s1 === s2) return true;
                if (s1.includes(s2) || s2.includes(s1)) {
                    let longer = s1.length > s2.length ? s1 : s2, shorter = s1.length > s2.length ? s2 : s1;
                    if (/(in|店|branch|浅草|asakusa|新宿|shinjuku|池袋|ikebukuro|渋谷|shibuya|五反田|gotanda|目黒|meguro|白金|shirokane|上野|ueno|秋葉原|akihabara|新橋|shinbashi|品川|shinagawa|吉原|yoshiwara|川崎|kawasaki|本店|分店)/i.test(longer.replace(shorter, ''))) return false; 
                    return true; 
                }
                return false;
            }
        }

        class ImageCropperService {
            constructor() {
                this.modal = document.getElementById('cropperModal');
                this.imageElement = document.getElementById('cropperImage');
                this.cropper = null; this.pendingBlob = null; 
                document.getElementById('fileInputPhoto')?.addEventListener('change', (e) => this.handleFile(e.target.files[0], false));
            }
            handleFile(file, fromPaste = false) {
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.imageElement.removeAttribute('crossorigin');
                        this.imageElement.src = e.target.result;
                        if (fromPaste) {
                            document.getElementById('preview_photo').src = e.target.result;
                            document.getElementById('preview_photo').style.display = 'block';
                            document.getElementById('text_photo').style.display = 'none';
                            document.getElementById('btn_del_photo').style.display = 'flex';
                            this.pendingBlob = file;
                            Utility.showToast('✅ 圖片已貼上！');
                        } else this.openModal();
                    };
                    reader.readAsDataURL(file);
                }
            }
            openModal() {
                this.modal.style.display = 'flex';
                if(this.cropper) { this.cropper.destroy(); this.cropper = null; }
                setTimeout(() => { this.cropper = new Cropper(this.imageElement, { aspectRatio: 3 / 4, viewMode: 1, autoCropArea: 1, checkCrossOrigin: false }); }, 50);
            }
            closeModal() { this.modal.style.display = 'none'; if(this.cropper) this.cropper.destroy(); document.getElementById('fileInputPhoto').value = ''; }
            cropAndPrepare() {
                if(this.cropper) {
                    try {
                        const canvas = this.cropper.getCroppedCanvas({ width: 600, height: 800 });
                        if (!canvas) throw new Error('畫布錯誤');
                        document.getElementById('preview_photo').src = canvas.toDataURL('image/jpeg', 0.85);
                        document.getElementById('preview_photo').style.display = 'block';
                        document.getElementById('text_photo').style.display = 'none';
                        document.getElementById('btn_del_photo').style.display = 'flex';
                        canvas.toBlob((b) => { this.pendingBlob = b; }, 'image/jpeg', 0.85);
                        this.closeModal();
                    } catch(e) { Utility.showToast('⚠️ 圖片錯誤', true); this.closeModal(); }
                }
            }
            async uploadToDrive(blob, fileName, accessToken) {
                if (!blob) return null;
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify({ name: fileName, parents: [DRIVE_FOLDER_ID] })], { type: 'application/json' }));
                form.append('file', blob);
                let res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink', { method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken }, body: form });
                let data = await res.json();
                if(!res.ok) throw new Error(data.error.message);
                return data.webViewLink;
            }
        }

        class AppCore {
            constructor() {

                    if (text.trim().match(/^https?:\/\/[^\s]+$/) && (text.includes('list') || text.includes('cast') || text.includes('schedule'))) {
                        e.preventDefault();

            // 🌐 跨域獲取代理引擎 (內建多重代理備援)
            async fetchHtmlWithProxy(targetUrl) {
                const proxies = [
                    { url: `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`, isJson: true },
                    { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`, isJson: false },
                    { url: `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`, isJson: false }
                ];

                for (let proxy of proxies) {
                    try {
                        let res = await fetch(proxy.url);
                        if (!res.ok) throw new Error(`HTTP error ${res.status}`);
                        let html = '';
                        if (proxy.isJson) {
                            let data = await res.json();
                            html = data.contents;
                        } else {
                            html = await res.text();
                        }
                        if (html && (html.includes('<body') || html.includes('<!DOCTYPE'))) {
                            return html;
                        }
                    } catch (e) {
                        console.warn(`[Proxy Failed] ${proxy.url} - ${e.message}`);
                    }
                }
                throw new Error("所有跨域代理均已失效或被目標網站封鎖。");
            }

            // 🤖 核心升級 1：全自動背景同步
            async startAutoSync() {
                if (!this.accessToken || !this.hasWriteAccess) { Utility.showToast("⚠️ 請先切換至編輯模式並完成 Google 授權！", true); return; }
                
                let syncRules = window.ruleEngine.rules.filter(r => r.field === 'System_AutoSync' && r.action === 'Y');
                if (syncRules.length === 0) { Utility.showToast("⚠️ Rules分頁中沒有設定任何自動同步網址！", true); return; }
                if (!confirm(`🤖 全自動同步準備就緒\n\n系統將自動於背景爬取 ${syncRules.length} 個網址，比對並更新現有技師的班表與資訊。\n(未在資料庫的技師將被跳過，不自動建檔以保證安全)\n\n建議開啟 F12 主控台查看詳細爬取日誌。\n是否開始執行？`)) return;

                this.isSyncing = true;
                document.getElementById('btn-auto-sync').style.display = 'none';
                document.getElementById('btn-cancel-sync').style.display = 'inline-flex';
                
                let syncStats = {};
                console.log("%c[AutoSync] 🚀 啟動全自動同步進程...", "color: #e91e63; font-weight: bold; font-size: 16px;");

                for (let i = 0; i < syncRules.length; i++) {
                    if (!this.isSyncing) {
                        console.log("%c[AutoSync] 🛑 使用者已中斷同步流程。", "color: red; font-size: 14px;");
                        break;
                    }
                    let rule = syncRules[i];
                    let url = rule.pattern;
                    let storeCode = rule.siteMatch;
                    if (!syncStats[storeCode]) syncStats[storeCode] = { total: 0, updated: 0, missing: 0 };

                    Utility.showLoading(`📡 自動同步中... (${i+1}/${syncRules.length})\n正在爬取：${storeCode}\n\n(點擊左側紅鈕可中途取消)`);
                    console.log(`%c---------------------------------------------------\n[AutoSync] ⏳ [${i+1}/${syncRules.length}] 爬取對象: ${storeCode}\n🔗 URL: ${url}`, "color: #2196f3; font-weight:bold;");

                    try {
                        const html = await this.fetchHtmlWithProxy(url);

                        let tempDiv = document.createElement('div');
                        let cleanHtml = html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
                                            .replace(/<style\b[^<]*(?:(?!<\/style>)<[^<]*)*<\/style>/gi, '')
                                            .replace(/<br\s*[\/]?>/gi, "\n")
                                            .replace(/<\/p>/gi, "\n</p>")
                                            .replace(/<\/div>/gi, "\n</div>");
                        tempDiv.innerHTML = cleanHtml;
                        tempDiv.querySelectorAll('a').forEach(a => {
                            if (a.href && (a.href.includes('girlid') || a.href.includes('/cast/'))) a.innerText = a.innerText + '\n' + a.href + '\n';
                        });
                        let extractedText = tempDiv.innerText.replace(/\n\s*\n/g, '\n');

                        // 呼叫底層批次處理，傳入 isAutoSync = true
                        await this.processBatchDataInternally(extractedText, html, storeCode, syncStats[storeCode], false);
                        
                        console.log(`%c[AutoSync] ✅ ${storeCode} 爬取完畢: 共偵測 ${syncStats[storeCode].total} 人 | 更新成功 ${syncStats[storeCode].updated} 人 | 略過未建檔 ${syncStats[storeCode].missing} 人`, "color: #4caf50; font-weight:bold;");
                    } catch(e) {
                        console.error(`[AutoSync] ❌ ${storeCode} 爬取失敗:`, e);
                    }
                    
                    // 為了避免被鎖 IP，每家店抓完強制停頓 2 秒
                    if (this.isSyncing && i < syncRules.length - 1) {
                        await new Promise(r => setTimeout(r, 2000));
                    }
                }

                // 結束同步
                this.isSyncing = false;
                document.getElementById('btn-auto-sync').style.display = 'inline-flex';
                document.getElementById('btn-cancel-sync').style.display = 'none';
                document.getElementById('btn-cancel-sync').innerHTML = "⏹️ 取消";
                document.getElementById('btn-cancel-sync').disabled = false;
                Utility.hideLoading();

                console.log("%c[AutoSync] 💾 自動觸發背景存檔...", "color: #ff9800;");
                await this.saveOrderToGoogleSheet(true); 
                
                this.showSyncStatsModal(syncStats);
            }

            // ☁️ 雲端清理
            async cleanupDriveFolder() {
                if (!this.accessToken || !this.hasWriteAccess) { Utility.showToast("⚠️ 請先授權", true); return; }
                if (!confirm("⚠️ 警告：將掃描雲端硬碟，刪除無用照片並重新命名。確定執行？")) return;
                Utility.showLoading("📡 掃描雲端與資料庫中...");
                try {
                    const sheetRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?includeGridData=true`, { headers: { 'Authorization': `Bearer ${this.accessToken}` }});
                    const sheetData = await sheetRes.json();
                    let usedFiles = new Map();
                    
                    if (sheetData.sheets) {
                        sheetData.sheets.forEach(sheet => {
                            let rows = sheet.data[0].rowData;
                            if (!rows || rows.length <= 1) return;
                            let hR = rows[0].values ? rows[0].values.map(v => v.formattedValue || "") : [];
                            const pIdx = hR.findIndex(h => String(h).trim() === '技師照片'), sIdx = hR.findIndex(h => String(h).trim() === '店名'), nIdx = hR.findIndex(h => String(h).trim() === '姓名');
                            
                            if (pIdx !== -1) {
                                for (let i = 1; i < rows.length; i++) {
                                    if (!rows[i].values) continue;
                                    let fId = Utility.extractDriveFileId(rows[i].values[pIdx] ? rows[i].values[pIdx].formattedValue : "");
                                    if (fId) {
                                        let sVal = sIdx !== -1 && rows[i].values[sIdx] ? rows[i].values[sIdx].formattedValue : "";
                                        let nVal = nIdx !== -1 && rows[i].values[nIdx] ? rows[i].values[nIdx].formattedValue : "";
                                        let sc = Utility.getStoreCodeByName(sVal);
                                        let pName = Utility.parseName(nVal, window.ruleEngine).pureName || nVal;
                                        usedFiles.set(fId, `${sc}_${pName}.jpg`);
                                    }
                                }
                            }
                        });
                    }

                    let files = [], pageToken = null;
                    do {
                        let url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`'${DRIVE_FOLDER_ID}' in parents and trashed=false`)}&fields=nextPageToken,files(id,name)&pageSize=100`;
                        if (pageToken) url += `&pageToken=${pageToken}`;
                        let r = await fetch(url, { headers: { 'Authorization': `Bearer ${this.accessToken}` } });
                        let d = await r.json(); files = files.concat(d.files || []); pageToken = d.nextPageToken;
                    } while (pageToken);

                    let delC = 0, renC = 0;
                    for (let f of files) {
                        if (!usedFiles.has(f.id)) {
                            Utility.showLoading(`🗑️ 刪除無用照片... (${delC}/${files.length})`);
                            await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${this.accessToken}` } });
                            delC++;
                        } else {
                            let eName = usedFiles.get(f.id);
                            if (f.name !== eName) {
                                Utility.showLoading(`📝 重新命名照片... (${renC})`);
                                await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`, { method: 'PATCH', headers: { 'Authorization': `Bearer ${this.accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ name: eName }) });
                                renC++;
                            }
                        }
                    }
                    Utility.showToast(`✅ 清理完成！刪除 ${delC} 張，重命名 ${renC} 張。`);
                } catch (e) { Utility.showToast(`❌ 失敗：${e.message}`, true); } finally { Utility.hideLoading(); }
            }

            executeBatchUpdateOnly() { this.processBatchData(false); }
            executeBatchCreate() {
                if (!document.getElementById('v_store')?.value.trim()) { Utility.showToast('⚠️ 批次建檔前，請在左側輸入共同的【店名】！', true); return; }
                this.processBatchData(true);
            }

            async processBatchDataInternally(text, html, storeCode, statsObj, createMissing = false) {
                return new Promise((resolve) => {
                    let siteMatches = ['Common', storeCode];
                    let sr = window.ruleEngine.getRulesForField('System_Anchor');
                    let sp = Utility.getSafePattern(sr.length > 0 ? sr[0].pattern : '收藏夾');
                    let sReg; try { sReg = new RegExp(sp, 'g'); } catch(err) { sReg = /收藏夾/g; }

                    let mStore = window.ruleEngine.extractByRules(text, html, "v_store", siteMatches);
                    let baseStore = mStore.value || ''; 
                    if(!baseStore) {
                        let rule = window.ruleEngine.rules.find(r => r.field === 'v_store' && r.siteMatch === storeCode);
                        if(rule) baseStore = rule.action;
                    }

                    const formStoreVal = Utility.cleanStoreNameDisplay(document.getElementById('v_store')?.value);
                    const formPriceVal = document.getElementById('v_price')?.value.trim() || "";
                    const formLocationVal = document.getElementById('v_location')?.value.trim() || "";
                    const formAfVal = document.getElementById('v_af')?.value.trim() || "";
                    const formTags = formAfVal.split(/[\/／]/).map(t => t.trim()).filter(t => t);

                    if(!baseStore && formStoreVal) baseStore = formStoreVal;

                    let blocks = text.split(sReg).filter(b => b.trim().length > 10);
                    if (blocks.length === 0) blocks = [text]; 

                    blocks.forEach(block => {
                        let extractedName = window.ruleEngine.extractByRules(block, html, "v_name", siteMatches);
                        if (!extractedName.value) {
                            let fallbackMatch = block.match(/No\.\d+\s*\n\s*([^\n(（]+)/i);
                            if (fallbackMatch && fallbackMatch[1]) {
                                extractedName.value = fallbackMatch[1].trim();
                            } else {
                                let altMatch = block.match(/(?:名稱|名前|Name)\s*([^\n(（]+)/i);
                                if (altMatch && altMatch[1]) extractedName.value = altMatch[1].trim();
                            }
                        }
                        
                        if (!extractedName.value) return; 

                        if (statsObj) statsObj.total++;
                        
                        let nameInfo = Utility.parseName(extractedName.value, window.ruleEngine);
                        let pureName = nameInfo.pureName;
                        let finalStore = Utility.cleanStoreNameDisplay(baseStore);

                        let extStatsObj = window.ruleEngine.extractByRules(block, html, "v_stats", siteMatches);
                        let extStats = extStatsObj.value;
                        if (!extStats) {
                            let mStats = block.match(/(T\d{3}[^\n]+)/i);
                            if (mStats) extStats = mStats[1].replace(/from.*/i, '').trim();
                        }

                        let extractedUrlObj = window.ruleEngine.extractByRules(block, html, "v_url", siteMatches);
                        let extUrl = extractedUrlObj.value;
                        if (!extUrl) {
                            let mUrl = block.match(/https?:\/\/[^\s"']+/);
                            if (mUrl) extUrl = mUrl[0];
                        }

                        let mSchObj = window.ruleEngine.extractByRules(block, html, "v_schedule", siteMatches);
                        let mSch = mSchObj.value;
                        if (!mSch) {
                            let mSchFallback = block.match(/(?:出勤情報|スケジュール|出勤表|出勤スケジュール)[\s\S]*/);
                            if (mSchFallback) mSch = mSchFallback[0];
                        }
                        
                        if (mSch || extStats) {
                            let tagSet = new Set();
                            nameInfo.tags.forEach(t => tagSet.add(t)); 
                            
                            formTags.forEach(t => {
                                let upper = t.toUpperCase();
                                if(upper === 'AF' || upper === '3P' || upper === '射O') tagSet.add(upper);
                                else tagSet.add(t);
                            });

                            let levelVal = nameInfo.level;
                            let recordIdx = -1;

                            if (extUrl) {
                                let cleanExtUrl = extUrl.split('?')[0].replace(/\/$/, "");
                                recordIdx = this.dataStore.findIndex(r => {
                                    let dbUrl = (r._raw[this.colMap.url] || "").trim();
                                    let cleanDbUrl = dbUrl.split('?')[0].replace(/\/$/, "");
                                    return cleanDbUrl && cleanDbUrl === cleanExtUrl;
                                });
                            }

                            if (recordIdx === -1) {
                                recordIdx = this.dataStore.findIndex(r => {
                                    let dbName = r._raw[this.colMap.name] || "";
                                    let cleanDbName = Utility.parseName(dbName, window.ruleEngine).pureName; 
                                    let dbStore = r._raw[this.colMap.store] || "";
                                    let nameMatch = cleanDbName.toLowerCase() === pureName.toLowerCase();
                                    let storeMatch = Utility.isSameStore(dbStore, finalStore);
                                    return nameMatch && storeMatch;
                                });
                            }

                            if (recordIdx !== -1 && this.dataStore[recordIdx]) {
                                let existingSch = this.dataStore[recordIdx]._raw[this.colMap.schedule] || "";
                                let combinedSchText = existingSch;
                                if (mSch) combinedSchText += "\n" + mSch;
                                
                                let formattedSch = Utility.parseAndFormatSchedule(combinedSchText, window.ruleEngine);
                                let hasSchedule = /\d{1,2}\/\d{1,2}/.test(formattedSch) && (formattedSch.includes('休息') || formattedSch.includes(':'));

                                if (hasSchedule) this.dataStore[recordIdx]._raw[this.colMap.schedule] = formattedSch;
                                if (extStats) this.dataStore[recordIdx]._raw[this.colMap.stats] = extStats; 
                                
                                if (extUrl && !this.dataStore[recordIdx]._raw[this.colMap.url]) {
                                    this.dataStore[recordIdx]._raw[this.colMap.url] = extUrl;
                                }

                                let originalDbAf = this.dataStore[recordIdx]._raw[this.colMap.af] || "";
                                originalDbAf.split(/[\/／]/).map(t=>t.trim()).filter(t=>t).forEach(t => {
                                    let upper = t.toUpperCase();
                                    if(upper === 'AF' || upper === '3P' || upper === '射O') tagSet.add(upper);
                                    else tagSet.add(t);
                                });
                                
                                if (html) {
                                    window.ruleEngine.extractByRules(block, html, 'v_af', siteMatches).tags.forEach(t => tagSet.add(t));
                                }

                                if (tagSet.size > 0) {
                                    this.dataStore[recordIdx]._raw[this.colMap.af] = Array.from(tagSet).join(' / ');
                                }

                                if (levelVal) {
                                    this.dataStore[recordIdx]._raw[this.colMap.level] = levelVal;
                                }
                                
                                this.dataStore[recordIdx]._raw[this.colMap.updateTime] = Utility.getCurrentTime();

                                let currentTechId = this.dataStore[recordIdx]._raw[this.colMap.techId] || '';
                                if (!currentTechId.startsWith(storeCode + '_')) {
                                    let numMatch = currentTechId.match(/\d{4}/);
                                    if (numMatch) {
                                        this.dataStore[recordIdx]._raw[this.colMap.techId] = `${storeCode}_${numMatch[0]}`;
                                    } else {
                                        this.dataStore[recordIdx]._raw[this.colMap.techId] = Utility.generateID(storeCode);
                                    }
                                }

                                if (statsObj) {
                                    console.log(`  └ 🔄 更新成功: ${pureName}`);
                                    statsObj.updated++;
                                }
                            } else if (createMissing) {
                                let newRowData = new Array(this.headerRow.length).fill("");
                                const setV = (key, val) => { const idx = this.colMap[key]; if(idx !== -1 && idx !== undefined) newRowData[idx] = val; };
                                
                                setV('techId', Utility.generateID(storeCode)); 
                                
                                setV('store', finalStore);
                                setV('name', pureName);
                                setV('stats', extStats);
                                setV('price', formPriceVal);
                                setV('location', formLocationVal);
                                setV('url', extUrl); 
                                setV('updateTime', Utility.getCurrentTime());
                                
                                let formattedSch = Utility.parseAndFormatSchedule(mSch, window.ruleEngine);
                                let hasSchedule = /\d{1,2}\/\d{1,2}/.test(formattedSch) && (formattedSch.includes('休息') || formattedSch.includes(':'));
                                if (hasSchedule) setV('schedule', formattedSch);

                                if (html) {
                                    window.ruleEngine.extractByRules(block, html, 'v_af', siteMatches).tags.forEach(t => tagSet.add(t));
                                }

                                if (tagSet.size > 0) setV('af', Array.from(tagSet).join(' / '));
                                if (levelVal) setV('level', levelVal);

                                let mAgeObj = window.ruleEngine.extractByRules(block, "", "v_age", siteMatches);
                                let finalAge = mAgeObj.value;
                                if(!finalAge) {
                                    let fallbackAge = block.match(/(?:Age|年齢|年齡)\s*(\d+)/i) || block.match(/(\d+)\s*(?:歳|才|歲)/);
                                    if(fallbackAge) finalAge = fallbackAge[1];
                                }
                                if (finalAge) setV('age', finalAge + "歲");

                                this.dataStore.push({
                                    id: String(newRowData[this.colMap.techId]),
                                    _raw: newRowData,
                                    _rowIndex: "" 
                                });
                                
                                if (statsObj) {
                                    console.log(`  └ 🌟 建檔成功: ${pureName}`);
                                    statsObj.updated++; 
                                }
                            } else {
                                if (statsObj) {
                                    console.log(`  └ ⚠️ 找不到關聯資料庫，略過: ${pureName}`);
                                    statsObj.missing++;
                                }
                            }
                        }
                    });
                    
                    resolve();
                });
            }

            processBatchData(createMissing) {
                if (!this.accessToken || !this.hasWriteAccess) { Utility.showToast("⚠️ 請先授權！", true); return; }
                const text = document.getElementById('v_magic_paste')?.value.trim();
                let sr = window.ruleEngine.getRulesForField('System_Anchor');
                let sp = Utility.getSafePattern(sr.length > 0 ? sr[0].pattern : '收藏夾');
                let sReg; try { sReg = new RegExp(sp, 'g'); } catch(err) { sReg = /收藏夾/g; }

                if (!text || text.split(sReg).length <= 1) { Utility.showToast('⚠️ 請貼上有效資料！', true); return; }

                let siteMatches = ['Common'];
                let lowerText = text.toLowerCase();
                let urlStoreCode = '';
                if(lowerText.includes('yoasobi')) {
                    siteMatches.push('yoasobi-heaven.com');
                    let urlM = lowerText.match(/\/tokyo\/[A-Za-z0-9_]+\/([^\/]+)/i);
                    if (urlM) urlStoreCode = urlM[1].toLowerCase();
                }
                if(lowerText.includes('yoshiwara')) { siteMatches.push('yoshiwara-soap'); urlStoreCode = 'yoshiwara-soap'; }
                if (urlStoreCode) siteMatches.push(urlStoreCode);

                Utility.showLoading("同步資料庫中...");

                setTimeout(async () => {
                    try {
                        let statsObj = { total: 0, updated: 0, missing: 0 };
                        await this.processBatchDataInternally(text, "", urlStoreCode, statsObj, createMissing);
                        
                        if (statsObj.updated > 0) {
                            this.renderCatalog(); this.saveOrderToGoogleSheet(true); 
                            Utility.showToast(`✅ 完成！成功處理 ${statsObj.updated} 筆。`);
                            document.getElementById('v_magic_paste').value = ''; 
                        } else Utility.showToast('⚠️ 無法更新，請確認內容格式。', true);
                    } catch (err) { 
                        Utility.showToast('⚠️ 錯誤：' + err.message, true); 
                    } finally { 
                        Utility.hideLoading(); 
                    }
                }, 100); 
            }

            processMagicPaste(text, html) {
                if (!text) return;
                let extUrl = (text.match(/https?:\/\/[^\s]+/) || [""])[0];
                let recordIdx = extUrl ? this.dataStore.findIndex(r => (r._raw[this.colMap.url]||"").trim().split('?')[0].replace(/\/$/,"") === extUrl.split('?')[0].replace(/\/$/,"")) : -1;

                if (/^https?:\/\/[^\s]+$/.test(text.trim())) {
                    if (recordIdx !== -1) { this.editRecord(recordIdx); Utility.showToast('✨ 載入現有資料！'); } 
                    else { document.getElementById('v_url').value = extUrl; Utility.showToast('✨ 填入新網址！'); }
                    return;
                }

                let siteMatches = ['Common'];
                let sc = '';
                if(html.includes('yoasobi') || text.toLowerCase().includes('yoasobi')) { siteMatches.push('yoasobi-heaven.com'); sc = (extUrl.match(/\/tokyo\/[A-Za-z0-9_]+\/([^\/]+)/i)||['',''])[1].toLowerCase(); }
                if(html.includes('yoshiwara') || text.toLowerCase().includes('yoshiwara')) { siteMatches.push('yoshiwara-soap'); sc = 'yoshiwara-soap'; }
                if(sc) siteMatches.push(sc);

                let rawName = window.ruleEngine.extractByRules(text, html, 'v_name', siteMatches).value || (text.match(/No\.\d+\s*\n\s*([^\n(（]+)/i) || text.match(/(?:名稱|名前|Name)\s*([^\n(（]+)/i) || ['',''])[1]?.trim();
                let pureName = Utility.parseName(rawName, window.ruleEngine).pureName || rawName;
                let extStore = Utility.cleanStoreNameDisplay(window.ruleEngine.extractByRules(text, html, 'v_store', siteMatches).value || document.getElementById('v_store')?.value.trim());

                if (recordIdx === -1 && pureName) recordIdx = this.dataStore.findIndex(r => Utility.parseName(r._raw[this.colMap.name]||"", window.ruleEngine).pureName.toLowerCase() === pureName.toLowerCase() && Utility.isSameStore(r._raw[this.colMap.store]||"", extStore));

                let isEx = recordIdx !== -1 && this.dataStore[recordIdx];
                if (isEx) this.editRecord(recordIdx);
                else { this.clearForm(); document.getElementById('v_tech_id').value = Utility.generateID(Utility.getStoreCodeByName(extStore)); }

                const setV = (id, val) => { if(val) document.getElementById(id).value = val; };
                setV('v_name', pureName); setV('v_store', extStore); setV('v_url', extUrl);
                setV('v_stats', window.ruleEngine.extractByRules(text, html, 'v_stats', siteMatches).value || (text.match(/(T\d{3}[^\n]+)/i)||['',''])[1].replace(/from.*/i,'').trim());
                let fAge = window.ruleEngine.extractByRules(text, html, 'v_age', siteMatches).value || (text.match(/(?:Age|年齢|年齡)\s*(\d+)/i)||['',''])[1];
                if(fAge) setV('v_age', fAge + "歲");

                let tagSet = new Set();
                (document.getElementById('v_af')?.value || "").split(/[\/／]/).forEach(t => { if(t.trim()) tagSet.add(t.trim()); });
                window.ruleEngine.extractByRules(text, html, 'v_af', siteMatches).tags.forEach(t => tagSet.add(t));
                Utility.parseName(rawName, window.ruleEngine).tags.forEach(t => tagSet.add(t));
                if (tagSet.size > 0) setV('v_af', Array.from(tagSet).join(' / '));

                let fs = Utility.parseAndFormatSchedule(window.ruleEngine.extractByRules(text, html, 'v_schedule', siteMatches).value || (text.match(/(?:出勤情報|スケジュール|出勤表|出勤スケジュール)[\s\S]*/)||[''])[0], window.ruleEngine);
                if (/\d{1,2}\/\d{1,2}/.test(fs)) setV('v_schedule', fs);

                Utility.showToast(isEx ? '✨ 載入舊資料並更新！' : (fs ? '✨ 資訊已解析！' : '✨ 更新部分資訊'));
            }

            get currentSheet() { return document.getElementById('v_sheet')?.value; }
            initGoogleAuth() {
                const storedToken = sessionStorage.getItem('gapi_access_token');
                const storedHasWrite = sessionStorage.getItem('gapi_has_write') === 'true';
                this.populateTimeDropdowns();
                this.tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/spreadsheets.readonly', callback: '' });
                if (storedToken) { this.accessToken = storedToken; this.hasWriteAccess = storedHasWrite; this.onAuthSuccess(); }
            }
            onAuthSuccess() { document.getElementById('auth-banner').style.display = 'none'; this.fetchSheetNames(); }
            triggerAuth() {
                if(!this.tokenClient) return;
                this.tokenClient.callback = (resp) => {
                    if (resp.error) return;
                    this.accessToken = resp.access_token;
                    this.hasWriteAccess = google.accounts.oauth2.hasGrantedAllScopes(resp, 'https://www.googleapis.com/auth/spreadsheets', 'https://www.googleapis.com/auth/drive');
                    sessionStorage.setItem('gapi_access_token', resp.access_token);
                    sessionStorage.setItem('gapi_has_write', this.hasWriteAccess ? 'true' : 'false');
                    this.onAuthSuccess();
                };
                this.tokenClient.requestAccessToken({ prompt: 'consent' });
            }
            async fetchSheetNames() {
                if (!this.accessToken) return;
                try {
                    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets.properties(title,sheetId)`, { headers: { 'Authorization': `Bearer ${this.accessToken}` } });
                    const data = await res.json();
                    if (data.error) { if (data.error.code === 401) return this.handleTokenExpired(); throw new Error(data.error.message); }
                    if (data.sheets) {
                        const select = document.getElementById('v_sheet'); select.innerHTML = ''; 
                        data.sheets.forEach(s => { const opt = document.createElement('option'); opt.value = s.properties.title; opt.innerText = s.properties.title; opt.dataset.sheetId = s.properties.sheetId; select.appendChild(opt); });
                        await this.fetchRulesSheet(); this.loadSheetData(); 
                    }
                } catch (e) { Utility.showToast(`❌ 讀取失敗`, true); }
            }
            async fetchRulesSheet() {
                try {
                    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Rules!A:Z`, { headers: { 'Authorization': `Bearer ${this.accessToken}` } });
                    const data = await res.json();
                    if(data && data.values) window.ruleEngine.setRules(data.values);
                } catch(e) {}
            }
            handleTokenExpired() {
                sessionStorage.clear(); this.accessToken = null; this.hasWriteAccess = false;
                const b = document.getElementById('auth-banner'); b.style.display = 'block'; b.innerHTML = '⚠️ 登入過期，重新授權'; b.style.background = '#f8d7da';
            }
            async loadSheetData(keepForm = false) {
                if (!this.accessToken || !this.currentSheet) return;
                Utility.showLoading(`載入「${this.currentSheet}」...`);
                try {
                    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(this.currentSheet)}!A:Z`, { headers: { 'Authorization': `Bearer ${this.accessToken}` } });
                    const data = await res.json();
                    if (data.error) { if (data.error.code === 401) return this.handleTokenExpired(); throw new Error(data.error.message); }
                    if (!data.values || data.values.length === 0) { this.dataStore = []; this.renderCatalog(); return Utility.hideLoading(); }
                    this.headerRow = data.values[0];
                    const getIdx = (n) => this.headerRow.findIndex(h => String(h).trim() === n);
                    this.colMap = { location: getIdx('位置'), store: getIdx('店名'), techId: getIdx('技師編號'), startDate: getIdx('到職日'), name: getIdx('姓名'), age: getIdx('年齡'), stats: getIdx('數值'), photo: getIdx('技師照片'), price: getIdx('價金'), url: getIdx('網址'), af: getIdx('屬性') !== -1 ? getIdx('屬性') : getIdx('AF'), level: getIdx('等級'), schedule: getIdx('行事曆'), favorite: getIdx('我的最愛') !== -1 ? getIdx('我的最愛') : (getIdx('最愛') !== -1 ? getIdx('最愛') : getIdx('Favorite')), updateTime: getIdx('更新時間') !== -1 ? getIdx('更新時間') : getIdx('UpdateTime') };
                    if (this.colMap.name === -1 || this.colMap.store === -1) alert(`⚠️ 缺少必要欄位`); else document.getElementById('btn-save').disabled = false;
                    ['schedule', 'favorite', 'updateTime'].forEach((k,i) => { if (this.colMap[k] === -1 || this.colMap[k] === undefined) { this.colMap[k] = this.headerRow.length; this.headerRow.push(['行事曆','我的最愛','更新時間'][i]); } });
                    this.dataStore = data.values.slice(1).map((r, i) => ({ id: String(r[this.colMap.techId] || `T-${i}`).trim(), _raw: this.headerRow.map((_, idx) => r[idx] || ""), _rowIndex: i + 2 })).filter(item => item._raw[this.colMap.name] && item._raw[this.colMap.name] !== '姓名');
                    this.renderCatalog(); Utility.hideLoading();
                } catch (e) { Utility.hideLoading(); alert("❌ 錯誤：" + e.message); }
            }
            async saveOrderToGoogleSheet(isBg = false) {
                if (!this.accessToken) return;
                if (!isBg) Utility.showLoading("儲存排序...");
                try {
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(this.currentSheet)}!A2?valueInputOption=USER_ENTERED`, { method: 'PUT', headers: { 'Authorization': `Bearer ${this.accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ values: this.dataStore.map(r => r._raw) }) });
                    this.dataStore.forEach((item, idx) => item._rowIndex = idx + 2);
                    document.getElementById('btn-save-order').style.display = 'none';
                    if (!isBg) { Utility.showToast("✅ 變更儲存成功！"); this.renderCatalog(); }
                } catch (e) { Utility.showToast(`❌ 錯誤`, true); } finally { if (!isBg) Utility.hideLoading(); }
            }
            async saveToGoogleSheet() {
                let st = document.getElementById('v_store').value.trim(), nm = document.getElementById('v_name').value.trim();
                if (!st || !nm) return Utility.showToast("⚠️ 請填寫店名與姓名！", true);
                Utility.showLoading("寫入中...");
                try {
                    let sc = Utility.getStoreCodeByName(st);
                    let tId = document.getElementById('v_tech_id').value.trim() || Utility.generateID(sc);
                    if (!tId.startsWith(sc + '_')) tId = `${sc}_${(tId.match(/\d{4}/)||[''])[0] || Utility.generateID(sc).split('_')[1]}`;
                    let fUrl = document.getElementById('v_photo_url').value || "";
                    if(cropperSvc.pendingBlob) fUrl = await cropperSvc.uploadToDrive(cropperSvc.pendingBlob, `${sc}_${Utility.parseName(nm).pureName}.jpg`, this.accessToken);
                    let nR = new Array(this.headerRow.length).fill("");
                    let tIdx = document.getElementById('v_row_index').value;
                    if (tIdx) { let rec = this.dataStore.find(r => String(r._rowIndex) === String(tIdx)); if (rec) nR = [...rec._raw]; }
                    const setV = (k, v) => { if(this.colMap[k] !== -1) nR[this.colMap[k]] = v; };
                    setV('location', document.getElementById('v_location').value); setV('store', st); setV('techId', /^\d+$/.test(tId)?`'${tId}`:tId); setV('startDate', document.getElementById('v_start_date').value); setV('name', nm); setV('age', document.getElementById('v_age').value); setV('stats', document.getElementById('v_stats').value); setV('price', document.getElementById('v_price').value); setV('url', document.getElementById('v_url').value); setV('af', document.getElementById('v_af').value); setV('level', document.getElementById('v_level').value); setV('schedule', document.getElementById('v_schedule').value); setV('photo', fUrl); setV('updateTime', Utility.getCurrentTime());
                    let wUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(this.currentSheet)}`;
                    await fetch(`${wUrl}!A${tIdx || '1:append'}?valueInputOption=USER_ENTERED`, { method: tIdx ? 'PUT' : 'POST', headers: { 'Authorization': `Bearer ${this.accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ values: [nR] }) });
                    cropperSvc.pendingBlob = null; Utility.showToast(`✅ 儲存成功！`); await this.loadSheetData(true);
                } catch (e) { Utility.showToast(`❌ 錯誤`, true); } finally { Utility.hideLoading(); }
            }
            toggleFavorite(e, i) { e.stopPropagation(); let r = this.dataStore[i]._raw; r[this.colMap.favorite] = r[this.colMap.favorite] === 'Y' ? '' : 'Y'; this.renderCatalog(); this.saveOrderToGoogleSheet(true); }
            clearForm() { document.getElementById('v_row_index').value=''; ['v_location','v_store','v_tech_id','v_start_date','v_name','v_age','v_stats','v_price','v_url','v_af','v_level','v_schedule','v_photo_url'].forEach(id => document.getElementById(id).value=''); document.getElementById('preview_photo').style.display='none'; document.getElementById('text_photo').style.display='block'; document.getElementById('btn_del_photo').style.display='none'; document.getElementById('btn-delete').style.display='none'; cropperSvc.pendingBlob = null; if(!this.isEditMode) this.toggleMode(); }
            renderCatalog() {
                const kw = document.getElementById('searchInput').value.trim().toLowerCase();
                const grid = document.getElementById('catalogGrid'); grid.innerHTML = '';
                let list = this.dataStore.filter(item => {
                    if (!kw) return true;
                    let str = `${item._raw[this.colMap.name]} ${item._raw[this.colMap.store]} ${item._raw[this.colMap.af]}`.toLowerCase();
                    return kw.split('+').every(c => c.startsWith('-') ? !str.includes(c.substring(1).trim()) : str.includes(c.trim()));
                }).sort((a, b) => (b._raw[this.colMap.favorite] === 'Y'?1:0) - (a._raw[this.colMap.favorite] === 'Y'?1:0));

                list.forEach((item, i) => {
                    const r = item._raw;
                    let cup = Utility.parseStats(r[this.colMap.stats]).cup, color = '#9e9e9e';
                    if (['A','B','C'].includes(cup)) color = '#4caf50'; else if (['D','E','F'].includes(cup)) color = '#ff9800'; else if (cup !== '?') color = '#e91e63';
                    let cStats = (r[this.colMap.stats] || '').replace(/\([A-Z]\)/ig, '').trim();
                    let sH = Utility.getBodyShapeData(r[this.colMap.stats]);
                    let cBox = this.isEditMode ? `<input type="checkbox" class="card-checkbox" value="${i}">` : '';
                    let card = document.createElement('div'); card.className = 'card';
                    card.onclick = (e) => { if(!e.target.closest('.fav-btn')) this.editRecord(this.dataStore.indexOf(item)); };
                    card.innerHTML = `
                        ${cBox}
                        <div class="img-container">
                            <span class="badge">${r[this.colMap.location] || '未知'}</span>
                            <div class="fav-btn" onclick="app.toggleFavorite(event, ${this.dataStore.indexOf(item)})">${r[this.colMap.favorite] === 'Y' ? '❤️' : '🤍'}</div>
                            <img src="${Utility.cleanDriveUrl(r[this.colMap.photo]) || PLACEHOLDER_URL}">
                        </div>
                        <div class="store-name">${r[this.colMap.store] || ''}</div>
                        <div class="tech-name">${r[this.colMap.name] || ''} ${r[this.colMap.age] ? '('+r[this.colMap.age]+')' : ''}</div>
                        ${sH ? `<div class="tags-row"><span class="tag-item" style="background:#546e7a; color:white;">${sH.shapeIcon} ${sH.shapeType}</span></div>` : ''}
                        <div class="stats-row"><span class="cup-badge" style="background:${color};">${cup}杯</span><span>${cStats}</span></div>
                        ${Utility.generateScheduleHTML(r[this.colMap.schedule])}
                    `;
                    grid.appendChild(card);
                });
            }
            editRecord(i) {
                let r = this.dataStore[i]._raw;
                const setV = (id, val) => document.getElementById(id).value = val || '';
                setV('v_row_index', this.dataStore[i]._rowIndex); setV('v_location', r[this.colMap.location]); setV('v_store', r[this.colMap.store]);
                setV('v_tech_id', r[this.colMap.techId] ? r[this.colMap.techId].replace(/^'/, '') : ''); 
                let d = r[this.colMap.startDate] || ""; setV('v_start_date', d.match(/(\d{4})\s*[年\/\-.]\s*(\d{1,2})\s*[月\/\-.]\s*(\d{1,2})/) ? d.replace(/(\d{4}).*?(\d{1,2}).*?(\d{1,2}).*/, (m,y,mo,da)=>`${y}-${mo.padStart(2,'0')}-${da.padStart(2,'0')}`) : d);
                setV('v_name', r[this.colMap.name]); setV('v_age', r[this.colMap.age]); setV('v_stats', r[this.colMap.stats]); setV('v_price', r[this.colMap.price]); setV('v_url', r[this.colMap.url]); setV('v_af', r[this.colMap.af]); setV('v_level', r[this.colMap.level]); setV('v_schedule', r[this.colMap.schedule]); setV('v_photo_url', r[this.colMap.photo]);
                let cI = Utility.cleanDriveUrl(r[this.colMap.photo]);
                if (cI) { document.getElementById('preview_photo').src = cI; document.getElementById('preview_photo').style.display='block'; document.getElementById('text_photo').style.display='none'; document.getElementById('btn_del_photo').style.display='flex'; } 
                else { document.getElementById('preview_photo').style.display='none'; document.getElementById('text_photo').style.display='block'; document.getElementById('btn_del_photo').style.display='none'; }
                document.getElementById('btn-delete').style.display='inline-flex';
                if(!this.isEditMode) this.toggleMode();
                document.getElementById('panel-form').scrollIntoView();
            }
        }
        
        window.app = null;
        const cropperSvc = new ImageCropperService();
        window.onload = () => { window.app = new AppCore(); window.app.initGoogleAuth(); };
    </script>
</body>
