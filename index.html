<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    :root {
      --bg: #f3f4f7;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2f6feb;
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top right, #dbeafe, var(--bg) 45%);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .launcher {
      width: min(760px, 100%);
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 20px 48px rgba(20, 30, 80, 0.15);
      padding: 24px;
    }

    body.mobile .launcher {
      width: min(100%, 940px);
    }

    body.focus-mode {
      display: block;
      padding: 0;
      background: #dbe3ef;
    }

    body.focus-mode .launcher {
      width: 100%;
      max-width: none;
      min-height: 100dvh;
      border-radius: 0;
      box-shadow: none;
      padding: 8px;
      background: transparent;
    }

    body.focus-mode .chrome {
      display: none;
    }

    body.focus-mode #app-host {
      margin-top: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      min-height: 100dvh;
    }

    body.focus-mode #app-frame {
      min-height: 100dvh;
      border-radius: 0;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
    }

    button.secondary {
      background: #4b5563;
    }

    #status {
      margin-top: 16px;
      font-size: 14px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    #status.error { color: var(--danger); }

    #app-host {
      margin-top: 16px;
      min-height: 100px;
      border: 1px dashed #d1d5db;
      border-radius: 12px;
      background: #fafafa;
      padding: 12px;
    }

    #app-frame {
      width: 100%;
      min-height: 72dvh;
      border: 0;
      display: none;
      background: #fff;
      border-radius: 10px;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .toolbar {
      display: none;
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      gap: 8px;
      pointer-events: none;
    }

    body.focus-mode .toolbar {
      display: flex;
    }

    .toolbar button {
      pointer-events: auto;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(31, 41, 55, 0.9);
      color: #fff;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      body {
        padding: 8px;
      }

      .launcher {
        width: 100%;
        padding: 14px;
      }

      #app-frame {
        min-height: 80dvh;
      }
    }
  </style>
</head>
<body>

    <div id="app-host">
      <iframe id="app-frame" title="Talent DB App"></iframe>
      <div id="app-placeholder">After sign-in, the app will load from private Google Drive files.</div>
    </div>

  <div class="toolbar">
    <button id="btn-toggle-shell" type="button">Show Launcher</button>

    function detectDeviceMode() {
      const isMobile = window.matchMedia("(max-width: 900px)").matches ||
        /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || "");
      document.body.classList.toggle("mobile", isMobile);
    }

    function toggleFocusMode(force) {
      const shouldEnable = typeof force === "boolean"
        ? force
        : !document.body.classList.contains("focus-mode");
      document.body.classList.toggle("focus-mode", shouldEnable);
      toggleShellBtn.textContent = shouldEnable ? "Show Launcher" : "Hide Launcher";
    }

      statusEl.textContent = text;

      if (!statusEl.classList.contains("chrome")) statusEl.classList.add("chrome");
    }

    function assertConfigured() {
      if (!CLIENT_ID.startsWith("REPLACE_WITH_")) return true;
      setStatus("Please set CLIENT_ID first.", true);
      return false;
    }

    function assertManifestConfigured() {
      if (!APP_MANIFEST_FILE_ID.startsWith("REPLACE_WITH_")) return true;
      setStatus("Please set APP_MANIFEST_FILE_ID first.", true);
      return false;
    }

    async function fetchDriveFileText(fileId) {
      const ctrl = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 15000);
      const res = await fetch(
        `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
        { headers: { Authorization: `Bearer ${state.accessToken}` }, signal: ctrl.signal }
      );
      clearTimeout(timeout);
      if (!res.ok) throw new Error(`Drive read failed (${res.status})`);
      return await res.text();
    }

    async function fetchDriveDocText(fileId) {
      const ctrl = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 15000);
      const res = await fetch(
        `https://www.googleapis.com/drive/v3/files/${fileId}/export?mimeType=text/plain`,
        { headers: { Authorization: `Bearer ${state.accessToken}` }, signal: ctrl.signal }
      );
      clearTimeout(timeout);
      if (!res.ok) throw new Error(`Drive doc export failed (${res.status})`);
      return await res.text();
    }

    async function fetchAnyText(fileId, preferDoc = false) {
      if (preferDoc) {
        try {
          return await fetchDriveDocText(fileId);
        } catch (error) {
          return await fetchDriveFileText(fileId);
        }
      }

      try {
        return await fetchDriveFileText(fileId);
      } catch (error) {
        return await fetchDriveDocText(fileId);
      }
    }

    async function loadManifest() {
      const text = await fetchAnyText(APP_MANIFEST_FILE_ID, true);
      let manifest;
      try {
        manifest = JSON.parse(text);
      } catch (error) {
        throw new Error("Manifest is not valid JSON.");
      }
      if (!manifest.entryFileId) throw new Error("Manifest missing entryFileId.");
      return manifest;
    }

    async function loadPrivateApp() {
      if (!state.accessToken) {
        setStatus("Please sign in first.", true);
        return;
      }
      if (!assertManifestConfigured()) return;

      loadBtn.disabled = true;
      setStatus("Loading manifest...");
      try {
        const manifest = await loadManifest();
        setStatus("Manifest loaded. Loading entry...");
        const useDocExport = String(manifest.entrySource || "").toLowerCase() === "gdoc";
        let entryHtml = await fetchAnyText(manifest.entryFileId, useDocExport);
        const coreFiles = Array.isArray(manifest.coreFiles) ? manifest.coreFiles : [];
        if (coreFiles.length) {
          setStatus(`Entry loaded. Loading core files (0/${coreFiles.length})...`);
          // When modular core files are provided, strip legacy inline scripts from entry html
          // to avoid duplicate class declarations and runtime conflicts.
          entryHtml = entryHtml.replace(/<script>([\s\S]*?)<\/script>/gi, "");
          const blocks = [];
          for (let i = 0; i < coreFiles.length; i += 1) {
            const file = coreFiles[i];
            if (!file || !file.id) continue;
            setStatus(`Loading core files (${i + 1}/${coreFiles.length}): ${file.name || file.id}`);
            const src = await fetchAnyText(
              file.id,
              String(file.source || "").toLowerCase() === "gdoc"
            );
            const label = String(file.name || file.id).replace(/</g, "_");
            const safeJs = String(src || "").replace(/<\/script>/gi, "<\\/script>");
            blocks.push(`<script>\n/* ${label} */\n${safeJs}\n<\/script>`);
          }
          if (blocks.length) {
            const merged = blocks.join("\n");
            entryHtml = entryHtml.includes("</body>")
              ? entryHtml.replace("</body>", `${merged}\n</body>`)
              : `${entryHtml}\n${merged}`;
          }
        }
        entryHtml = entryHtml.replace(
          /window\.app\.initGoogleAuth\(\);/g,
          `if (window.google && window.google.accounts && window.google.accounts.oauth2) {
            window.app.initGoogleAuth();
          } else {
            const __jpBootAuth = () => {
              if (window.google && window.google.accounts && window.google.accounts.oauth2) {
                window.app.initGoogleAuth();
              } else {
                setTimeout(__jpBootAuth, 150);
              }
            };
            __jpBootAuth();
          }`
        );

          ? "Load failed: request timeout while reading Drive files."
          : `Load failed: ${error.message}`;
        setStatus(msg, true);
      } finally {
        loadBtn.disabled = false;
      }
    }

    function initAuth() {
      if (!assertConfigured()) return;
      state.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: APP_SCOPE,
        callback: (resp) => {
          if (resp.error) {
            setStatus(`Sign-in failed: ${resp.error}`, true);
            return;
          }
          state.accessToken = resp.access_token;
          state.hasWriteAccess = google.accounts.oauth2.hasGrantedAllScopes(
            resp,
            "https://www.googleapis.com/auth/spreadsheets",
            "https://www.googleapis.com/auth/drive"
          );
          loadBtn.disabled = false;
          setStatus("Signed in. Loading private app...");
          loadPrivateApp();
        }
      });
    }

    loginBtn.addEventListener("click", () => {
      if (!state.tokenClient) {
        setStatus("OAuth is not initialized yet.", true);
        return;
      }
      state.tokenClient.requestAccessToken({ prompt: "consent" });
    });

    loadBtn.addEventListener("click", () => {
      loadPrivateApp();
    });

    toggleShellBtn.addEventListener("click", () => {
      toggleFocusMode(document.body.classList.contains("focus-mode") ? false : true);
    });

    window.addEventListener("resize", detectDeviceMode);
    window.addEventListener("load", () => {
      detectDeviceMode();
      initAuth();
    });
  </script>
</body>
</html>
